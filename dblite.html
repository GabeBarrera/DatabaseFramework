function MapModal({ profiles, onClose, onSelect, focusId }) {
  const stageRef = useRef(null);
  const [size, setSize] = useState({ w: 1200, h: 700 });
  const [view, setView] = useState({ scale: 1.0, x: 0, y: 0 });
  const [hover, setHover] = useState(null); // {id, sx, sy}
  const [active, setActive] = useState(focusId || null);
  const [geo, setGeo] = useState(_worldCache);
  const [geoStatus, setGeoStatus] = useState(_worldCache ? "ready" : "loading");

  // load real world geometry (cached at module level)
  useEffect(() => {
    let cancelled = false;
    loadWorld().then((g) => {
      if (cancelled) return;
      setGeo(g);
      setGeoStatus(g && g.features && g.features.length ? "ready" : "error");
    });
    return () => { cancelled = true; };
  }, []);

  // measure stage
  useEffect(() => {
    const update = () => {
      if (!stageRef.current) return;
      const r = stageRef.current.getBoundingClientRect();
      setSize({ w: r.width, h: r.height });
    };
    update();
    window.addEventListener("resize", update);
    return () => window.removeEventListener("resize", update);
  }, []);

  // esc to close
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  // d3 projection — Equal Earth gives a nice world view in a single shot, fit to stage
  const projection = useMemo(() => {
    if (!geo || !geo.features.length || !size.w || !size.h) return null;
    const p = d3.geoEqualEarth();
    p.fitExtent([[24, 24], [size.w - 24, size.h - 24]], geo);
    return p;
  }, [geo, size.w, size.h]);

  const pathGen = useMemo(() => projection ? d3.geoPath(projection) : null, [projection]);

  // pre-project all profiles
  const pinsData = useMemo(() => {
    if (!projection) return { plotted: [], off: [] };
    const plotted = [];
    const off = [];
    profiles.forEach((p) => {
      const g = geocode(p.address);
      if (!g) {
        off.push({ profile: p, reason: "no-address" });
        return;
      }
      const pt = projection([g.lng, g.lat]);
      if (!pt || isNaN(pt[0]) || isNaN(pt[1])) {
        off.push({ profile: p, lat: g.lat, lng: g.lng, cityKey: g.city, reason: "unproject" });
        return;
      }
      plotted.push({ profile: p, lat: g.lat, lng: g.lng, x: pt[0], y: pt[1], cityKey: g.city });
    });
    return { plotted, off };
  }, [profiles, projection]);
  const pins = pinsData.plotted;
  const offPins = pinsData.off;

  // initial fit / reset = identity (projection already fits the stage)
  const reset = () => setView({ scale: 1, x: 0, y: 0 });
  useEffect(() => { reset(); }, [size.w, size.h]);

  // wheel zoom centered on cursor
  const onWheel = (e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    setView((v) => {
      const rect = stageRef.current.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      const newScale = Math.max(0.4, Math.min(8, v.scale * factor));
      const k = newScale / v.scale;
      return {
        scale: newScale,
        x: cx - k * (cx - v.x),
        y: cy - k * (cy - v.y)
      };
    });
  };

  // drag-to-pan
  const drag = useRef({ active: false, sx: 0, sy: 0, vx: 0, vy: 0 });
  const onMouseDown = (e) => {
    if (e.button !== 0) return;
    drag.current = { active: true, sx: e.clientX, sy: e.clientY, vx: view.x, vy: view.y, moved: false };
  };
  const onMouseMove = (e) => {
    if (!drag.current.active) return;
    const dx = e.clientX - drag.current.sx;
    const dy = e.clientY - drag.current.sy;
    if (Math.abs(dx) + Math.abs(dy) > 3) drag.current.moved = true;
    setView((v) => ({ ...v, x: drag.current.vx + dx, y: drag.current.vy + dy }));
  };
  const onMouseUp = () => { drag.current.active = false; };

  // touch
  const touch = useRef({ active: false, sx: 0, sy: 0, vx: 0, vy: 0, pinch: null });
  const onTouchStart = (e) => {
    if (e.touches.length === 1) {
      touch.current = { active: true, sx: e.touches[0].clientX, sy: e.touches[0].clientY, vx: view.x, vy: view.y, pinch: null };
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      touch.current.pinch = { dist: Math.hypot(dx, dy), scale: view.scale };
    }
  };
  const onTouchMove = (e) => {
    if (e.touches.length === 1 && touch.current.active && !touch.current.pinch) {
      const dx = e.touches[0].clientX - touch.current.sx;
      const dy = e.touches[0].clientY - touch.current.sy;
      setView((v) => ({ ...v, x: touch.current.vx + dx, y: touch.current.vy + dy }));
    } else if (e.touches.length === 2 && touch.current.pinch) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      const ratio = dist / touch.current.pinch.dist;
      setView((v) => ({ ...v, scale: Math.max(0.4, Math.min(8, touch.current.pinch.scale * ratio)) }));
    }
  };
  const onTouchEnd = () => { touch.current.active = false; touch.current.pinch = null; };

  // zoom buttons
  const zoomBy = (factor) => {
    setView((v) => {
      const newScale = Math.max(0.4, Math.min(8, v.scale * factor));
      const k = newScale / v.scale;
      const cx = size.w / 2, cy = size.h / 2;
      return { scale: newScale, x: cx - k * (cx - v.x), y: cy - k * (cy - v.y) };
    });
  };

  const flyTo = (pin) => {
    // center on pin at zoom 3
    const newScale = Math.max(2.5, view.scale);
    const x = size.w / 2 - pin.x * newScale;
    const y = size.h / 2 - pin.y * newScale;
    setView({ scale: newScale, x, y });
    setActive(pin.profile.id);
  };

  // when focusId is set on open, fly to that pin (after projection is ready)
  useEffect(() => {
    if (!focusId || !projection) return;
    const pin = pins.find((x) => x.profile.id === focusId);
    if (pin) {
      const newScale = 3.2;
      const x = size.w / 2 - pin.x * newScale;
      const y = size.h / 2 - pin.y * newScale;
      setView({ scale: newScale, x, y });
      setActive(focusId);
    } else {
      setActive(focusId);
    }
  }, [focusId, projection, pins.length, size.w, size.h]);

  // wheel listener with passive: false
  useEffect(() => {
    const el = stageRef.current;
    if (!el) return;
    const handler = (e) => onWheel(e);
    el.addEventListener("wheel", handler, { passive: false });
    return () => el.removeEventListener("wheel", handler);
  });

  // graticule (lat/lng grid) drawn through the same projection
  const graticulePath = useMemo(() => {
    if (!pathGen) return null;
    try { return pathGen(d3.geoGraticule10()); } catch (e) { return null; }
  }, [pathGen]);

  return (
    <div className="modal-veil" onMouseDown={(e) => { if (e.target.classList.contains("modal-veil")) onClose(); }}>
      <div className="modal map-modal">
        <div className="modal-head">
          <div className="tag">RECON</div>
          <h3>&gt; <Glitch className="glitch-sm">WORLD_MAP // {pins.length} NODE(S){offPins.length ? ` · ${offPins.length} UNGEOCODED` : ""}</Glitch></h3>
          <button className="ctrl-btn" onClick={onClose}>✕ ESC</button>
        </div>

        <div
          ref={stageRef}
          className={"map-stage" + (drag.current.active ? " grabbing" : "")}
          onMouseDown={onMouseDown}
          onMouseMove={onMouseMove}
          onMouseUp={onMouseUp}
          onMouseLeave={onMouseUp}
          onTouchStart={onTouchStart}
          onTouchMove={onTouchMove}
          onTouchEnd={onTouchEnd}
        >
          <div className="map-overlay-tl">
            <div>// PROJ: <b>EQUAL_EARTH // GLOBAL</b></div>
            <div>// ZOOM: <b>{view.scale.toFixed(2)}x</b></div>
            <div>// PIN_LOCK: <b>{active || "—"}</b></div>
            <div>// GEO: <b>{geoStatus === "loading" ? "fetching natural-earth…" : geoStatus === "error" ? "offline fallback" : `${geo ? geo.features.length : 0} countries`}</b></div>
          </div>

          <svg
            width={size.w}
            height={size.h}
            viewBox={`0 0 ${size.w} ${size.h}`}
            preserveAspectRatio="none"
          >
            <g transform={`translate(${view.x}, ${view.y}) scale(${view.scale})`}>
              {/* graticule */}
              {graticulePath && (
                <path
                  d={graticulePath}
                  fill="none"
                  stroke="rgba(0,255,102,0.10)"
                  strokeWidth={0.8 / view.scale}
                  className="map-grid-path"
                />
              )}

              {/* countries (real Natural Earth data, world) */}
              {pathGen && geo && geo.features.map((f, i) => {
                const d = pathGen(f);
                if (!d) return null;
                return (
                  <path
                    key={(f.id != null ? f.id : "f") + "-" + i}
                    d={d}
                    className="map-country"
                    style={{ strokeWidth: 0.7 / view.scale }}
                  />
                );
              })}

              {/* loading indicator */}
              {geoStatus === "loading" && (
                <text x={size.w / 2} y={size.h / 2}
                      textAnchor="middle"
                      fill="rgba(0,255,102,0.45)"
                      fontFamily="var(--mono)"
                      fontSize={14 / view.scale}
                      letterSpacing={3 / view.scale}>
                  LOADING_GEOMETRY…
                </text>
              )}

              {/* pins */}
              <g>
                {pins.map((p) => {
                  const isActive = p.profile.id === active;
                  const r = 4 / view.scale;
                  return (
                    <g
                      key={p.profile.id}
                      className={"map-pin" + (isActive ? " active" : "")}
                      transform={`translate(${p.x}, ${p.y})`}
                      style={{ cursor: "pointer" }}
                      onMouseEnter={() => {
                        const sx = view.x + p.x * view.scale;
                        const sy = view.y + p.y * view.scale;
                        setHover({ id: p.profile.id, sx, sy, p });
                      }}
                      onMouseLeave={() => setHover((h) => h && h.id === p.profile.id ? null : h)}
                      onClick={(e) => {
                        e.stopPropagation();
                        if (drag.current.moved) return;
                        setActive(p.profile.id);
                      }}
                      onDoubleClick={(e) => { e.stopPropagation(); onSelect(p.profile); }}
                    >
                      <circle className="ping" r={r * 1.4} />
                      <circle className="ring2" r={r * 2.6} strokeWidth={0.6 / view.scale} />
                      <circle className="ring1" r={r * 1.6} strokeWidth={0.9 / view.scale} />
                      <circle className="core" r={r} />
                      <text
                        x={r * 2 + 2 / view.scale}
                        y={r * 0.4}
                        style={{ fontSize: 9 / view.scale }}
                      >
                        {p.profile.firstName.toUpperCase()} {p.profile.lastName.charAt(0).toUpperCase()}.
                      </text>
                    </g>
                  );
                })}
              </g>
            </g>
          </svg>

          {/* node list overlay */}
          <div className="map-list">
            <div className="lhead">
              <span>// NODES // WORLD</span>
              <span>{pins.length.toString().padStart(2, "0")} / {(pins.length + offPins.length).toString().padStart(2, "0")}</span>
            </div>
            <div className="lbody">
              {pins.length === 0 && offPins.length === 0 && (
                <div style={{ padding: "20px 12px", color: "var(--dim)", fontSize: 11, letterSpacing: "0.12em" }}>
                  [ no addresses to plot ]
                </div>
              )}
              {pins.map((p) => (
                <div
                  key={p.profile.id}
                  className={"map-row " + (p.profile.id === active ? "on" : "")}
                  onClick={() => flyTo(p)}
                  onDoubleClick={() => onSelect(p.profile)}
                >
                  <div className="dot-s" />
                  <div>
                    <div className="nm">{p.profile.firstName} {p.profile.lastName}</div>
                    <div className="lc">{p.cityKey || `${p.lat.toFixed(2)}, ${p.lng.toFixed(2)}`}</div>
                  </div>
                  <div className="co">{p.profile.id}</div>
                </div>
              ))}
              {offPins.length > 0 && (
                <div className="off-head">
                  <span>// UNGEOCODED</span>
                  <span>{offPins.length.toString().padStart(2, "0")}</span>
                </div>
              )}
              {offPins.map((p) => (
                <div
                  key={p.profile.id}
                  className={"map-row off " + (p.profile.id === active ? "on" : "")}
                  onClick={() => setActive(p.profile.id)}
                  onDoubleClick={() => onSelect(p.profile)}
                  title={p.reason === "no-address" ? "no address on file" : "could not project"}
                >
                  <div className="dot-s" />
                  <div>
                    <div className="nm">{p.profile.firstName} {p.profile.lastName}</div>
                    <div className="lc">{p.cityKey || (p.lat != null ? `${p.lat.toFixed(2)}, ${p.lng.toFixed(2)}` : "no addr")}</div>
                  </div>
                  <div className="co">{p.profile.id}</div>
                </div>
              ))}
            </div>
          </div>

          {/* zoom controls */}
          <div className="map-zoom">
            <button onClick={() => zoomBy(1.3)} title="zoom in">+</button>
            <div className="level">{view.scale.toFixed(1)}x</div>
            <button onClick={() => zoomBy(1 / 1.3)} title="zoom out">−</button>
            <button className="reset" onClick={reset} title="fit">FIT</button>
          </div>

          {/* tooltip */}
          {hover && (
            <div className="map-tooltip" style={{ left: hover.sx, top: hover.sy - 10 }}>
              <div className="nm">{hover.p.profile.firstName} {hover.p.profile.lastName}</div>
              <div className="ad">{hover.p.profile.address || "—"}</div>
            </div>
          )}
        </div>

        <div className="modal-foot">
          <div className="foot-hint">
            <span className="kbd">drag</span> pan &nbsp;·&nbsp;
            <span className="kbd">wheel</span> zoom &nbsp;·&nbsp;
            <span className="kbd">click</span> select &nbsp;·&nbsp;
            <span className="kbd">2x</span> open record
          </div>
          <div className="foot-actions">
            <button className="ctrl-btn" onClick={reset}>↺ FIT</button>
            <button
              className="ctrl-btn primary"
              onClick={() => {
                const p = pins.find((x) => x.profile.id === active);
                if (p) onSelect(p.profile);
              }}
              disabled={!active}
              style={{ opacity: active ? 1 : 0.4 }}
            >
              &gt; open record
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// LEFT RAIL (search)
// ============================================================
const FIELDS = [
  { id: "all", label: "ALL" },
  { id: "firstName", label: "FIRST" },
  { id: "lastName", label: "LAST" },
  { id: "dob", label: "DOB" },
  { id: "ethnicity", label: "ETHN" },
  { id: "sex", label: "SEX" },
  { id: "address", label: "ADDR" },
  { id: "description", label: "NOTES" }
];

function SearchPanel({ profiles, query, setQuery, field, setField, onPick, activeId }) {
  const matches = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return profiles;
    return profiles.filter((p) => {
      if (field === "all") {
        return [
          p.firstName, p.lastName, p.dob, p.ethnicity, p.sex,
          p.address, p.description, p.id
        ].some((v) => String(v || "").toLowerCase().includes(q));
      }
      return String(p[field] || "").toLowerCase().includes(q);
    });
  }, [profiles, query, field]);

  return (
    <aside className="leftrail">
      <div className="panel-head">
        <span>// QUERY</span><span className="bar" />
        <span className="blink">_</span>
      </div>
      <div className="search-row">
        <div className="input-wrap">
          <span className="pfx">grep&nbsp;-i</span>
          <input
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            placeholder="search persona, address, notes…"
          />
          {query && <span style={{ cursor: "pointer", color: "var(--grn-3)" }} onClick={() => setQuery("")}>✕</span>}
        </div>
      </div>
      <div className="filter-chips">
        {FIELDS.map((f) => (
          <button
            key={f.id}
            className={"chip " + (field === f.id ? "on" : "")}
            onClick={() => setField(f.id)}
          >{f.label}</button>
        ))}
      </div>

      <div className="results-head">
        <span>RESULTS</span>
        <span>{matches.length.toString().padStart(3, "0")} / {profiles.length.toString().padStart(3, "0")}</span>
      </div>

      <div className="results">
        {matches.length === 0 ? (
          <div className="empty-state">
            <div className="ascii">
{`  ┌──────────┐
  │  ∅  NULL │
  └──────────┘`}
            </div>
            no records match.<br />
            <span className="dim">refine query or change field.</span>
          </div>
        ) : matches.map((p, i) => (
          <div
            key={p.id}
            className={"result-row " + (p.id === activeId ? "active" : "")}
            onClick={() => onPick(p)}
          >
            <div className="avatar">{initials(p)}</div>
            <div>
              <div className="nm">
                <Highlight text={p.firstName + " " + p.lastName} q={query} />
              </div>
              <div className="meta">
                {fmtDate(p.dob)} &nbsp;·&nbsp; {p.ethnicity || "—"} &nbsp;·&nbsp; {p.sex}
              </div>
            </div>
            <div className="idx">#{String(i + 1).padStart(2, "0")}</div>
          </div>
        ))}
      </div>
    </aside>
  );
}

// ============================================================
// TOP BAR
// ============================================================
function TopBar({ count }) {
  const [time, setTime] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(t);
  }, []);
  const ts = time.toISOString().slice(0, 19).replace("T", " ");
  return (
    <header className="topbar">
      <div className="brand">
        <span className="prompt">root@persona</span>
        <span className="dim">:~ #</span>
        <span className="blink">█</span>
      </div>
      <div className="title-wrap">
        <Glitch>PERSONA_DB // v0.1.7</Glitch>
      </div>
      <div className="top-meta">
        <span><span className="dot" /> LINK_OK</span>
        <span>{count.toString().padStart(3, "0")} REC</span>
        <span>{ts} UTC</span>
      </div>
    </header>
  );
}

// ============================================================
// APP
// ============================================================
function App() {
  const [profiles, setProfiles] = useState(loadProfiles());
  const [index, setIndex] = useState(0);
  const [openProfile, setOpenProfile] = useState(null);
  const [newOpen, setNewOpen] = useState(false);
  const [editTarget, setEditTarget] = useState(null);
  const [mapOpen, setMapOpen] = useState(false);
  const [mapFocusId, setMapFocusId] = useState(null);
  const [query, setQuery] = useState("");
  const [field, setField] = useState("all");
  const [toast, setToast] = useState(null);

  const { dirName, pickDirectory, resolve, hasMap } = useImageDir();

  useEffect(() => { saveProfiles(profiles); }, [profiles]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast((t) => (t === msg ? null : t)), 1900);
  };

  // a resolver that also handles data URLs we embed
  const resolveImg = useCallback((ref) => {
    // The profile may carry imageData (embedded). prefer that if no folder linked.
    if (!ref && arguments.length === 0) return null;
    return resolve(ref);
  }, [resolve]);
  // helper: get best image for a given profile
  const imgFor = useCallback((p) => {
    if (!p) return null;
    const resolved = resolve(p.image);
    if (resolved) return resolved;
    if (p.imageData) return p.imageData;
    return null;
  }, [resolve]);

  const onPickFromSearch = (p) => {
    const i = profiles.findIndex((x) => x.id === p.id);
    if (i >= 0) {
      setIndex(i);
      setOpenProfile(p);
    }
  };

  const onSelect = (p) => setOpenProfile(p);
  const onNew = () => setNewOpen(true);

  const onSaveNew = (profile, isEdit) => {
    if (isEdit) {
      setProfiles((arr) => arr.map((x) => x.id === profile.id ? profile : x));
      // jump carousel onto the edited entry
      const i = profiles.findIndex((x) => x.id === profile.id);
      if (i >= 0) setIndex(i);
      setEditTarget(null);
      // re-open detail with the patched record
      setOpenProfile(profile);
      showToast(`> entry patched :: ${profile.id}`);
    } else {
      setProfiles((arr) => [...arr, profile]);
      setNewOpen(false);
      setIndex(profiles.length); // new card lands at end
      showToast(`> entry committed :: ${profile.id}`);
    }
  };

  const onEdit = (profile) => {
    setOpenProfile(null);
    setEditTarget(profile);
  };

  const onDelete = (profile) => {
    setProfiles((arr) => arr.filter((x) => x.id !== profile.id));
    setOpenProfile(null);
    setIndex(0);
    showToast(`> record purged :: ${profile.id}`);
  };

  // override resolve to also use embedded imageData when present
  const cardResolve = useCallback((imageRef) => {
    return resolve(imageRef);
  }, [resolve]);

  // wrap ProfileCard's image resolution to fallback to imageData attached to each profile
  // we'll pass a resolver that knows about the current profile via closure inside Carousel
  // Simpler: monkey-patch by passing a function that looks up the profile by image filename
  const byImageRef = useMemo(() => {
    const m = {};
    profiles.forEach((p) => { if (p.image) m[p.image.toLowerCase()] = p; });
    return m;
  }, [profiles]);

  const combinedResolve = useCallback((ref) => {
    if (!ref) return null;
    const real = resolve(ref);
    if (real) return real;
    const p = byImageRef[(ref || "").toLowerCase()];
    if (p && p.imageData) return p.imageData;
    return null;
  }, [resolve, byImageRef]);

  return (
    <div className="shell">
      <TopBar count={profiles.length} />

      <div className="main">
        <SearchPanel
          profiles={profiles}
          query={query}
          setQuery={setQuery}
          field={field}
          setField={setField}
          onPick={onPickFromSearch}
          activeId={openProfile ? openProfile.id : (profiles[index] && profiles[index].id)}
        />

        <section className="stage">
          <div className="stage-head">
            <div className="breadcrumbs">
              <span>/db/</span><b>profiles/</b><span>browse</span>
              <span className="dim"> &nbsp;//&nbsp; idx </span>
              <b>{String(Math.min(index + 1, profiles.length + 1)).padStart(2, "0")}</b>
              <span className="dim"> / {String(profiles.length + 1).padStart(2, "0")}</span>
            </div>
            <div className="stage-title">
              <h2><Glitch>CAROUSEL</Glitch></h2>
            </div>
            <div className="stage-controls">
              <button className="ctrl-btn" onClick={() => { setMapFocusId(null); setMapOpen(true); }}>
                🗺 MAP
              </button>
              <button className="ctrl-btn" onClick={pickDirectory}>
                📁 {dirName ? "RE-LINK FOLDER" : "LINK IMG FOLDER"}
              </button>
              <button className="ctrl-btn primary" onClick={onNew}>+ NEW</button>
            </div>
          </div>

          <div className="folderbar">
            <span>img.src</span>
            <span className="path">
              {dirName
                ? (<><span className="ok">✓</span>~/{dirName}/  &nbsp; <span style={{color:"var(--dim)"}}>({hasMap ? "indexed" : "empty"})</span></>)
                : (<span className="miss">⚠ no folder linked — cards will show placeholder unless image is embedded</span>)}
            </span>
            <span className="dim">{profiles.length} entries</span>
          </div>

          <div className="ascii-rule">·   ·   ·   ·   ·   ·   ·   ·   ·   ·   ·   ·   ·   ·   ·</div>

          <Carousel
            profiles={profiles}
            index={index}
            setIndex={setIndex}
            onSelect={onSelect}
            onNew={onNew}
            resolveImg={combinedResolve}
          />

          <div className="pager">
            {profiles.map((p, i) => (
              <span key={p.id}
                    className={"pip " + (i === index ? "on" : "")}
                    onClick={() => setIndex(i)} />
            ))}
            <span className={"pip " + (index === profiles.length ? "on" : "")}
                  onClick={() => setIndex(profiles.length)}
                  style={{ borderLeft: "1px dashed var(--line-2)", marginLeft: 4, paddingLeft: 6 }} />
          </div>
        </section>
      </div>

      <footer className="statusbar">
        <div className="seg">
          <span><span className="dot" /> ENC:AES-256</span>
          <span>STORE: <b>localStorage</b></span>
          <span>IMG: <b>{dirName || "—"}</b></span>
        </div>
        <div className="seg">
          <span>NAV: <span className="kbd">←</span><span className="kbd">→</span></span>
          <span>OPEN: <span className="kbd">ENTER</span></span>
          <span>SWIPE: <span className="kbd">touch</span></span>
        </div>
      </footer>

      {openProfile && (
        <DetailModal
          profile={openProfile}
          onClose={() => setOpenProfile(null)}
          onDelete={onDelete}
          resolveImg={combinedResolve}
          onOpenMap={(p) => { setOpenProfile(null); setMapOpen(true); setMapFocusId(p.id); }}
          onEdit={onEdit}
        />
      )}
      {newOpen && (
        <NewEntryModal onClose={() => setNewOpen(false)} onSave={onSaveNew} />
      )}
      {editTarget && (
        <NewEntryModal
          initial={editTarget}
          onClose={() => { setEditTarget(null); setOpenProfile(editTarget); }}
          onSave={onSaveNew}
        />
      )}
      {mapOpen && (
        <MapModal
          profiles={profiles}
          focusId={mapFocusId}
          onClose={() => { setMapOpen(false); setMapFocusId(null); }}
          onSelect={(p) => { setMapOpen(false); setMapFocusId(null); setOpenProfile(p); }}
        />
      )}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
