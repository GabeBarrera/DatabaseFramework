<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>// PERSONA_DB ::  ROOT_TERMINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=VT323&display=swap" />

<style>
  :root {
    --bg: #000000;
    --bg-1: #050a07;
    --bg-2: #081410;
    --line: #0e2a1a;
    --line-2: #133b25;
    --grn-0: #00ff66;
    --grn-1: #36ff8c;
    --grn-2: #00cc52;
    --grn-3: #008c38;
    --grn-4: #005a24;
    --grn-5: #003417;
    --amber: #ffcb1f;
    --red: #ff3355;
    --txt: #b6ffd0;
    --dim: #4a7a5c;
    --mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
    --crt: "VT323", "JetBrains Mono", monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--grn-0);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* --- CRT skin: scanlines + vignette + flicker --- */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(0,255,102,0.035) 0px,
        rgba(0,255,102,0.035) 1px,
        transparent 1px,
        transparent 3px
      );
    z-index: 9999;
    mix-blend-mode: screen;
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%),
      radial-gradient(ellipse 120% 90% at center, transparent 60%, rgba(0,30,15,0.35) 100%);
    z-index: 9998;
  }
  @keyframes flicker {
    0%,100% { opacity: 1; }
    7% { opacity: 0.96; }
    13% { opacity: 1; }
    24% { opacity: 0.98; }
  }
  #root { animation: flicker 6s infinite; }

  /* selection */
  ::selection { background: var(--grn-0); color: #000; }

  /* scrollbars */
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-track { background: var(--bg-1); }
  *::-webkit-scrollbar-thumb { background: var(--grn-4); border: 1px solid var(--grn-5); }
  *::-webkit-scrollbar-thumb:hover { background: var(--grn-3); }

  /* utility */
  .mono { font-family: var(--mono); }
  .dim { color: var(--dim); }
  .grn { color: var(--grn-0); }
  .amber { color: var(--amber); }
  .upper { text-transform: uppercase; letter-spacing: 0.12em; }

  /* layout */
  .shell {
    position: fixed; inset: 0;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr;
    color: var(--grn-0);
    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(0,80,30,0.25), transparent 60%),
      radial-gradient(900px 500px at 90% 110%, rgba(0,60,30,0.20), transparent 60%),
      var(--bg);
  }

  /* topbar */
  .topbar {
    border-bottom: 1px solid var(--line-2);
    background: linear-gradient(180deg, #020604 0%, #020604 100%);
    padding: 10px 16px 10px 16px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 24px;
    position: relative;
    z-index: 2;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  .brand .prompt {
    color: var(--grn-3);
    font-weight: 700;
  }
  .brand .blink { animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .title-wrap {
    text-align: center;
    font-family: var(--mono);
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.32em;
  }
  .glitch {
    position: relative;
    display: inline-block;
    color: var(--grn-0);
    text-shadow:
      0 0 1px rgba(0,255,102,0.7),
      0 0 6px rgba(0,255,102,0.45),
      0 0 22px rgba(0,255,102,0.2);
  }
  .glitch::before,
  .glitch::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .glitch::before {
    color: #ff2e88;
    transform: translate(0,0);
    mix-blend-mode: screen;
    animation: glitchA 2.7s infinite steps(1);
    clip-path: inset(0 0 0 0);
  }
  .glitch::after {
    color: #2effe0;
    transform: translate(0,0);
    mix-blend-mode: screen;
    animation: glitchB 3.1s infinite steps(1);
    clip-path: inset(0 0 0 0);
  }
  @keyframes glitchA {
    0%   { transform: translate(0,0); clip-path: inset(0 0 90% 0); }
    8%   { transform: translate(-2px, 1px); clip-path: inset(20% 0 60% 0); }
    16%  { transform: translate(2px, -1px); clip-path: inset(40% 0 35% 0); }
    24%  { transform: translate(-1px, 0); clip-path: inset(60% 0 15% 0); }
    32%  { transform: translate(0,0); clip-path: inset(0 0 100% 0); }
    100% { transform: translate(0,0); clip-path: inset(0 0 100% 0); }
  }
  @keyframes glitchB {
    0%   { transform: translate(0,0); clip-path: inset(0 0 100% 0); }
    10%  { transform: translate(2px, 0); clip-path: inset(70% 0 10% 0); }
    20%  { transform: translate(-2px, 1px); clip-path: inset(50% 0 35% 0); }
    30%  { transform: translate(1px, -1px); clip-path: inset(20% 0 65% 0); }
    40%  { transform: translate(0,0); clip-path: inset(0 0 100% 0); }
    100% { transform: translate(0,0); clip-path: inset(0 0 100% 0); }
  }

  .glitch-sm { font-size: 12px; letter-spacing: 0.28em; }

  .top-meta {
    display: flex;
    gap: 18px;
    align-items: center;
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--grn-0); box-shadow: 0 0 10px var(--grn-0); display: inline-block; vertical-align: middle; margin-right: 6px; animation: pulse 1.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* main grid */
  .main {
    display: grid;
    grid-template-columns: minmax(280px, 26%) 1fr;
    min-height: 0;
    border-top: 1px solid var(--line);
  }

  /* left rail */
  .leftrail {
    border-right: 1px dashed var(--line-2);
    padding: 18px 16px 16px 18px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background:
      linear-gradient(180deg, rgba(0,40,20,0.15), transparent 30%),
      var(--bg);
  }
  .panel-head {
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--grn-2);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-head .bar {
    flex: 1;
    border-top: 1px dashed var(--line-2);
    margin-left: 6px;
  }

  .search-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .input-wrap {
    display: flex;
    align-items: center;
    border: 1px solid var(--line-2);
    background: #03100a;
    padding: 7px 10px;
    color: var(--grn-0);
    gap: 8px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-wrap:focus-within {
    border-color: var(--grn-2);
    box-shadow: 0 0 0 1px var(--grn-4), 0 0 14px rgba(0,255,102,0.15);
  }
  .input-wrap .pfx { color: var(--grn-3); }
  .input-wrap input,
  .input-wrap select,
  .input-wrap textarea {
    background: transparent;
    border: 0;
    color: var(--grn-0);
    font-family: var(--mono);
    font-size: 12.5px;
    width: 100%;
    outline: none;
    padding: 0;
    caret-color: var(--grn-0);
  }
  .input-wrap input::placeholder,
  .input-wrap textarea::placeholder { color: #2f5b40; }

  .filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 14px;
  }
  .chip {
    border: 1px solid var(--line-2);
    background: transparent;
    color: var(--grn-2);
    padding: 4px 8px;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.12s;
  }
  .chip:hover { border-color: var(--grn-3); color: var(--grn-0); }
  .chip.on {
    background: var(--grn-0);
    color: #001408;
    border-color: var(--grn-0);
    box-shadow: 0 0 12px rgba(0,255,102,0.4);
  }

  .results-head {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--grn-3);
    font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
    border-top: 1px dashed var(--line-2);
    border-bottom: 1px dashed var(--line-2);
    padding: 6px 0;
    margin-top: 4px;
  }

  .results {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    margin-top: 4px;
  }
  .result-row {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 8px 6px;
    border-bottom: 1px dotted var(--line);
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
  }
  .result-row:hover {
    background: rgba(0,255,102,0.06);
  }
  .result-row.active {
    background: rgba(0,255,102,0.10);
    box-shadow: inset 2px 0 0 var(--grn-0);
  }
  .result-row .idx {
    font-size: 10px;
    color: var(--grn-4);
    text-align: right;
  }
  .result-row .nm { color: var(--grn-0); font-size: 12.5px; }
  .result-row .nm em { font-style: normal; background: var(--grn-0); color: #001408; padding: 0 2px; }
  .result-row .meta { color: var(--dim); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; }
  .result-row .avatar {
    width: 22px; height: 22px;
    border: 1px solid var(--line-2);
    background: #061a10;
    color: var(--grn-2);
    display: grid; place-items: center;
    font-size: 9.5px; font-weight: 700;
    letter-spacing: 0;
  }

  .empty-state {
    padding: 28px 12px;
    text-align: center;
    color: var(--dim);
    font-size: 11.5px;
  }
  .empty-state .ascii {
    color: var(--grn-4);
    white-space: pre;
    line-height: 1.15;
    margin-bottom: 10px;
    font-size: 11px;
  }

  /* right region */
  .stage {
    min-width: 0;
    min-height: 0;
    display: grid;
    grid-template-rows: auto 1fr auto;
    background:
      linear-gradient(180deg, rgba(0,40,20,0.15), transparent 30%),
      var(--bg);
  }
  .stage-head {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    padding: 14px 22px 6px 22px;
    align-items: end;
    gap: 18px;
  }
  .breadcrumbs {
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .breadcrumbs b { color: var(--grn-1); font-weight: 600; }
  .stage-title { text-align: center; }
  .stage-title h2 {
    margin: 0;
    font-size: 26px;
    letter-spacing: 0.4em;
    font-weight: 800;
  }
  .stage-controls {
    display: flex; justify-content: flex-end; gap: 8px;
    align-items: center;
  }
  .ctrl-btn {
    border: 1px solid var(--line-2);
    background: transparent;
    color: var(--grn-1);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 6px 10px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .ctrl-btn:hover { border-color: var(--grn-2); background: rgba(0,255,102,0.06); }
  .ctrl-btn.primary {
    background: var(--grn-0); color: #001408; border-color: var(--grn-0);
    box-shadow: 0 0 14px rgba(0,255,102,0.35);
  }
  .ctrl-btn.primary:hover { background: var(--grn-1); }
  .ctrl-btn.danger { color: var(--red); border-color: rgba(255,51,85,0.4); }
  .ctrl-btn.danger:hover { background: rgba(255,51,85,0.1); border-color: var(--red); }

  /* carousel */
  .carousel-wrap {
    position: relative;
    padding: 4px 70px 14px 70px;
    min-height: 0;
    overflow: hidden;
    display: grid;
    grid-template-rows: 1fr;
    align-items: center;
  }
  .carousel-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 46px; height: 84px;
    display: grid; place-items: center;
    background: transparent;
    border: 1px solid var(--line-2);
    color: var(--grn-1);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 26px;
    z-index: 4;
    transition: all 0.12s;
  }
  .carousel-arrow:hover {
    background: rgba(0,255,102,0.08);
    border-color: var(--grn-2);
    color: var(--grn-0);
    box-shadow: 0 0 18px rgba(0,255,102,0.18);
  }
  .carousel-arrow.left { left: 14px; }
  .carousel-arrow.right { right: 14px; }
  .arrow-label {
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .track {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
    transition: transform 0.36s cubic-bezier(.22,.61,.36,1), opacity 0.2s;
    will-change: transform;
    perspective: 1200px;
  }

  .card {
    flex: 0 0 auto;
    width: 260px;
    border: 1px solid var(--line-2);
    background:
      linear-gradient(180deg, rgba(0,30,15,0.4), transparent 30%),
      #030906;
    color: var(--grn-0);
    position: relative;
    cursor: pointer;
    transition: transform 0.35s cubic-bezier(.22,.61,.36,1), border-color 0.2s, box-shadow 0.25s, opacity 0.25s;
    transform: scale(0.82) translateZ(0);
    opacity: 0.55;
    filter: saturate(0.7);
    user-select: none;
  }
  .card.center {
    transform: scale(1.0) translateZ(0);
    opacity: 1;
    filter: none;
    border-color: var(--grn-2);
    box-shadow:
      0 0 0 1px rgba(0,255,102,0.2),
      0 0 30px rgba(0,255,102,0.18),
      inset 0 0 40px rgba(0,255,102,0.06);
  }
  .card.adj {
    transform: scale(0.9) translateZ(0);
    opacity: 0.85;
    filter: saturate(0.85);
  }
  .card:hover { border-color: var(--grn-3); }
  .card.center:hover { border-color: var(--grn-0); }

  .card-img {
    height: 240px;
    background: #050d09;
    border-bottom: 1px solid var(--line-2);
    position: relative;
    overflow: hidden;
    display: grid;
    place-items: center;
  }
  .card-img img {
    width: 100%; height: 100%; object-fit: cover;
    filter: hue-rotate(70deg) saturate(0.7) contrast(1.05) brightness(0.95);
    mix-blend-mode: screen;
    background: #0a1f12;
  }
  .card-img .ph {
    width: 100%; height: 100%;
    display: grid; place-items: center;
    color: var(--grn-3);
    background:
      repeating-linear-gradient(45deg, rgba(0,255,102,0.06) 0 8px, transparent 8px 16px),
      radial-gradient(circle at 50% 38%, rgba(0,255,102,0.16), transparent 60%),
      #040c08;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
    padding: 12px;
  }
  .card-img .ph .glyph {
    font-size: 38px; line-height: 1; margin-bottom: 6px;
    color: var(--grn-2);
    font-family: var(--crt);
    letter-spacing: 0.05em;
  }
  .card-img::after {
    content: "";
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.55));
    pointer-events: none;
  }
  .card-img .corner {
    position: absolute;
    top: 8px; left: 8px;
    background: #000;
    border: 1px solid var(--grn-3);
    color: var(--grn-0);
    padding: 1px 6px;
    font-size: 10px;
    letter-spacing: 0.15em;
    z-index: 2;
  }
  .card-img .corner.r { left: auto; right: 8px; color: var(--amber); border-color: rgba(255,203,31,0.5); }

  .card-body {
    padding: 12px 14px 14px 14px;
  }
  .card-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--grn-0);
    text-transform: uppercase;
    line-height: 1.15;
    margin-bottom: 4px;
    word-break: break-word;
  }
  .card-name .last { color: var(--grn-1); }
  .card-id {
    color: var(--grn-3);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    margin-bottom: 10px;
  }
  .card-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 10px;
    font-size: 11px;
  }
  .card-grid .k {
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-size: 9.5px;
    align-self: center;
  }
  .card-grid .v {
    color: var(--grn-0);
    text-align: right;
  }

  /* new entry card */
  .card.new {
    border: 1px dashed var(--grn-3);
    background:
      repeating-linear-gradient(45deg, rgba(0,255,102,0.03) 0 12px, transparent 12px 24px),
      #020604;
    display: grid;
    place-items: center;
    height: 432px;
  }
  .card.new.center { border-style: dashed; border-color: var(--grn-0); }
  .new-inner {
    text-align: center;
    color: var(--grn-1);
    padding: 24px;
  }
  .new-inner .plus {
    width: 64px; height: 64px;
    border: 1px solid var(--grn-2);
    margin: 0 auto 16px;
    display: grid; place-items: center;
    font-size: 30px;
    color: var(--grn-0);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card.new.center:hover .plus {
    transform: rotate(90deg);
    box-shadow: 0 0 22px rgba(0,255,102,0.3);
  }
  .new-inner .label {
    letter-spacing: 0.34em;
    text-transform: uppercase;
    font-size: 14px;
    color: var(--grn-0);
    margin-bottom: 6px;
  }
  .new-inner .sub {
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
  }

  /* carousel pagination */
  .pager {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 0 16px 8px 16px;
    flex-wrap: wrap;
  }
  .pager .pip {
    width: 10px; height: 4px;
    background: var(--line-2);
    transition: all 0.15s;
    cursor: pointer;
  }
  .pager .pip:hover { background: var(--grn-3); }
  .pager .pip.on { background: var(--grn-0); width: 24px; box-shadow: 0 0 8px var(--grn-0); }

  /* statusbar */
  .statusbar {
    border-top: 1px solid var(--line-2);
    background: #020604;
    color: var(--dim);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 6px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
  }
  .statusbar .seg { display: flex; gap: 16px; }
  .statusbar b { color: var(--grn-1); font-weight: 600; }

  /* --- Detail modal --- */
  .modal-veil {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at center, rgba(0,30,15,0.4), rgba(0,0,0,0.85) 70%),
      rgba(0,0,0,0.6);
    z-index: 50;
    display: grid;
    place-items: center;
    padding: 24px;
    animation: fadeIn 0.18s ease-out;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal {
    width: min(960px, 100%);
    max-height: 92vh;
    overflow: auto;
    background:
      linear-gradient(180deg, rgba(0,30,15,0.5), transparent 12%),
      #02080500;
    background-color: #020604;
    border: 1px solid var(--grn-3);
    box-shadow:
      0 0 0 1px rgba(0,255,102,0.15),
      0 0 80px rgba(0,255,102,0.22),
      inset 0 0 60px rgba(0,255,102,0.04);
    position: relative;
  }
  .modal::before {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(to bottom, rgba(0,255,102,0.025) 0 1px, transparent 1px 3px);
    pointer-events: none;
  }
  .modal-head {
    padding: 14px 18px;
    border-bottom: 1px dashed var(--line-2);
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 16px;
  }
  .modal-head .tag {

    color: var(--grn-1);

    text-transform: uppercase;

    font-size: 18px;
    letter-spacing: 0.18em;
    text-transform: uppercase;

    grid-template-columns: 280px 1fr;
    gap: 24px;

    background: #050d09;
    position: relative;
    overflow: hidden;

    mix-blend-mode: screen;
    background: #0a1f12;
  }
  .modal-body .portrait .ph {
    width: 100%; height: 100%;
    display: grid; place-items: center;
    color: var(--grn-3);
    background:
      repeating-linear-gradient(45deg, rgba(0,255,102,0.06) 0 8px, transparent 8px 16px),
      radial-gradient(circle at 50% 38%, rgba(0,255,102,0.16), transparent 60%),
      #040c08;
    font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
    text-align: center; padding: 16px;

    content: "";
    position: absolute; left: 0; right: 0; top: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,255,102,0.6), transparent);

    pointer-events: none;

  .portrait-meta {

    background: #02080500;
    padding: 10px 12px;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .portrait-meta b { color: var(--grn-1); font-weight: 600; }

  .field-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;

    letter-spacing: 0.22em;
    text-transform: uppercase;

    color: var(--grn-0);
    font-size: 13.5px;
    word-break: break-word;

  .addr-link {
    cursor: pointer;
    color: var(--grn-0);

    color: var(--dim); font-size: 10.5px;
    letter-spacing: 0.18em; text-transform: uppercase;

  /* --- New entry form --- */
  .form-grid {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 24px;
    padding: 20px;

  .form-grid .picshell {
    display: grid;
    gap: 8px;
  }
  .picshell .pic {
    aspect-ratio: 3/4;
    border: 1px dashed var(--grn-3);
    background:
      repeating-linear-gradient(45deg, rgba(0,255,102,0.04) 0 10px, transparent 10px 20px),
      #030906;
    display: grid; place-items: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;

  .picshell .pic:hover {
    border-color: var(--grn-0);
    box-shadow: inset 0 0 30px rgba(0,255,102,0.08);
  }
  .picshell .pic img {
    width: 100%; height: 100%; object-fit: cover;
    filter: hue-rotate(70deg) saturate(0.7) contrast(1.05) brightness(0.95);
    mix-blend-mode: screen;
    background: #0a1f12;
  }
  .picshell .pic .ph-text {
    color: var(--grn-2);
    text-align: center;
    padding: 12px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .picshell .pic .ph-text .glyph {
    font-size: 32px; color: var(--grn-1); display: block; margin-bottom: 6px;
  }

  .form-rows {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 14px;
  }
  .form-rows .row {
    display: grid;
    gap: 4px;
  }
  .form-rows .row.full { grid-column: 1 / -1; }
  .form-rows label {
    color: var(--grn-3);
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .form-rows label .req { color: var(--amber); margin-left: 4px; }
  textarea.area {
    background: transparent; border: 0; color: var(--grn-0);
    font-family: var(--mono); font-size: 12.5px;
    width: 100%; outline: none; resize: vertical;
    min-height: 70px;
    caret-color: var(--grn-0);
  }
  .err {
    color: var(--red);
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* folder bar */
  .folderbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 14px;
    border: 1px solid var(--line-2);
    background: #02080500;
    margin: 0 22px 4px 22px;
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .folderbar .path {
    color: var(--grn-1);
    font-family: var(--mono);
    text-transform: none;
    letter-spacing: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .folderbar .path .ok { color: var(--grn-0); margin-right: 6px; }
  .folderbar .path .miss { color: var(--amber); }
  .ascii-rule {
    color: var(--grn-4);
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.4em;
    padding: 2px 0 8px 0;
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 36px; left: 50%; transform: translateX(-50%);
    background: #000;
    border: 1px solid var(--grn-0);
    color: var(--grn-0);
    padding: 8px 14px;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    box-shadow: 0 0 24px rgba(0,255,102,0.4);
    z-index: 200;
    animation: toastIn 0.18s ease-out;
  }
  @keyframes toastIn { from{opacity:0; transform: translate(-50%, 8px)} to{opacity:1; transform: translate(-50%, 0)} }

  /* keyboard hint chips */
  .kbd {
    border: 1px solid var(--line-2);
    padding: 1px 5px;
    color: var(--grn-1);
    font-size: 10px;
    letter-spacing: 0.1em;
    margin: 0 3px;
    background: #020604;
  }

  /* --- Contacts (form + detail) --- */
  .contacts-block {
    grid-column: 1 / -1;
    border: 1px dashed var(--line-2);
    padding: 12px;
    background:
      repeating-linear-gradient(45deg, rgba(0,255,102,0.02) 0 12px, transparent 12px 24px),
      transparent;
    display: grid;
    gap: 8px;

  .contacts-block .head {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--grn-3);
    font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase;
  }
  .contact-row {
    display: grid;
    grid-template-columns: 130px 1fr 32px;
    gap: 8px;
    align-items: center;
  }
  .contact-row .input-wrap { padding: 6px 8px; }
  .icon-btn {
    width: 28px; height: 28px;
    border: 1px solid var(--line-2);
    background: transparent;
    color: var(--red);
    font-family: var(--mono);
    cursor: pointer;
    display: grid; place-items: center;
    transition: all 0.12s;
  }
  .icon-btn:hover { background: rgba(255,51,85,0.12); border-color: var(--red); }
  .contacts-empty {
    color: var(--dim);
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 6px 2px;
  }

  /* Contacts in detail view */
  .contacts-list {
    border: 1px solid var(--line-2);
    border-top: none;
    margin-top: 14px;

  .contacts-list .head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px;
    color: var(--grn-3);
    font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase;

    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;

  .map-grid line.major { stroke: rgba(0,255,102,0.16); }

  .map-continent {
    fill: rgba(0,160,72,0.07);
    stroke: rgba(0,255,102,0.30);
    stroke-width: 0.6;
    stroke-linejoin: round;
  }
  .map-country {
    fill: rgba(0,160,72,0.08);
    stroke: rgba(0,255,102,0.38);
    stroke-width: 0.7;
    stroke-linejoin: round;
    stroke-linecap: round;
    transition: fill 0.2s;
  }
  .map-country:hover { fill: rgba(0,255,102,0.14); }
  .off-head {
    padding: 6px 12px;
    border-top: 1px dashed var(--line-2);

  .map-region-label {

    font-size: 11px;

    pointer-events: none;

  .map-pin .ring1 { fill: none; stroke: var(--grn-0); stroke-width: 1.2; transform-origin: center; }

  .map-row {

  .map-row .nm { font-weight: 600; letter-spacing: 0.06em; }
  .map-row .lc { color: var(--dim); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; grid-column: 2 / 3; }
  .map-row .co {

  .map-tooltip {
    position: absolute;
    background: rgba(2,8,5,0.95);
    border: 1px solid var(--grn-3);

    padding: 6px 10px;
    font-family: var(--mono);

    letter-spacing: 0.08em;
    pointer-events: none;

  }
  .map-tooltip .nm { color: var(--grn-0); font-weight: 600; }
  .map-tooltip .ad { color: var(--dim); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 2px; }

  @media (max-width: 980px) {
    .map-list { display: none; }
    .contact-row { grid-template-columns: 110px 1fr 32px; }
  }

  @media (max-width: 980px) {
    .main { grid-template-columns: 1fr; }
    .leftrail { border-right: none; border-bottom: 1px dashed var(--line-2); max-height: 40vh; }
    .modal-body { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-rows { grid-template-columns: 1fr; }
    .stage-head { grid-template-columns: 1fr; }
    .stage-controls { justify-content: flex-start; }
    .carousel-wrap { padding: 4px 12px 14px 12px; }
    .carousel-arrow { width: 36px; height: 56px; }
    .card { width: 220px; }
  }
</style>

function ageFrom(dob) {
  if (!dob) return "—";
  const d = new Date(dob);
  if (isNaN(d.getTime())) return "—";
  const today = new Date();
  let age = today.getFullYear() - d.getFullYear();
  const m = today.getMonth() - d.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < d.getDate())) age--;
  return age;
}
function fmtDate(dob) {
  if (!dob) return "—";
  const d = new Date(dob);
  if (isNaN(d.getTime())) return dob;
  return d.toISOString().slice(0, 10);
}
function initials(p) {
  return ((p.firstName || "?").charAt(0) + (p.lastName || "?").charAt(0)).toUpperCase();
}
function sexLong(s) {
  if (!s) return "—";
  const v = s.toUpperCase();
  if (v === "M") return "M / MALE";
  if (v === "F") return "F / FEMALE";
  if (v === "NB") return "NB / NON-BIN";
  return v;
}
function downloadJSON(obj, filename) {
  const blob = new Blob([JSON.stringify(obj, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

  "lima": [-12.046, -77.043], "bogota": [4.711, -74.072], "santiago": [-33.448, -70.669]

function geocode(address) {
  if (!address) return null;
  const a = address.toLowerCase();
  // try longest matches first
  let best = null;
  Object.keys(CITY_COORDS).forEach((k) => {
    if (a.includes(k) && (!best || k.length > best.length)) best = k;
  });
  if (best) {
    const [lat, lng] = CITY_COORDS[best];
    // small jitter so colocated points spread slightly (deterministic by full address)
    const h = strHash(address);
    return { lat: lat + ((h % 100) - 50) / 700, lng: lng + (((h >> 7) % 100) - 50) / 700, city: best };
  }
  // fall back to deterministic land-biased coords
  const h = strHash(address);
  const lat = ((h % 1000) / 1000) * 110 - 55;   // -55..55
  const lng = (((h >> 10) % 2000) / 2000) * 320 - 160; // -160..160
  return { lat, lng, city: null };
}
function strHash(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h) + s.charCodeAt(i);
  return Math.abs(h | 0);
}

// WORLD GEOGRAPHY (real data from world-atlas, projected with d3-geo)
// ============================================================
let _worldCache = null;
let _worldPromise = null;
function loadWorld() {
  if (_worldCache) return Promise.resolve(_worldCache);
  if (_worldPromise) return _worldPromise;
  _worldPromise = fetch("https://unpkg.com/world-atlas@2/countries-110m.json")
    .then((r) => r.json())
    .then((topo) => {
      const fc = topojson.feature(topo, topo.objects.countries);
      // Drop Antarctica — it sprawls and isn't useful for our pin set.
      const features = fc.features.filter((f) => {
        try {
          const c = d3.geoCentroid(f);
          return c[1] > -60;
        } catch (e) { return true; }
      });
      _worldCache = { type: "FeatureCollection", features };
      return _worldCache;
    })
    .catch((err) => {
      console.warn("[map] failed to load world atlas", err);
      return { type: "FeatureCollection", features: [] };
    });
  return _worldPromise;
}

// ============================================================
// IMAGE DIRECTORY MANAGER
// Holds a map: filename(lowercase) -> object URL
// User picks a folder via showDirectoryPicker (Chromium) or <input webkitdirectory>
// ============================================================
function useImageDir() {
  const [dirName, setDirName] = useState(() => localStorage.getItem(LS_FOLDER_KEY) || null);
  const [map, setMap] = useState({}); // { 'lowercase_name.jpg' : objectURL }
  const objectUrlsRef = useRef([]);

  const cleanup = () => {
    objectUrlsRef.current.forEach((u) => URL.revokeObjectURL(u));
    objectUrlsRef.current = [];
  };

  const ingestFiles = useCallback((files) => {
    cleanup();
    const m = {};
    Array.from(files).forEach((f) => {
      if (!f.type || !f.type.startsWith("image/")) return;
      const url = URL.createObjectURL(f);
      objectUrlsRef.current.push(url);
      const key = (f.name || "").toLowerCase();
      m[key] = url;
      // also key by stem (no extension)
      const stem = key.replace(/\.[^.]+$/, "");
      if (stem && !m[stem]) m[stem] = url;
    });
    setMap(m);
  }, []);

  const pickDirectory = useCallback(async () => {
    // Prefer File System Access API
    if (window.showDirectoryPicker) {
      try {
        const handle = await window.showDirectoryPicker();
        setDirName(handle.name);
        localStorage.setItem(LS_FOLDER_KEY, handle.name);
        const collected = [];
        // recursive walk one level deep — keep it predictable
        for await (const entry of handle.values()) {
          if (entry.kind === "file") {
            try { collected.push(await entry.getFile()); } catch (e) {}
          }
        }
        ingestFiles(collected);
        return true;
      } catch (e) {
        // user canceled or unsupported — fall through to input
        if (e && e.name === "AbortError") return false;
      }
    }
    // Fallback: hidden directory input
    return new Promise((resolve) => {
      const input = document.createElement("input");
      input.type = "file";
      input.multiple = true;
      input.webkitdirectory = true;
      input.directory = true;
      input.accept = "image/*";
      input.onchange = () => {
        if (input.files && input.files.length) {
          const first = input.files[0];
          // webkitRelativePath like "MyFolder/file.jpg"
          const folder = (first.webkitRelativePath || "").split("/")[0] || "Local Folder";
          setDirName(folder);
          localStorage.setItem(LS_FOLDER_KEY, folder);
          ingestFiles(input.files);
          resolve(true);
        } else {
          resolve(false);
        }
      };
      input.click();
    });
  }, [ingestFiles]);

  const resolve = useCallback((imageRef) => {
    if (!imageRef) return null;
    // data URL or absolute URL — return as is
    if (/^(data:|blob:|https?:)/i.test(imageRef)) return imageRef;
    const lower = imageRef.toLowerCase();
    if (map[lower]) return map[lower];
    // try without extension
    const stem = lower.replace(/\.[^.]+$/, "");
    if (map[stem]) return map[stem];
    return null;
  }, [map]);

  useEffect(() => () => cleanup(), []);

  return { dirName, pickDirectory, resolve, hasMap: Object.keys(map).length > 0 };
}

  const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
  const parts = String(text).split(re);

          : <React.Fragment key={i}>{p}</React.Fragment>
      )}
    </>
  );
}

// ============================================================
// CAROUSEL
// ============================================================
function Carousel({ profiles, index, setIndex, onSelect, onNew, resolveImg }) {
  const trackRef = useRef(null);
  const startX = useRef(null);
  const lastDx = useRef(0);
  const items = useMemo(() => {
    return [...profiles.map((p) => ({ kind: "profile", profile: p })), { kind: "new" }];
  }, [profiles]);
  const total = items.length;

  const go = useCallback((delta) => {
    setIndex((i) => {
      const next = i + delta;
      if (next < 0) return 0;
      if (next > total - 1) return total - 1;
      return next;
    });
  }, [setIndex, total]);

  // keyboard
  useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.isContentEditable)) return;
      if (e.key === "ArrowRight") { e.preventDefault(); go(1); }
      else if (e.key === "ArrowLeft") { e.preventDefault(); go(-1); }
      else if (e.key === "Enter") {
        const cur = items[index];
        if (!cur) return;
        if (cur.kind === "profile") onSelect(cur.profile);
        else onNew();
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [go, items, index, onSelect, onNew]);

  // swipe
  const onTouchStart = (e) => { startX.current = e.touches[0].clientX; lastDx.current = 0; };
  const onTouchMove = (e) => {
    if (startX.current == null) return;
    lastDx.current = e.touches[0].clientX - startX.current;
  };
  const onTouchEnd = () => {
    if (startX.current == null) return;
    const dx = lastDx.current;
    startX.current = null;
    if (Math.abs(dx) > 40) {
      if (dx < 0) go(1); else go(-1);
    }
  };

  // mouse drag (also useful on trackpad)
  const dragRef = useRef({ active: false, x: 0 });
  const onMouseDown = (e) => { dragRef.current = { active: true, x: e.clientX, dx: 0 }; };
  const onMouseMove = (e) => {
    if (!dragRef.current.active) return;
    dragRef.current.dx = e.clientX - dragRef.current.x;
  };
  const onMouseUp = () => {
    if (!dragRef.current.active) return;
    const dx = dragRef.current.dx || 0;
    dragRef.current.active = false;
    if (Math.abs(dx) > 60) { if (dx < 0) go(1); else go(-1); }
  };

  // visible: center +/- 2
  const visible = [];
  for (let off = -2; off <= 2; off++) {
    const i = index + off;
    if (i < 0 || i >= total) continue;
    visible.push({ i, off, item: items[i] });
  }

  return (
    <div
      className="carousel-wrap"
      onTouchStart={onTouchStart}
      onTouchMove={onTouchMove}
      onTouchEnd={onTouchEnd}
      onMouseDown={onMouseDown}
      onMouseMove={onMouseMove}
      onMouseUp={onMouseUp}
      onMouseLeave={onMouseUp}
    >
      <button className="carousel-arrow left" onClick={() => go(-1)} aria-label="Previous">
        ◀
        <span className="arrow-label">←</span>
      </button>

      <div className="track" ref={trackRef}>
        {visible.map(({ i, off, item }) => (
          <React.Fragment key={i}>
            {item.kind === "profile" ? (
              <ProfileCard
                profile={item.profile}
                position={off}
                isCenter={off === 0}
                onClick={() => {
                  if (off === 0) onSelect(item.profile);
                  else setIndex(i);
                }}
                resolveImg={resolveImg}
              />
            ) : (
              <NewEntryCard
                isCenter={off === 0}
                onClick={() => {
                  if (off === 0) onNew();
                  else setIndex(i);
                }}
              />
            )}
          </React.Fragment>
        ))}
      </div>

      <button className="carousel-arrow right" onClick={() => go(1)} aria-label="Next">
        ▶
        <span className="arrow-label">→</span>
      </button>
    </div>
  );
}

    <div className="modal-veil" onMouseDown={(e) => { if (e.target.classList.contains("modal-veil")) onClose(); }}>
      <div className="modal" role="dialog" aria-modal="true">
        <div className="modal-head">
          <div className="tag">RECORD</div>
          <h3>&gt; <Glitch className="glitch-sm">{profile.firstName.toUpperCase()} {profile.lastName.toUpperCase()}</Glitch></h3>
          <button className="ctrl-btn" onClick={onClose}>✕ ESC</button>
        </div>

        <div className="modal-body">
          <div>
            <div className="portrait">
              {src ? (
                <img src={src} alt="" draggable="false" />
              ) : (
                <div className="ph">
                  <div>
                    <div style={{fontSize:54, color:"var(--grn-1)", fontFamily:"var(--crt)", letterSpacing:"0.05em", lineHeight:1}}>{initials(profile)}</div>
                    <div style={{marginTop:8}}>[ image src not linked ]</div>
                  </div>
                </div>
              )}
            </div>
            <div className="portrait-meta">
              <span>FILE</span>
              <b>{profile.image || "—"}</b>
            </div>
            <div className="portrait-meta" style={{ borderTop: "none" }}>
              <span>STATUS</span>
              <b>{src ? "LINKED" : "UNRESOLVED"}</b>
            </div>
          </div>

          <div>
            <div className="field-grid">
              <div className="field">
                <span className="k">First Name</span>
                <div className="v">{profile.firstName}</div>
              </div>
              <div className="field">
                <span className="k">Last Name</span>
                <div className="v">{profile.lastName}</div>
              </div>
              <div className="field">
                <span className="k">Date of Birth</span>
                <div className="v">{fmtDate(profile.dob)} <span className="dim">/ AGE {ageFrom(profile.dob)}</span></div>
              </div>
              <div className="field">
                <span className="k">Sex</span>
                <div className="v">{sexLong(profile.sex)}</div>
              </div>
              <div className="field">
                <span className="k">Ethnicity</span>
                <div className="v">{profile.ethnicity || "—"}</div>
              </div>
              <div className="field">
                <span className="k">Reference ID</span>
                <div className="v">{profile.id}</div>
              </div>
              <div className="field full">
                <span className="k">Address</span>
                <div className="v">
                  {profile.address ? (
                    <span
                      className="addr-link"
                      onClick={() => onOpenMap && onOpenMap(profile)}
                      title="open on map"
                    >
                      {profile.address}
                      <span className="addr-tag">→ MAP</span>
                    </span>
                  ) : "—"}
                </div>
              </div>
              <div className="field full">
                <span className="k">Description</span>
                <div className="v">{profile.description || "—"}</div>
              </div>
            </div>

            <div className="contacts-list">
              <div className="head">
                <span>// CONTACT_METHODS</span>
                <span className="dim">{(profile.contacts || []).length} record(s)</span>

              {(profile.contacts || []).length === 0 ? (
                <div className="contact-item" style={{ gridTemplateColumns: "1fr", color: "var(--dim)" }}>
                  [ no contact methods on file ]
                </div>
              ) : (
                (profile.contacts || []).map((c, i) => {
                  const meta = contactMeta(c.type);
                  const href = meta.href ? meta.href(c.value) : null;
                  return (
                    <div className="contact-item" key={i}>
                      <div className="ic">{meta.glyph}</div>
                      <div className="tp">{meta.label}</div>
                      <div className="vl">
                        {href ? <a href={href} target="_blank" rel="noopener noreferrer">{c.value}</a> : c.value}

                      <div className="copy" onClick={() => { try { navigator.clipboard.writeText(c.value); } catch (e) {} }}>copy</div>

        <div className="modal-foot">
          <div className="foot-hint">
            <span className="kbd">ESC</span> close &nbsp;·&nbsp; <span className="kbd">←</span><span className="kbd">→</span> navigate &nbsp;·&nbsp; record is read-only
          </div>
          <div className="foot-actions">
            {onDelete && (
              <button className="ctrl-btn danger" onClick={() => {
                if (window.confirm("Delete this record? This cannot be undone.")) onDelete(profile);
              }}>✕ DELETE</button>
            )}
            {onEdit && (
              <button className="ctrl-btn" onClick={() => onEdit(profile)}>✎ EDIT</button>
            )}

              ⬇ DOWNLOAD .json
            </button>

        </div>
      </div>
    </div>
  );
}

function NewEntryModal({ onClose, onSave, initial }) {
  const editing = !!initial;
  const [form, setForm] = useState({
    firstName: initial ? initial.firstName || "" : "",
    lastName: initial ? initial.lastName || "" : "",
    dob: initial ? initial.dob || "" : "",
    ethnicity: initial ? initial.ethnicity || "" : "",
    sex: initial ? initial.sex || "" : "",
    address: initial ? initial.address || "" : "",
    description: initial ? initial.description || "" : "",
    image: initial ? initial.image || "" : "" // filename
  });
  const [imgPreview, setImgPreview] = useState(initial && initial.imageData ? initial.imageData : null); // data URL
  const [errors, setErrors] = useState({});
  const [contacts, setContacts] = useState(initial && Array.isArray(initial.contacts) ? initial.contacts.map((c) => ({ ...c })) : []);

  const addContact = () => setContacts((c) => [...c, { type: "email", value: "" }]);
  const updateContact = (i, patch) => setContacts((c) => c.map((row, k) => k === i ? { ...row, ...patch } : row));
  const removeContact = (i) => setContacts((c) => c.filter((_, k) => k !== i));

  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  const handlePic = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      setImgPreview(reader.result);
      // store filename so user understands the system; image content goes in 'imageData' too
      set("image", f.name);
    };
    reader.readAsDataURL(f);
  };

  const submit = () => {
    const errs = {};
    if (!form.firstName.trim()) errs.firstName = "required";
    if (!form.lastName.trim()) errs.lastName = "required";
    if (!form.dob) errs.dob = "required";
    if (!form.sex) errs.sex = "required";
    setErrors(errs);
    if (Object.keys(errs).length) return;

    const newId = editing ? initial.id : ("P-0x" + (Math.floor(Math.random() * 0xfff)).toString(16).toUpperCase().padStart(3, "0"));
    const cleanContacts = contacts
      .map((c) => ({ type: c.type, value: (c.value || "").trim() }))
      .filter((c) => c.value);
    const profile = {
      id: newId,
      firstName: form.firstName.trim(),
      lastName: form.lastName.trim(),
      dob: form.dob,
      ethnicity: form.ethnicity.trim(),
      sex: form.sex,
      address: form.address.trim(),
      description: form.description.trim(),
      image: form.image || "",
      contacts: cleanContacts
    };
    if (imgPreview) profile.imageData = imgPreview; // embed for portability when no folder is linked
    onSave(profile, editing);
  };

  return (
    <div className="modal-veil" onMouseDown={(e) => { if (e.target.classList.contains("modal-veil")) onClose(); }}>
      <div className="modal" style={{ width: "min(920px, 100%)" }}>
        <div className="modal-head">
          <div className="tag">{editing ? "EDIT" : "CREATE"}</div>
          <h3>&gt; <Glitch className="glitch-sm">{editing ? `PATCH_ENTRY :: ${initial.id}` : "NEW_ENTRY.appendix()"}</Glitch></h3>
          <button className="ctrl-btn" onClick={onClose}>✕ ESC</button>
        </div>

        <div className="form-grid">
          <div className="picshell">
            <label style={{ color: "var(--grn-3)", fontSize: 10.5, letterSpacing: "0.22em", textTransform: "uppercase" }}>Profile Picture</label>
            <label className="pic">
              <input type="file" accept="image/*" onChange={handlePic} style={{ display: "none" }} />
              {imgPreview ? (
                <img src={imgPreview} alt="" />
              ) : (
                <div className="ph-text">
                  <span className="glyph">⊕</span>
                  click to upload
                  <div style={{ color: "var(--dim)", marginTop: 6, fontSize: 10 }}>jpg / png</div>
                </div>
              )}
            </label>
            <div style={{ color: "var(--dim)", fontSize: 10.5, letterSpacing: "0.14em", textTransform: "uppercase" }}>
              filename → <span style={{ color: "var(--grn-1)", textTransform: "none", letterSpacing: 0 }}>{form.image || "—"}</span>
            </div>
          </div>

          <div className="form-rows">
            <div className="row">
              <label>First Name <span className="req">*</span></label>
              <div className="input-wrap"><span className="pfx">&gt;</span>
                <input value={form.firstName} onChange={(e) => set("firstName", e.target.value)} autoFocus />
              </div>
              {errors.firstName && <div className="err">[ {errors.firstName} ]</div>}
            </div>
            <div className="row">
              <label>Last Name <span className="req">*</span></label>
              <div className="input-wrap"><span className="pfx">&gt;</span>
                <input value={form.lastName} onChange={(e) => set("lastName", e.target.value)} />
              </div>
              {errors.lastName && <div className="err">[ {errors.lastName} ]</div>}
            </div>
            <div className="row">
              <label>Date of Birth <span className="req">*</span></label>
              <div className="input-wrap"><span className="pfx">&gt;</span>
                <input type="date" value={form.dob} onChange={(e) => set("dob", e.target.value)} />
              </div>
              {errors.dob && <div className="err">[ {errors.dob} ]</div>}
            </div>
            <div className="row">
              <label>Sex <span className="req">*</span></label>
              <div className="input-wrap"><span className="pfx">&gt;</span>
                <select value={form.sex} onChange={(e) => set("sex", e.target.value)}>
                  <option value="">[ select ]</option>
                  <option value="M">M / Male</option>
                  <option value="F">F / Female</option>
                  <option value="NB">NB / Non-binary</option>
                  <option value="X">X / Unspecified</option>
                </select>
              </div>
              {errors.sex && <div className="err">[ {errors.sex} ]</div>}
            </div>
            <div className="row full">
              <label>Ethnicity</label>
              <div className="input-wrap"><span className="pfx">&gt;</span>
                <input value={form.ethnicity} onChange={(e) => set("ethnicity", e.target.value)} placeholder="e.g. South Asian, Mixed, Latina" />
              </div>
            </div>
            <div className="row full">
              <label>Address</label>
              <div className="input-wrap"><span className="pfx">&gt;</span>
                <input value={form.address} onChange={(e) => set("address", e.target.value)} placeholder="last known location" />
              </div>
            </div>
            <div className="row full">
              <label>Description</label>
              <div className="input-wrap" style={{ alignItems: "flex-start" }}>
                <span className="pfx">&gt;</span>
                <textarea className="area" value={form.description} onChange={(e) => set("description", e.target.value)} placeholder="notes, affiliations, known patterns…" />
              </div>
            </div>

            <div className="contacts-block">
              <div className="head">
                <span>// CONTACT_METHODS</span>
                <span className="dim">{contacts.length} pending</span>
              </div>
              {contacts.length === 0 ? (
                <div className="contacts-empty">— none yet · click "+ add contact method" below —</div>
              ) : (
                contacts.map((c, i) => (
                  <div className="contact-row" key={i}>
                    <div className="input-wrap">
                      <span className="pfx">@</span>
                      <select value={c.type} onChange={(e) => updateContact(i, { type: e.target.value })}>
                        {CONTACT_TYPES.map((t) => (
                          <option key={t.id} value={t.id}>{t.label}</option>
                        ))}
                      </select>
                    </div>
                    <div className="input-wrap">
                      <span className="pfx">&gt;</span>
                      <input
                        value={c.value}
                        onChange={(e) => updateContact(i, { value: e.target.value })}
                        placeholder={
                          c.type === "email" ? "user@domain.tld"
                          : c.type === "phone" ? "+1 555 123 4567"
                          : c.type === "website" ? "https://…"
                          : c.type === "x" || c.type === "telegram" || c.type === "instagram" ? "@handle"
                          : c.type === "discord" ? "handle#0000"
                          : "value"
                        }
                      />
                    </div>
                    <button type="button" className="icon-btn" title="remove" onClick={() => removeContact(i)}>✕</button>
                  </div>
                ))
              )}
              <div>
                <button type="button" className="ctrl-btn" onClick={addContact}>+ ADD CONTACT METHOD</button>
              </div>
            </div>
          </div>
        </div>

        <div className="modal-foot">
          <div className="foot-hint">
            <span className="kbd">⌘</span> required fields marked with <span className="amber">*</span>
          </div>
          <div className="foot-actions">
            <button className="ctrl-btn" onClick={onClose}>cancel</button>
            <button className="ctrl-btn primary" onClick={submit}>&gt; {editing ? "patch_entry()" : "commit_entry()"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// MAP MODAL
