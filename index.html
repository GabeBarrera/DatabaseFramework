                      />
                    </div>
                    <button type="button" className="icon-btn" title="remove" onClick={() => removeRelationship(i)}>✕</button>
                  </div>
                ))
              )}
              <div>
                <button type="button" className="ctrl-btn" onClick={addRelationship}>+ ADD RELATIONSHIP</button>
              </div>
            </div>

            <div className="contacts-block">
              <div className="head">
                <span>// FLAGS</span>
                <span className="dim">{Object.values(flags).filter(Boolean).length} active</span>
              </div>
              <div className="status-toggles" style={{ paddingTop: 4 }}>
                <button
                  type="button"
                  className={"status-toggle poi " + (flags.poi ? "on" : "")}
                  onClick={() => toggleFlag("poi")}

                <button
                  type="button"
                  className={"status-toggle hidden " + (flags.hidden ? "on" : "")}
                  onClick={() => toggleFlag("hidden")}
                  title="Hidden — never sent to the geocoder, won't appear on the map"
                >◌ HIDDEN</button>
                <button
                  type="button"
                  className={"status-toggle classified " + (flags.classified ? "on" : "")}
                  onClick={() => toggleFlag("classified")}
                  title="Classified — removed from carousel and search until shell unlocks it"
                >▮ CLASSIFIED</button>
              </div>
            </div>
          </div>
        </div>

        <div className="modal-foot">
          <div className="foot-hint">
            <span className="kbd">⌘</span> required fields marked with <span className="amber">*</span>
          </div>
          <div className="foot-actions">
            <button className="ctrl-btn" onClick={onClose}>cancel</button>
            <button className="ctrl-btn primary" onClick={submit}>&gt; {editing ? "patch_entry()" : "commit_entry()"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MAP MODAL
// ============================================================
function MapModal({ profiles, onClose, onSelect, focusId }) {
  const stageRef = useRef(null);
  const mapDivRef = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef({}); // id -> L.marker
  const userLocRef = useRef(null); // [lat, lng] when geolocation succeeds
  const [active, setActive] = useState(focusId || null);
  const [pins, setPins] = useState([]); // [{profile, lat, lng, display}]
  const [progress, setProgress] = useState({ done: 0, total: 0, status: "idle" });
  const [unresolved, setUnresolved] = useState([]); // profiles whose addresses returned no hit
  const [zoom, setZoom] = useState(2);
  const [locStatus, setLocStatus] = useState("pending"); // pending|granted|denied|unavailable
  const [listOpen, setListOpen] = useState(true);

  // ESC to close
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  // initialize leaflet exactly once
  useEffect(() => {
    if (!mapDivRef.current || mapRef.current) return;
    const m = L.map(mapDivRef.current, {
      zoomControl: false,
      attributionControl: true,
      worldCopyJump: true,
      minZoom: 2,
      maxZoom: 18,
      zoomSnap: 0.25,
      wheelDebounceTime: 30
    }).setView([20, 0], 2);

    // strip the "🇺🇦 Leaflet" prefix from attribution
    if (m.attributionControl) m.attributionControl.setPrefix(false);

    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution:
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> ' +
        '&middot; tiles <a href="https://carto.com/attributions">CARTO</a> ' +
        '&middot; geocoding <a href="https://nominatim.openstreetmap.org/">Nominatim</a>',
      subdomains: "abcd",
      maxZoom: 19,
      className: "cyber-tiles"
    }).addTo(m);

    m.on("zoomend", () => setZoom(m.getZoom()));
    mapRef.current = m;

    // ensure proper sizing after the modal animates in
    setTimeout(() => m.invalidateSize(), 80);

    // start on the user's current location, if they permit
    if (navigator.geolocation) {
      setLocStatus("pending");
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const ll = [pos.coords.latitude, pos.coords.longitude];
          userLocRef.current = ll;
          try { m.setView(ll, 9, { animate: true }); } catch (e) {}
          setLocStatus("granted");
        },
        () => { setLocStatus("denied"); },
        { enableHighAccuracy: false, timeout: 6000, maximumAge: 60000 }
      );
    } else {
      setLocStatus("unavailable");
    }

    return () => { try { m.remove(); } catch (e) {} mapRef.current = null; };
  }, []);

  // geocode all profiles (cached) — runs whenever profile list changes
  useEffect(() => {
    let cancelled = false;
    (async () => {
      const eligible = profiles.filter((p) => !p.hidden);
      const total = eligible.length;
      setProgress({ done: 0, total, status: total ? "geocoding" : "idle" });
      const out = [];
      const missing = [];
      let done = 0;
      // Pass 1: cache hits (sync)
      const queue = [];
      profiles.forEach((p) => {
        if (p.hidden) return; // hidden profiles never get geocoded
        if (!p.address) { missing.push(p); done++; return; }
        const cached = geocodeCached(p.address);
        if (cached === undefined) {
          queue.push(p);
        } else if (cached) {
          out.push({ profile: p, lat: cached.lat, lng: cached.lng, display: cached.display });
          done++;
        } else {
          missing.push(p);
          done++;
        }
      });
      if (!cancelled) {
        setPins([...out]);
        setUnresolved([...missing]);
        setProgress({ done, total, status: queue.length ? "geocoding" : "ready" });
      }
      // Pass 2: hit Nominatim for any uncached, serialized via the queue
      for (const p of queue) {
        if (cancelled) return;
        const r = await geocodeOSM(p.address);
        done++;
        if (cancelled) return;
        if (r) {
          out.push({ profile: p, lat: r.lat, lng: r.lng, display: r.display });
          setPins([...out]);
        } else {
          missing.push(p);
          setUnresolved([...missing]);
        }
        setProgress({ done, total, status: done >= total ? "ready" : "geocoding" });
      }
    })();
    return () => { cancelled = true; };
  }, [profiles]);

  // render markers
  useEffect(() => {
    const m = mapRef.current;
    if (!m) return;
    // clear old
    Object.values(markersRef.current).forEach((mk) => { try { mk.remove(); } catch (e) {} });
    markersRef.current = {};

    pins.forEach((p) => {
      const isActive = p.profile.id === active;
      const label = (p.profile.firstName || "") + " " + (p.profile.lastName ? p.profile.lastName.charAt(0) + "." : "");
      const html =
        '<div class="hit"></div>' +
        (isActive ? '<div class="square"></div>' : '') +
        '<div class="ping"></div>' +
        '<div class="ring2"></div>' +
        '<div class="ring"></div>' +
        '<div class="core"></div>' +
        '<div class="label">' + escapeHTML(label) + '</div>';
      const icon = L.divIcon({
        html,
        className: "cyber-pin" + (isActive ? " active" : ""),
        iconSize: [28, 28],
        iconAnchor: [14, 14]
      });
      const marker = L.marker([p.lat, p.lng], { icon, riseOnHover: true }).addTo(m);

      const popupHtml =
        '<div class="cyber-popup">' +
          '<span class="id">' + escapeHTML(p.profile.id || "") + '</span>' +
          (p.profile.classified ? '<div class="cls-tag">▮ CLASSIFIED</div>' : '') +
          '<div class="nm">' + escapeHTML((p.profile.firstName || "") + " " + (p.profile.lastName || "")) + '</div>' +
          '<div class="row"><span class="k">DOB</span><span class="v">' + escapeHTML(fmtDate(p.profile.dob)) + '</span></div>' +
          '<div class="row"><span class="k">ETHN</span><span class="v">' + escapeHTML(p.profile.ethnicity || "—") + '</span></div>' +
          '<div class="row"><span class="k">SEX</span><span class="v">' + escapeHTML(sexLong(p.profile.sex)) + '</span></div>' +
          '<div class="ad">' + escapeHTML(p.profile.address || "") + '</div>' +
          '<button class="open-btn" data-pid="' + escapeHTML(p.profile.id) + '">&gt; open record</button>' +
        '</div>';

      marker.bindPopup(popupHtml, {
        closeButton: true,
        offset: [0, -6],
        maxWidth: 320,
        className: "cyber-popup-wrap"
      });
      marker.on("click", () => setActive(p.profile.id));
      marker.on("dblclick", (e) => { L.DomEvent.stopPropagation(e); onSelect(p.profile); });
      marker.on("popupopen", (ev) => {
        const node = ev.popup.getElement();
        if (!node) return;
        const btn = node.querySelector(".open-btn");
        if (btn) btn.addEventListener("click", () => onSelect(p.profile));
      });
      markersRef.current[p.profile.id] = marker;
    });

    // auto-fit to pins only when we haven't locked onto user location or a focus pin
    if (pins.length > 0 && !focusId && locStatus !== "granted" && m.getZoom() <= 2) {
      try {
        const bounds = L.latLngBounds(pins.map((p) => [p.lat, p.lng]));
        m.fitBounds(bounds, { padding: [60, 60], maxZoom: 5, animate: true });
      } catch (e) {}
    }
  }, [pins, active]);

  // crosshair: green lat/lng lines through the active pin
  const crosshairRef = useRef(null);
  useEffect(() => {
    const m = mapRef.current;
    if (!m) return;
    // tear down any existing crosshair
    if (crosshairRef.current) {
      try { crosshairRef.current.remove(); } catch (e) {}
      crosshairRef.current = null;
    }
    if (!active) return;
    const pin = pins.find((x) => x.profile.id === active);
    if (!pin) return;
    const group = L.layerGroup();
    // horizontal — latitude (solid green)
    L.polyline([[pin.lat, -180], [pin.lat, 180]], {
      color: "#00ff66",
      weight: 1.5,
      opacity: 1,
      interactive: false,
      className: "cross-line cross-lat"
    }).addTo(group);
    // vertical — longitude (solid green)
    L.polyline([[-85, pin.lng], [85, pin.lng]], {
      color: "#00ff66",
      weight: 1.5,
      opacity: 1,
      interactive: false,
      className: "cross-line cross-lng"
    }).addTo(group);
    group.addTo(m);
    crosshairRef.current = group;
  }, [active, pins]);

  // fly to focus when focusId changes
  useEffect(() => {
    const m = mapRef.current;
    if (!m || !focusId) return;
    const pin = pins.find((p) => p.profile.id === focusId);
    if (pin) {
      m.flyTo([pin.lat, pin.lng], 9, { duration: 0.9 });
      setActive(focusId);
      const mk = markersRef.current[focusId];
      if (mk) setTimeout(() => { try { mk.openPopup(); } catch (e) {} }, 950);
    }
  }, [focusId, pins.length]);

  // when window resizes, tell Leaflet
  useEffect(() => {
    const onR = () => mapRef.current && mapRef.current.invalidateSize();
    window.addEventListener("resize", onR);
    return () => window.removeEventListener("resize", onR);
  }, []);

  // controls
  const zoomIn = () => mapRef.current && mapRef.current.zoomIn();
  const zoomOut = () => mapRef.current && mapRef.current.zoomOut();
  const fit = () => {
    const m = mapRef.current;
    if (!m) return;
    if (pins.length === 0) { m.setView([20, 0], 2); return; }
    if (pins.length === 1) { m.setView([pins[0].lat, pins[0].lng], 6); return; }
    const bounds = L.latLngBounds(pins.map((p) => [p.lat, p.lng]));
    m.fitBounds(bounds, { padding: [60, 60], maxZoom: 6, animate: true });
  };

  const flyTo = (pin) => {
    const m = mapRef.current;
    if (!m) return;
    m.flyTo([pin.lat, pin.lng], Math.max(9, m.getZoom()), { duration: 0.7 });
    setActive(pin.profile.id);
    const mk = markersRef.current[pin.profile.id];
    if (mk) setTimeout(() => { try { mk.openPopup(); } catch (e) {} }, 720);
  };

  const pct = progress.total ? Math.round((progress.done / progress.total) * 100) : 100;

  return (
    <div className="modal-veil" onMouseDown={(e) => { if (e.target.classList.contains("modal-veil")) onClose(); }}>
      <div className="modal map-modal">
        <div className="modal-head">
          <div className="tag">RECON</div>
          <h3>&gt; <Glitch className="glitch-sm">WORLD_MAP // {pins.length} NODE(S){unresolved.length ? ' · ' + unresolved.length + ' UNRESOLVED' : ''}</Glitch></h3>
          <button className="ctrl-btn" onClick={onClose}>✕ ESC</button>
        </div>

        <div ref={stageRef} className="map-stage" style={{ position: "relative" }}>
          <div className="map-overlay-tl">
            <div>// SRC: <b>OpenStreetMap / CARTO</b></div>
            <div>// GEO: <b>Nominatim</b></div>
            <div>// LOC: <b>{locStatus === "pending" ? "requesting…" : locStatus === "granted" ? "current location" : locStatus === "denied" ? "denied" : "n/a"}</b></div>
            <div>// ZOOM: <b>{zoom.toFixed(2)}</b></div>
            <div>// PIN_LOCK: <b>{active || "—"}</b></div>
          </div>

          <div ref={mapDivRef} style={{ position: "absolute", inset: 0 }} />

          {/* node list overlay */}
          <div className={"map-list" + (listOpen ? "" : " hidden")}>
            <div className="lhead">
              <span>// NODES // WORLD</span>
              <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                <span>{pins.length.toString().padStart(2, "0")} / {(pins.length + unresolved.length).toString().padStart(2, "0")}</span>
                <button className="list-toggle" onClick={() => setListOpen((o) => !o)} title={listOpen ? "hide list" : "show list"}>
                  {listOpen ? "▲ HIDE" : "▼ SHOW"}
                </button>
              </div>
            </div>
            <div className="lbody">
              {pins.length === 0 && unresolved.length === 0 && (
                <div style={{ padding: "20px 12px", color: "var(--dim)", fontSize: 11, letterSpacing: "0.12em" }}>
                  [ no addresses to plot ]
                </div>
              )}
              {pins.map((p) => (
                <div
                  key={p.profile.id}
                  className={"map-row " + (p.profile.id === active ? "on" : "")}
                  onClick={() => flyTo(p)}
                  onDoubleClick={() => onSelect(p.profile)}
                >
                  <div className="dot-s" />
                  <div>
                    <div className="nm">{p.profile.firstName} {p.profile.lastName}</div>
                    <div className="lc">{p.lat.toFixed(2)}, {p.lng.toFixed(2)}</div>
                  </div>
                  <div className="co">{p.profile.id}</div>
                </div>
              ))}
              {unresolved.length > 0 && (
                <div className="off-head">
                  <span>// UNRESOLVED</span>
                  <span>{unresolved.length.toString().padStart(2, "0")}</span>
                </div>
              )}
              {unresolved.map((p) => (
                <div
                  key={p.id}
                  className="map-row off"
                  onDoubleClick={() => onSelect(p)}
                  title={p.address ? "no Nominatim match for: " + p.address : "no address on file"}
                >
                  <div className="dot-s" />
                  <div>
                    <div className="nm">{p.firstName} {p.lastName}</div>
                    <div className="lc">{p.address ? "geocode failed" : "no addr"}</div>
                  </div>
                  <div className="co">{p.id}</div>
                </div>
              ))}
            </div>
          </div>

          {/* progress veil */}
          {progress.status === "geocoding" && (
            <div className="geo-veil">
              <div>// NOMINATIM // <b>{progress.done}/{progress.total}</b></div>
              <div>respecting 1 req/sec rate limit…</div>
              <div className="bar" style={{ "--p": pct + "%" }} />
            </div>
          )}
        </div>

        <div className="modal-foot">
          <div className="foot-hint">
            <span className="kbd">drag</span> pan &nbsp;·&nbsp;
            <span className="kbd">wheel</span> zoom &nbsp;·&nbsp;
            <span className="kbd">click</span> popup &nbsp;·&nbsp;
            <span className="kbd">2x</span> open record
          </div>
          <div className="foot-actions">
            <button className="ctrl-btn map-btn" onClick={zoomIn} title="zoom in">+</button>
            <button className="ctrl-btn map-btn" onClick={zoomOut} title="zoom out">−</button>
            <button
              className="ctrl-btn map-btn"
              onClick={() => {
                const m = mapRef.current;
                if (!m || !userLocRef.current) return;
                m.flyTo(userLocRef.current, 11, { duration: 0.7 });
              }}
              disabled={!userLocRef.current}
              style={{ opacity: userLocRef.current ? 1 : 0.4 }}
              title="my location"
            >ME</button>
            <button className="ctrl-btn" onClick={fit}>↺ FIT</button>
            <button
              className="ctrl-btn primary"
              onClick={() => {
                const p = pins.find((x) => x.profile.id === active);
                if (p) onSelect(p.profile);
              }}
              disabled={!active}
              style={{ opacity: active ? 1 : 0.4 }}
            >
              &gt; open record
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// Small helper used inside leaflet HTML strings
function escapeHTML(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// ============================================================
// TERMINAL — command prompt that replaces the folder bar
// ============================================================
function Terminal({ runCommand, banner, fullrail, chatMode }) {
  const [value, setValue] = useState("");
  const [history, setHistory] = useState(banner ? [{ cmd: null, lines: banner }] : []);
  const [cmdHistory, setCmdHistory] = useState([]);
  const [histIdx, setHistIdx] = useState(-1);
  const inputRef = useRef(null);
  const bodyRef = useRef(null);
  const PROMPT = chatMode ? "persona@chat:~$" : "persona@root:~$";

  useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [history]);

  const submit = (e) => {
    e.preventDefault();
    const cmd = value;
    if (!cmd.trim()) return;
    const result = runCommand(cmd);
    if (result === "__clear__") {
      setHistory([]);
    } else {
      const lines = Array.isArray(result)
        ? result.map((x) => typeof x === "string" ? { kind: "out", text: x } : x)
        : result == null ? []
        : [{ kind: "out", text: String(result) }];
      setHistory((h) => [...h, { cmd, lines }].slice(-200));
    }
    setCmdHistory((h) => (h[h.length - 1] === cmd ? h : [...h, cmd]).slice(-100));
    setHistIdx(-1);
    setValue("");
  };

  const onKey = (e) => {
    if (e.key === "ArrowUp") {
      e.preventDefault();
      if (cmdHistory.length === 0) return;
      const i = histIdx === -1 ? cmdHistory.length - 1 : Math.max(0, histIdx - 1);
      setHistIdx(i);
      setValue(cmdHistory[i]);
    } else if (e.key === "ArrowDown") {
      e.preventDefault();
      if (histIdx === -1) return;
      const i = histIdx + 1;
      if (i >= cmdHistory.length) { setHistIdx(-1); setValue(""); }
      else { setHistIdx(i); setValue(cmdHistory[i]); }
    }
  };

  return (
    <div className={"terminal" + (fullrail ? " fullrail" : "") + (history.length === 0 ? " collapsed" : "")}
         onClick={() => inputRef.current && inputRef.current.focus()}>
      {(fullrail || history.length > 0) && (
        <div className="term-body" ref={bodyRef}>
          {history.length === 0 && fullrail ? (
            <div className="term-out dim">// type 'help' to see what this shell can do.</div>
          ) : history.map((h, i) => (
            <div key={i} className="term-entry">
              {h.cmd != null && (
                <div className="term-cmd"><span className="term-pfx">{PROMPT}</span> {h.cmd}</div>
              )}
              {h.lines.map((l, j) => {
                if (l && typeof l === "object" && l.kind === "cmd-row") {
                  return (
                    <div key={j} className="term-row">
                      <span className="term-row-cmd">{l.cmd}</span>
                      <span className="term-row-desc">{l.desc}</span>
                    </div>
                  );
                }
                const text = typeof l === "string" ? l : l.text;
                const kind = typeof l === "string" ? "out" : (l.kind || "out");
                return <div key={j} className={"term-out " + (kind === "out" ? "" : kind)}>{text}</div>;
              })}
            </div>
          ))}
        </div>
      )}
      <form className="term-input-row" onSubmit={submit}>
        <span className="term-pfx">{PROMPT}</span>
        {!value && <span className="term-cursor">▌</span>}
        <input
          ref={inputRef}
          className="term-input"
          value={value}
          onChange={(e) => setValue(e.target.value)}
          onKeyDown={onKey}
          autoComplete="off"
          spellCheck={false}
          placeholder={chatMode ? "ask a question…" : "try 'help'"}
        />
      </form>
    </div>
  );
}

// ============================================================
// PURGE MODAL
// ============================================================
function PurgeModal({ count, onConfirm, onClose }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  return (
    <div className="modal-veil" onMouseDown={(e) => { if (e.target.classList.contains("modal-veil")) onClose(); }}>
      <div className="modal" style={{ width: "min(520px, 100%)" }}>
        <div className="modal-head">
          <div className="tag" style={{ borderColor: "var(--red)", color: "var(--red)" }}>WARN</div>
          <h3 style={{ color: "var(--red)" }}>&gt; <span style={{ letterSpacing: "0.22em" }}>PURGE_ALL :: IRREVERSIBLE</span></h3>
          <button className="ctrl-btn" onClick={onClose}>✕ ESC</button>
        </div>

        <div style={{ padding: "28px 28px 20px 28px", display: "grid", gap: 18 }}>
          <div style={{
            border: "1px solid rgba(255,51,85,0.45)",
            background: "rgba(255,51,85,0.06)",
            padding: "14px 16px",
            display: "grid",
            gap: 8,
          }}>
            <div style={{ color: "var(--red)", fontWeight: 700, letterSpacing: "0.2em", textTransform: "uppercase", fontSize: 12 }}>
              ⚠ &nbsp;WARNING: DESTRUCTIVE OPERATION
            </div>
            <div style={{ color: "var(--txt)", fontSize: 12.5, lineHeight: 1.65 }}>
              This will permanently delete <span style={{ color: "var(--red)", fontWeight: 700 }}>{count} record{count !== 1 ? "s" : ""}</span> from the database.
              All profile data, contacts, relationships, and embedded images will be erased from local storage.
            </div>
            <div style={{ color: "var(--dim)", fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase" }}>
              // this action cannot be undone
            </div>
          </div>

          <div style={{ color: "var(--dim)", fontSize: 11, letterSpacing: "0.16em", textTransform: "uppercase" }}>
            Confirm you wish to proceed:
          </div>
        </div>

        <div className="modal-foot">
          <div className="foot-hint" style={{ color: "var(--red)", letterSpacing: "0.14em" }}>
            {count} record{count !== 1 ? "s" : ""} will be deleted
          </div>
          <div className="foot-actions">
            <button className="ctrl-btn" onClick={onClose}>↩ ABORT</button>
            <button
              className="ctrl-btn danger"
              style={{ background: "var(--red)", color: "#fff", borderColor: "var(--red)", boxShadow: "0 0 14px rgba(255,51,85,0.4)" }}
              onClick={onConfirm}
            >⚠ CONFIRM PURGE</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// RELATIONSHIPS GRAPH MODAL
// ============================================================

// Relationship types that represent blood/direct family
const FAMILY_TYPES = new Set([
  "mother","father","parent","child","son","daughter",
  "brother","sister","sibling",
  "aunt","uncle","nephew","niece",
  "grandparent","grandchild",
  "spouse","partner","ex","cousin"
]);
// Relationship types that establish a parent→child link
const PC_TYPES = new Set(["mother","father","parent","child","son","daughter"]);

function buildRelGraph(profiles, hiddenIds) {
  const visible    = profiles.filter((p) => !hiddenIds.has(p.id));
  const visibleSet = new Set(visible.map((p) => p.id));

  // ── Build parent→child maps ──────────────────────────────────────────────
  const parentOf   = {}; // childId  → [parentId, ...]
  const childrenOf = {}; // parentId → [childId,  ...]
  const addPC = (parentId, childId) => {
    if (!visibleSet.has(parentId) || !visibleSet.has(childId) || parentId === childId) return;
    if (!parentOf[childId])    parentOf[childId]    = [];
    if (!childrenOf[parentId]) childrenOf[parentId] = [];
    if (!parentOf[childId].includes(parentId))    parentOf[childId].push(parentId);
    if (!childrenOf[parentId].includes(childId))  childrenOf[parentId].push(childId);
  };
  visible.forEach((p) => {
    (p.relationships || []).forEach((r) => {
      if (!r.refId || !visibleSet.has(r.refId)) return;
      const t = (r.type || "").toLowerCase();
      if (["mother","father","parent"].includes(t)) addPC(r.refId, p.id);
      if (["child","son","daughter"].includes(t))   addPC(p.id, r.refId);
    });
  });

  // ── Group children by shared pair of visible parents (nuclear families) ──
  const fgMap        = {}; // "P1::P2" → { p1, p2, children: Set }
  const childInGroup = new Set();
  Object.entries(parentOf).forEach(([childId, parents]) => {
    if (parents.length >= 2) {
      const [p1, p2] = [...parents].sort();
      const key = `${p1}::${p2}`;
      if (!fgMap[key]) fgMap[key] = { p1, p2, children: new Set() };
      fgMap[key].children.add(childId);
      childInGroup.add(childId);
    }
  });
  const familyGroups = Object.values(fgMap).map((fg) => ({
    p1: fg.p1, p2: fg.p2, children: [...fg.children]
  }));
  // Children with only one visible parent get a direct line
  const singleParentEdges = [];
  Object.entries(parentOf).forEach(([childId, parents]) => {
    if (!childInGroup.has(childId)) singleParentEdges.push({ parent: parents[0], child: childId });
  });

  // ── Redundancy checks ────────────────────────────────────────────────────
  // Suppress grandparent↔grandchild if an intermediate parent is visible
  const isGPGCRedundant = (gpId, gcId) =>
    (parentOf[gcId] || []).some((pId) => (parentOf[pId] || []).includes(gpId));

  // Suppress cousin↔cousin if the full chain A→pA→gp→pB→B is visible
  const isCousinRedundant = (aId, bId) => {
    for (const pA of (parentOf[aId] || [])) {
      for (const gp of (parentOf[pA] || [])) {
        for (const pB of (childrenOf[gp] || [])) {
          if (pB !== pA && (parentOf[bId] || []).includes(pB)) return true;
        }
      }
    }
    return false;
  };

  // ── Build social + family-direct edge lists ──────────────────────────────
  const seen             = new Set();
  const socialEdges      = []; // non-family connections
  const familyDirectEdges = []; // family connections that aren't parent→child

  visible.forEach((p) => {
    (p.relationships || []).forEach((r) => {
      if (!r.refId || !visibleSet.has(r.refId)) return;
      const t   = (r.type || "").toLowerCase();
      if (PC_TYPES.has(t)) return; // handled via parentOf / familyGroups
      const key = [p.id, r.refId].sort().join("↔");
      if (seen.has(key)) return;
      seen.add(key);
      if (FAMILY_TYPES.has(t)) {
        if (t === "grandparent" && isGPGCRedundant(r.refId, p.id)) return;
        if (t === "grandchild"  && isGPGCRedundant(p.id, r.refId)) return;
        if (t === "cousin"      && isCousinRedundant(p.id, r.refId)) return;
        familyDirectEdges.push({ source: p.id, target: r.refId, label: t });
      } else {
        socialEdges.push({ source: p.id, target: r.refId, label: t });
      }
    });
  });

  // ── Connectivity (who has at least one visible link) ────────────────────
  const connectedIds = new Set();
  const mark = (a, b) => { connectedIds.add(a); connectedIds.add(b); };
  socialEdges.forEach((e)       => mark(e.source, e.target));
  familyDirectEdges.forEach((e) => mark(e.source, e.target));
  singleParentEdges.forEach((e) => mark(e.parent, e.child));
  familyGroups.forEach((fg) => {
    connectedIds.add(fg.p1); connectedIds.add(fg.p2);
    fg.children.forEach((id) => connectedIds.add(id));
  });

  // Flat edge list passed to the force layout (all edges as source/target pairs)
  const allEdges = [
    ...socialEdges,
    ...familyDirectEdges,
    ...singleParentEdges.map((e) => ({ source: e.parent, target: e.child })),
    ...familyGroups.flatMap((fg) => [
      { source: fg.p1, target: fg.p2 },
      ...fg.children.map((c) => ({ source: fg.p1, target: c })),
      ...fg.children.map((c) => ({ source: fg.p2, target: c })),
    ]),
  ];

  return {
    connected: visible.filter((p) =>  connectedIds.has(p.id)),
    isolated:  visible.filter((p) => !connectedIds.has(p.id)),
    socialEdges, familyDirectEdges, familyGroups, singleParentEdges, allEdges,
  };
}

function forceLayout(nodes, edges, W, H, NW, NH, iters) {
  if (nodes.length === 0) return {};

  // Minimum center-to-center distance to guarantee no rectangle overlap
  const MIN_D = Math.hypot(NW, NH) * 0.68 + 32;
  const BND   = 12; // canvas boundary padding

  // ---- Detect connected components via BFS ----
  const adj = {};
  nodes.forEach((n) => { adj[n.id] = []; });
  edges.forEach((e) => {
    if (adj[e.source]) adj[e.source].push(e.target);
    if (adj[e.target]) adj[e.target].push(e.source);
  });
  const visited = new Set();
  const components = [];
  nodes.forEach((n) => {
    if (visited.has(n.id)) return;
    const comp = [];
    const queue = [n.id];
    while (queue.length) {
      const cur = queue.shift();
      if (visited.has(cur)) continue;
      visited.add(cur);
      comp.push(cur);
      adj[cur].forEach((nb) => { if (!visited.has(nb)) queue.push(nb); });
    }
    components.push(comp);
  });
  const nC = components.length;

  // Estimated "spread radius" for each component (used for inter-cluster repulsion)
  const compR = components.map((c) => Math.max(MIN_D * 0.7, Math.sqrt(c.length) * MIN_D * 0.6));

  // ---- Assign one starting region per component ----
  const compCx = [], compCy = [];
  const margin = MIN_D;
  const uw = W - margin * 2, uh = H - margin * 2;

  if (nC === 1) {
    compCx[0] = W / 2; compCy[0] = H / 2;
  } else if (nC === 2) {
    compCx[0] = margin + uw * 0.28; compCy[0] = H / 2;
    compCx[1] = margin + uw * 0.72; compCy[1] = H / 2;
  } else {
    // Spread centres on a circle, radius scales with how many clusters there are
    const cr = Math.min(uw, uh) * 0.30;
    components.forEach((_, i) => {
      const ang = (i / nC) * Math.PI * 2 - Math.PI / 2;
      compCx[i] = W / 2 + cr * Math.cos(ang);
      compCy[i] = H / 2 + cr * Math.sin(ang);
    });
  }

  // ---- Initialise node positions within each component's region ----
  const pos = {};
  components.forEach((comp, ci) => {
    const r0 = Math.max(MIN_D * 0.3, (comp.length - 1) * MIN_D * 0.28);
    comp.forEach((id, i) => {
      const ang = (i / Math.max(1, comp.length)) * Math.PI * 2;
      pos[id] = {
        x: compCx[ci] + r0 * Math.cos(ang) + (Math.random() - 0.5) * 6,
        y: compCy[ci] + r0 * Math.sin(ang) + (Math.random() - 0.5) * 6,
        vx: 0, vy: 0
      };
    });
  });

  const ids       = nodes.map((n) => n.id);
  const REPEL     = MIN_D * MIN_D * 2.2;   // soft repulsion
  const COL_K     = 1.4;                    // collision impulse multiplier
  const K_S       = 0.05;                   // spring stiffness
  const L_REST    = MIN_D * 1.6;            // natural edge length
  const COMP_G    = 0.05;                   // intra-cluster gravity
  const GLOBAL_G  = 0.004;                  // weak pull to canvas centre
  const INTER_K   = 0.14;                   // inter-cluster repulsion impulse

  for (let it = 0; it < iters; it++) {
    const t    = it / iters;
    const damp = 0.90 - 0.32 * t;          // cooling: 0.90 → 0.58

    const fx = {}, fy = {};
    ids.forEach((id) => { fx[id] = 0; fy[id] = 0; });

    // Pairwise: soft repulsion + hard collision
    for (let i = 0; i < ids.length; i++) {
      for (let j = i + 1; j < ids.length; j++) {
        const a = pos[ids[i]], b = pos[ids[j]];
        const dx = b.x - a.x, dy = b.y - a.y;
        const d  = Math.sqrt(dx * dx + dy * dy) || 0.01;
        const ux = dx / d, uy = dy / d;
        // Soft repulsion
        const rf = REPEL / (d * d);
        fx[ids[i]] -= rf * ux; fy[ids[i]] -= rf * uy;
        fx[ids[j]] += rf * ux; fy[ids[j]] += rf * uy;
        // Hard collision: extra push when centres are too close
        if (d < MIN_D) {
          const cf = COL_K * (MIN_D - d);
          fx[ids[i]] -= cf * ux; fy[ids[i]] -= cf * uy;
          fx[ids[j]] += cf * ux; fy[ids[j]] += cf * uy;
        }
      }
    }

    // Edge springs
    edges.forEach((e) => {
      const a = pos[e.source], b = pos[e.target];
      if (!a || !b) return;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d  = Math.sqrt(dx * dx + dy * dy) || 0.01;
      const sf = K_S * (d - L_REST);
      fx[e.source] += sf * dx / d; fy[e.source] += sf * dy / d;
      fx[e.target] -= sf * dx / d; fy[e.target] -= sf * dy / d;
    });

    // Intra-cluster gravity: pull each node toward its cluster's live centroid
    components.forEach((comp) => {
      if (comp.length < 2) return;
      let cx = 0, cy = 0;
      comp.forEach((id) => { cx += pos[id].x; cy += pos[id].y; });
      cx /= comp.length; cy /= comp.length;
      comp.forEach((id) => {
        fx[id] += COMP_G * (cx - pos[id].x);
        fy[id] += COMP_G * (cy - pos[id].y);
      });
    });

    // Inter-cluster repulsion: push component centroids apart
    if (nC > 1) {
      const cens = components.map((comp) => {
        let cx = 0, cy = 0;
        comp.forEach((id) => { cx += pos[id].x; cy += pos[id].y; });
        return { x: cx / comp.length, y: cy / comp.length };
      });
      for (let i = 0; i < nC; i++) {
        for (let j = i + 1; j < nC; j++) {
          const dx = cens[j].x - cens[i].x, dy = cens[j].y - cens[i].y;
          const d  = Math.sqrt(dx * dx + dy * dy) || 0.01;
          const minSep = compR[i] + compR[j] + MIN_D * 1.1;
          if (d < minSep) {
            const f  = INTER_K * (minSep - d);
            const ux = dx / d, uy = dy / d;
            components[i].forEach((id) => { fx[id] -= f * ux; fy[id] -= f * uy; });
            components[j].forEach((id) => { fx[id] += f * ux; fy[id] += f * uy; });
          }
        }
      }
    }

    // Weak global gravity (prevents drift to edges)
    ids.forEach((id) => {
      fx[id] += GLOBAL_G * (W / 2 - pos[id].x);
      fy[id] += GLOBAL_G * (H / 2 - pos[id].y);
    });

    // Integrate with velocity cap
    const maxV = MIN_D * 0.55;
    ids.forEach((id) => {
      const p = pos[id];
      p.vx = (p.vx + fx[id]) * damp;
      p.vy = (p.vy + fy[id]) * damp;
      const spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (spd > maxV) { p.vx *= maxV / spd; p.vy *= maxV / spd; }
      p.x = Math.max(NW / 2 + BND, Math.min(W - NW / 2 - BND, p.x + p.vx));
      p.y = Math.max(NH / 2 + BND, Math.min(H - NH / 2 - BND, p.y + p.vy));
    });
  }

  // ---- Position-projection pass: resolve any remaining overlaps ----
  for (let pass = 0; pass < 30; pass++) {
    let clean = true;
    for (let i = 0; i < ids.length; i++) {
      for (let j = i + 1; j < ids.length; j++) {
        const a = pos[ids[i]], b = pos[ids[j]];
        const dx = b.x - a.x, dy = b.y - a.y;
        const d  = Math.sqrt(dx * dx + dy * dy) || 0.01;
        if (d < MIN_D) {
          clean = false;
          const push = (MIN_D - d) / 2 + 0.5;
          const ux = dx / d, uy = dy / d;
          a.x -= ux * push; a.y -= uy * push;
          b.x += ux * push; b.y += uy * push;
          a.x = Math.max(NW/2+BND, Math.min(W-NW/2-BND, a.x));
          a.y = Math.max(NH/2+BND, Math.min(H-NH/2-BND, a.y));
          b.x = Math.max(NW/2+BND, Math.min(W-NW/2-BND, b.x));
          b.y = Math.max(NH/2+BND, Math.min(H-NH/2-BND, b.y));
        }
      }
    }
    if (clean) break;
  }

  return pos;
}

function RelationshipsModal({ profiles, onClose, onSelect }) {
  const NODE_W = 152, NODE_H = 64, ISO_X = 18;
  const [hiddenIds, setHiddenIds] = useState(new Set());
  const [listOpen, setListOpen]   = useState(true);
  const wrapRef = useRef(null);
  const svgRef  = useRef(null);
  const [size, setSize] = useState({ w: 1200, h: 700 });
  const [transform, setTransform] = useState({ x: 0, y: 0, k: 1 });
  const transformRef  = useRef({ x: 0, y: 0, k: 1 });
  const canvasDragRef = useRef(null); // { sx, sy } — canvas pan
  const nodeDragRef   = useRef(null); // { id, ox, oy, moved } — node drag
  const nodeWasDragged = useRef(false);

  // Keep transformRef current so event handlers avoid stale closures
  useEffect(() => { transformRef.current = transform; }, [transform]);

  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  useEffect(() => {
    if (!wrapRef.current) return;
    const ro = new ResizeObserver((entries) => {
      const { width, height } = entries[0].contentRect;
      if (width > 0 && height > 0) setSize({ w: width, h: height });
    });
    ro.observe(wrapRef.current);
    return () => ro.disconnect();
  }, []);

  const {
    connected, isolated,
    socialEdges, familyDirectEdges, familyGroups, singleParentEdges, allEdges,
  } = useMemo(() => buildRelGraph(profiles, hiddenIds), [profiles, hiddenIds]);

  const isolatedSet = useMemo(() => new Set(isolated.map((p) => p.id)), [isolated]);

  const isoColW = isolated.length > 0 ? NODE_W + ISO_X * 2 + 28 : 0;
  const netArea = useMemo(() => ({
    w: Math.max(160, size.w - isoColW), h: size.h, ox: isoColW
  }), [size.w, size.h, isoColW]);

  // Unified position state for every visible node
  const [positions, setPositions] = useState({});
  const sizeKey    = `${Math.round(netArea.w)}x${Math.round(netArea.h)}`;
  const visibleKey = [...connected, ...isolated].map((p) => p.id).sort().join(",");
  const layoutRef  = useRef({ sizeKey: null, visibleKey: null });

  useEffect(() => {
    const prev = layoutRef.current;
    const fullReset   = sizeKey    !== prev.sizeKey;
    const nodesChanged = visibleKey !== prev.visibleKey;
    layoutRef.current = { sizeKey, visibleKey };
    if (!fullReset && !nodesChanged) return;

    setPositions((cur) => {
      if (fullReset) {
        // Canvas resized — full re-layout, discard any manual moves
        const out = {};
        isolated.forEach((p, i) => {
          out[p.id] = { x: ISO_X + NODE_W / 2, y: 72 + i * (NODE_H + 16) };
        });
        if (connected.length > 0) {
          const raw = forceLayout(connected, allEdges, netArea.w, netArea.h, NODE_W, NODE_H, 380);
          Object.keys(raw).forEach((id) => { out[id] = { x: raw[id].x + netArea.ox, y: raw[id].y }; });
        }
        return out;
      }
      // Nodes toggled — keep existing positions, only place newly visible nodes
      const out = { ...cur };
      let changed = false;
      isolated.forEach((p, i) => {
        if (out[p.id] == null) {
          out[p.id] = { x: ISO_X + NODE_W / 2, y: 72 + i * (NODE_H + 16) };
          changed = true;
        }
      });
      connected.forEach((p) => {
        if (out[p.id] == null) {
          out[p.id] = {
            x: netArea.ox + netArea.w / 2 + (Math.random() - 0.5) * 140,
            y: netArea.h / 2 + (Math.random() - 0.5) * 140,
          };
          changed = true;
        }
      });
      return changed ? out : cur;
    });
  }, [sizeKey, visibleKey]);

  // Convert screen coords → SVG local coords (accounts for pan/zoom transform)
  const toLocal = (clientX, clientY) => {
    const rect = svgRef.current ? svgRef.current.getBoundingClientRect() : { left: 0, top: 0 };
    const t = transformRef.current;
    return { x: (clientX - rect.left - t.x) / t.k, y: (clientY - rect.top - t.y) / t.k };
  };

  const onWheel = useCallback((e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    setTransform((t) => {
      const newK = Math.max(0.2, Math.min(5, t.k * factor));
      const rect = svgRef.current ? svgRef.current.getBoundingClientRect() : { left: 0, top: 0 };
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      return { k: newK, x: mx - (mx - t.x) * (newK / t.k), y: my - (my - t.y) * (newK / t.k) };
    });
  }, []);

  useEffect(() => {
    const el = svgRef.current;
    if (!el) return;
    el.addEventListener("wheel", onWheel, { passive: false });
    return () => el.removeEventListener("wheel", onWheel);
  }, [onWheel]);

  // Node mousedown — starts node drag (stopPropagation prevents canvas pan)
  const onNodeMouseDown = (e, id) => {
    e.stopPropagation();
    if (e.button !== 0) return;
    const local = toLocal(e.clientX, e.clientY);
    const pos = positions[id] || { x: 0, y: 0 };
    nodeDragRef.current = { id, ox: local.x - pos.x, oy: local.y - pos.y, moved: false };
  };

  // Canvas mousedown — starts canvas pan
  const onMouseDown = (e) => {
    if (e.button !== 0) return;
    canvasDragRef.current = { sx: e.clientX - transform.x, sy: e.clientY - transform.y };
    svgRef.current && svgRef.current.classList.add("dragging");
  };

  const onMouseMove = (e) => {
    if (nodeDragRef.current) {
      // Node drag takes priority over canvas pan
      nodeDragRef.current.moved = true;
      const { id, ox, oy } = nodeDragRef.current;
      const local = toLocal(e.clientX, e.clientY);
      setPositions((p) => ({ ...p, [id]: { x: local.x - ox, y: local.y - oy } }));
      return;
    }
    if (!canvasDragRef.current) return;
    setTransform((t) => ({ ...t, x: e.clientX - canvasDragRef.current.sx, y: e.clientY - canvasDragRef.current.sy }));
  };

  const onMouseUp = () => {
    // Record whether we just finished a node drag (suppresses the subsequent onClick)
    nodeWasDragged.current = !!(nodeDragRef.current && nodeDragRef.current.moved);
    nodeDragRef.current  = null;
    canvasDragRef.current = null;
    svgRef.current && svgRef.current.classList.remove("dragging");
  };

  const resetView = () => setTransform({ x: 0, y: 0, k: 1 });
  const toggleHidden = (id) => setHiddenIds((s) => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const showAll = () => setHiddenIds(new Set());
  const hideAll = () => setHiddenIds(new Set(profiles.map((p) => p.id)));

            <button onClick={() => setTransform((t) => ({ ...t, k: Math.max(0.2, t.k / 1.2) }))}>−</button>

          </div>
          <div className="rel-list-body">
            {profiles.map((p) => {

// ============================================================
// CHAT INTERPRETER
// ============================================================
const MONTHS = ["january","february","march","april","may","june","july","august","september","october","november","december"];

function interpretChat(query, profiles) {
  const q = query.toLowerCase().trim();
  if (!q) return null;

  const fmt = (ps, label) => {
    if (!ps.length) return [{ kind: "dim", text: `> no results :: ${label}` }];
    return [
      `> ${ps.length} match(es) :: ${label}`,
      ...ps.map((p) => `  · ${p.firstName} ${p.lastName}  [${p.id}]`)
    ];
  };

  // EXIT
  if (/^(exit|quit|bye|leave|:q|end|stop)$/.test(q))
    return { exit: true, lines: ["> returning to shell"] };

  // HELP
  if (/^help/.test(q))
    return { lines: [
      { kind: "acc", text: "chat mode — ask questions about your data:" },
      "  how many profiles are there",
      "  who has a birthday in [month]",
      "  who was born in [year]",
      "  who is older / younger than [age]",
      "  who lives in [place]",
      "  who is [ethnicity]",
      "  who is male / female / nonbinary",
      "  who has [signal / telegram / github / ...]",
      "  who is a POI / hidden / classified",
      "  who is related to [name]",
      "  tell me about [name]",
      "  find people who [keyword]",
      "  exit — return to shell",
    ]};

  // COUNT
  if (/how many/.test(q))
    return { lines: [`> ${profiles.length} profile(s) in the database`] };

  // BIRTHDAY IN MONTH
  const monthTest = q.match(/\b(january|february|march|april|may|june|july|august|september|october|november|december|jan|feb|mar|apr|jun|jul|aug|sep|oct|nov|dec)\b/);
  if (monthTest && /birthday|born|dob/.test(q)) {
    const abbr = monthTest[1].slice(0, 3);
    const mIdx = MONTHS.findIndex((m) => m.startsWith(abbr));
    const res = profiles.filter((p) => p.dob && parseInt(p.dob.split("-")[1], 10) === mIdx + 1);
    return { lines: fmt(res, `birthday in ${MONTHS[mIdx]}`) };
  }

  // BORN IN YEAR
  const yearTest = q.match(/\b(19|20)\d{2}\b/);
  if (yearTest && /born|dob|birthday/.test(q)) {
    const res = profiles.filter((p) => p.dob && p.dob.startsWith(yearTest[0]));
    return { lines: fmt(res, `born in ${yearTest[0]}`) };
  }

  // AGE OVER / UNDER
  const ageTest = q.match(/\b(older than|over|under|younger than|age)\s+(\d+)/);
  if (ageTest) {
    const n = parseInt(ageTest[2], 10);
    const over = /older|over/.test(ageTest[1]);
    const now = new Date();
    const res = profiles.filter((p) => {
      if (!p.dob) return false;
      const d = new Date(p.dob);
      const age = now.getFullYear() - d.getFullYear() -
        (now < new Date(now.getFullYear(), d.getMonth(), d.getDate()) ? 1 : 0);
      return over ? age > n : age < n;
    });
    return { lines: fmt(res, `age ${over ? "over" : "under"} ${n}`) };
  }

  // FLAGS
  if (/\bpoi\b|person of interest/.test(q))
    return { lines: fmt(profiles.filter((p) => p.poi), "POI") };
  if (/\bhidden\b/.test(q))
    return { lines: fmt(profiles.filter((p) => p.hidden), "hidden") };
  if (/\bclassified\b/.test(q))
    return { lines: fmt(profiles.filter((p) => p.classified), "classified") };

  // SEX / GENDER
  if (/\b(male|man|men)\b/.test(q) && !/female|woman|women/.test(q))
    return { lines: fmt(profiles.filter((p) => p.sex === "M"), "sex: M") };
  if (/\b(female|woman|women)\b/.test(q))
    return { lines: fmt(profiles.filter((p) => p.sex === "F"), "sex: F") };
  if (/\b(nonbinary|non-binary|\bnb\b|enby)\b/.test(q))
    return { lines: fmt(profiles.filter((p) => p.sex === "NB"), "sex: NB") };

  // CONTACT TYPE
  const contactTypes = ["email","phone","signal","telegram","discord","x","instagram","github","linkedin","irc","keybase","matrix","session","xmpp","website"];
  for (const ct of contactTypes) {
    if (new RegExp(`\\b${ct}\\b`).test(q)) {
      const res = profiles.filter((p) => (p.contacts || []).some((c) => c.type === ct));
      return { lines: fmt(res, `contact: ${ct}`) };
    }
  }

  // RELATED TO [name]
  const relMatch = q.match(/(?:related to|knows?|connected to|linked to|associate of|friend of|works? with)\s+([a-z\s\-]+)/);
  if (relMatch) {
    const name = relMatch[1].trim();
    const res = profiles.filter((p) => (p.relationships || []).some((r) => r.name.toLowerCase().includes(name)));
    return { lines: fmt(res, `related to "${name}"`) };
  }

  // TELL ME ABOUT [name]
  const aboutMatch = q.match(/(?:tell me about|describe|who is|what do you know about|info on|show me)\s+([a-z0-9\s\-]+)/);
  if (aboutMatch) {
    const name = aboutMatch[1].trim();
    const p = profiles.find((x) =>
      `${x.firstName} ${x.lastName}`.toLowerCase().includes(name) ||
      x.firstName.toLowerCase() === name ||
      x.lastName.toLowerCase() === name ||
      (x.id || "").toLowerCase() === name
    );
    if (p) {
      const lines = [
        { kind: "acc", text: `> ${p.firstName} ${p.lastName}  [${p.id}]` },
      ];
      if (p.dob) {
        const d = new Date(p.dob);
        const now = new Date();
        const age = now.getFullYear() - d.getFullYear() -
          (now < new Date(now.getFullYear(), d.getMonth(), d.getDate()) ? 1 : 0);
        lines.push(`  DOB       :: ${p.dob}  (age ${age})`);
      }
      if (p.sex)         lines.push(`  sex       :: ${p.sex}`);
      if (p.ethnicity)   lines.push(`  ethnicity :: ${p.ethnicity}`);
      if (p.address)     lines.push(`  address   :: ${p.address}`);
      if (p.description) lines.push(`  notes     :: ${p.description}`);
      if (p.contacts && p.contacts.length)
        lines.push(`  contacts  :: ${p.contacts.map((c) => `${c.type}: ${c.value}`).join("  ·  ")}`);
      if (p.relationships && p.relationships.length)
        lines.push(`  links     :: ${p.relationships.map((r) => `${r.type}: ${r.name}`).join("  ·  ")}`);
      return { lines };
    }
  }

  // LOCATION SEARCH
  const locMatch = q.match(/(?:lives? in|from|based in|located in|in)\s+([a-z\s,\-]+?)(?:\?|$)/);
  if (locMatch && /lives?|from|based|located/.test(q)) {
    const place = locMatch[1].trim();
    const res = profiles.filter((p) => p.address && p.address.toLowerCase().includes(place));
    if (res.length) return { lines: fmt(res, `in "${place}"`) };
  }

  // GENERAL KEYWORD / DESCRIPTION SEARCH
  const kwMatch = q.match(/(?:find|show|list|who|people|anyone|someone|profiles?)\s+(?:who |that |with |are |is |identify(?:ing)? as |work(?:s|ing)? (?:as|in) |(?:have|has) )?(.+)/);
  const keyword = (kwMatch ? kwMatch[1] : q).replace(/\?$/, "").trim();
  if (keyword.length >= 2) {
    const words = keyword.split(/\s+/);
    const res = profiles.filter((p) => {
      const blob = [
        p.firstName, p.lastName, p.description, p.ethnicity, p.address, p.sex,
        ...(p.contacts || []).map((c) => c.value),
        ...(p.relationships || []).map((r) => `${r.name} ${r.type}`)
      ].join(" ").toLowerCase();
      return words.every((w) => blob.includes(w));
    });
    if (res.length) return { lines: fmt(res, `"${keyword}"`) };
    return { lines: [{ kind: "dim", text: `> no results :: "${keyword}"` }] };
  }

  return { lines: [{ kind: "dim", text: "> couldn't parse that — try 'help' for examples" }] };
}

// ============================================================
// APP
// ============================================================
function App() {
  const [profiles, setProfiles] = useState(loadProfiles());
  const [index, setIndex] = useState(0);
  const [openProfile, setOpenProfile] = useState(null);
  const [newOpen, setNewOpen] = useState(false);
  const [editTarget, setEditTarget] = useState(null);
  const [mapOpen, setMapOpen] = useState(false);
  const [mapFocusId, setMapFocusId] = useState(null);
  const [purgeOpen, setPurgeOpen] = useState(false);
  const [relOpen, setRelOpen] = useState(false);
  const [query, setQuery] = useState("");
  const [field, setField] = useState("all");
  const [classifiedMode, setClassifiedMode] = useState(false); // hidden shell toggle
  const [chatMode, setChatMode] = useState(false);
  const [toast, setToast] = useState(null);

  // Sort + filter visible profiles for carousel/search.
  // Rules:
  //   · classified profiles are removed unless `classifiedMode` is on
  //   · POI profiles sort first, alphabetically by lastName/firstName
  //   · non-POI keep insertion order
  //   · text/field filter applied last
  const filtered = useMemo(() => {
    // start: drop classified unless mode is on
    const visible = classifiedMode ? profiles : profiles.filter((p) => !p.classified);
    // partition by POI
    const pois = visible.filter((p) => p.poi);
    const rest = visible.filter((p) => !p.poi);
    pois.sort((a, b) => {
      const la = (a.lastName || "").toLowerCase();
      const lb = (b.lastName || "").toLowerCase();
      if (la !== lb) return la < lb ? -1 : 1;
      const fa = (a.firstName || "").toLowerCase();
      const fb = (b.firstName || "").toLowerCase();
      return fa < fb ? -1 : fa > fb ? 1 : 0;
    });
    const ordered = [...pois, ...rest];
    // apply query filter
    const q = query.trim().toLowerCase();
    if (!q) return ordered;
    return ordered.filter((p) => {
      if (field === "all") {
        return [
          p.firstName, p.lastName, p.dob, p.ethnicity, p.sex,
          p.address, p.description, p.id,
          ...(p.contacts || []).map((c) => c.value),
          ...(p.relationships || []).map((r) => r.name)
        ].some((v) => String(v || "").toLowerCase().includes(q));
      }
      return String(p[field] || "").toLowerCase().includes(q);
    });
  }, [profiles, query, field, classifiedMode]);

  // Reset carousel position when filter changes.
  useEffect(() => { setIndex(0); }, [query, field]);
  // Also clamp if filtered shrinks past index.
  useEffect(() => {
    if (index > filtered.length) setIndex(0);
  }, [filtered.length, index]);

  const { dirName, pickDirectory, resolve, hasMap } = useImageDir();

  useEffect(() => { saveProfiles(profiles); }, [profiles]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast((t) => (t === msg ? null : t)), 1900);
  };

  // a resolver that also handles data URLs we embed
  const resolveImg = useCallback((ref) => {
    // The profile may carry imageData (embedded). prefer that if no folder linked.
    if (!ref && arguments.length === 0) return null;
    return resolve(ref);
  }, [resolve]);
  // helper: get best image for a given profile
  const imgFor = useCallback((p) => {
    if (!p) return null;
    const resolved = resolve(p.image);
    if (resolved) return resolved;
    if (p.imageData) return p.imageData;
    return null;
  }, [resolve]);

  const onPickFromSearch = (p) => {
    const i = profiles.findIndex((x) => x.id === p.id);
    if (i >= 0) {
      setIndex(i);
      setOpenProfile(p);
    }
  };

  // ---- Terminal command runner --------------------------------------------
  const findProfileByRef = (ref) => {
    const q = (ref || "").trim().toLowerCase();
    if (!q) return { idx: null };
    // numeric (1-indexed)
    if (/^\d+$/.test(q)) {
      const n = parseInt(q, 10) - 1;
      if (n >= 0 && n < profiles.length) return { idx: n, profile: profiles[n] };
    }
    // by id (e.g. p-0xa1f)
    let idx = profiles.findIndex((p) => (p.id || "").toLowerCase() === q);
    if (idx >= 0) return { idx, profile: profiles[idx] };
    // by name (first, last, or first+last substring)
    idx = profiles.findIndex((p) => {
      const fn = (p.firstName || "").toLowerCase();
      const ln = (p.lastName || "").toLowerCase();
      const full = (fn + " " + ln).trim();
      return fn === q || ln === q || full === q || full.includes(q);
    });
    if (idx >= 0) return { idx, profile: profiles[idx] };
    return { idx: null };
  };

  const runCommand = (raw) => {
    const cmd = raw.trim();
    if (!cmd) return null;

    if (chatMode) {
      const result = interpretChat(cmd, profiles);
      if (!result) return null;
      if (result.exit) { setChatMode(false); return result.lines; }
      return result.lines;
    }

    const [head, ...rest] = cmd.split(/\s+/);
    const args = rest.join(" ");
    const name = head.toLowerCase();
    switch (name) {
      case "help":
      case "?":
        return [
          { kind: "acc", text: "PERSONA_DB v0.1.1 — fictional persona database (cyberpunk roleplay)." },
          "",
          "WHAT THIS DOES:",
          "  · stores fictional profiles: name, DOB, ethnicity, sex, address, contacts, notes",
          "  · carousel: ←/→ keys, swipe, drag, or click pips to navigate cards",
          "  · click a card to view a full record :: DOWNLOAD .json to export it",
          "  · EDIT to amend a record :: DELETE to remove :: + NEW for a new entry",
          "  · MAP opens a Leaflet/OSM world view (pins via Nominatim geocoding)",
          "  · click any address in a record to fly the map to that pin",
          "  · search bar above the carousel filters which cards are visible",
          "",
          "COMMANDS:",
          { kind: "cmd-row", cmd: "help",         desc: "this screen" },
          { kind: "cmd-row", cmd: "count",        desc: "total + filtered counts" },
          { kind: "cmd-row", cmd: "find <query>", desc: "set the carousel filter" },
          { kind: "cmd-row", cmd: "clear-filter", desc: "remove the filter (alias: reset)" },
          { kind: "cmd-row", cmd: "scope <field>",desc: "set filter scope (all|firstname|lastname|dob|...)" },
          { kind: "cmd-row", cmd: "goto <n|id|name>", desc: "jump carousel to entry" },
          { kind: "cmd-row", cmd: "open <n|id|name>", desc: "open a record" },
          { kind: "cmd-row", cmd: "list",         desc: "list all profiles (alias: ls)" },
          { kind: "cmd-row", cmd: "map",          desc: "open the world map" },
          { kind: "cmd-row", cmd: "new",          desc: "create a new entry" },
          { kind: "cmd-row", cmd: "link",         desc: "pick the profile-image folder" },
          { kind: "cmd-row", cmd: "whoami",       desc: "prints current shell user" },
          { kind: "cmd-row", cmd: "date",         desc: "current UTC timestamp" },
          { kind: "cmd-row", cmd: "echo <text>",  desc: "prints the argument" },
          { kind: "cmd-row", cmd: "clear",        desc: "clear the terminal scrollback" },
          { kind: "cmd-row", cmd: "version",      desc: "prints version" },
          { kind: "cmd-row", cmd: "purge",        desc: "wipe all records (opens confirmation)" },
          { kind: "cmd-row", cmd: "download <name|id>", desc: "download a profile as .json" },
          { kind: "cmd-row", cmd: "chat",         desc: "enter natural-language query mode" }
        ];
      case "purge":
        setPurgeOpen(true);
        return { kind: "acc", text: "⚠ purge confirmation required — confirm in the modal." };
      case "download": {
        if (!args) return { kind: "err", text: "usage: download <name|id>" };
        const q = args.toLowerCase();
        const target = profiles.find((p) =>
          (p.id || "").toLowerCase() === q ||
          (`${p.firstName} ${p.lastName}`).toLowerCase() === q ||
          p.firstName.toLowerCase() === q ||
          p.lastName.toLowerCase() === q
        );
        if (!target) return { kind: "err", text: `no match :: "${args}"` };
        const safe = (`${target.firstName}_${target.lastName}`).replace(/\s+/g, "_");
        downloadJSON(target, `${safe}_${target.id}.json`);
        return `> downloading :: ${safe}_${target.id}.json`;
      }
      case "chat":
        setChatMode(true);
        return [
          { kind: "acc", text: "> chat mode — ask questions about your data in plain english." },
          "  type 'help' for examples  ·  type 'exit' to return to shell",
        ];
      case "clear":
      case "cls":
        return "__clear__";
      case "count":
        return [
          "total    :: " + profiles.length,
          "filtered :: " + filtered.length,
          "query    :: " + (query || "(none)"),
          "scope    :: " + field
        ];
      case "find":
      case "filter":
      case "search":
      case "grep":
        setQuery(args);
        return [{ kind: "acc", text: "filter set :: " + (args || "(empty)") }];
      case "clear-filter":
      case "clearfilter":
      case "reset":
      case "unfilter":
        setQuery("");
        setField("all");
        return [{ kind: "acc", text: "filter cleared" }];
      case "scope":
      case "field": {
        const f = (args || "").toLowerCase();
        const valid = FIELDS.find((x) => x.id.toLowerCase() === f || x.label.toLowerCase() === f);
        if (!valid) return [{ kind: "err", text: "? unknown scope :: " + (f || "(empty)") }, { kind: "dim", text: "valid: " + FIELDS.map((x) => x.id).join(", ") }];
        setField(valid.id);
        return [{ kind: "acc", text: "scope :: " + valid.id }];
      }
      case "goto": {
        const t = findProfileByRef(args);
        if (t.idx == null) return [{ kind: "err", text: "? entry not found :: " + (args || "(empty)") }];
        setIndex(t.idx);
        return [{ kind: "acc", text: "→ [" + (t.idx + 1).toString().padStart(2, "0") + "] " + t.profile.firstName + " " + t.profile.lastName }];
      }
      case "open": {
        const t = findProfileByRef(args);
        if (t.idx == null) return [{ kind: "err", text: "? entry not found :: " + (args || "(empty)") }];
        setIndex(t.idx);
        setOpenProfile(t.profile);
        return [{ kind: "acc", text: "opened :: " + t.profile.id + " · " + t.profile.firstName + " " + t.profile.lastName }];
      }
      case "ls":
      case "list":
        if (profiles.length === 0) return [{ kind: "dim", text: "(no records)" }];
        return profiles.slice(0, 100).map((p, i) =>
          "[" + (i + 1).toString().padStart(2, "0") + "] " + (p.id || "").padEnd(8, " ") + "  " +
          (p.firstName + " " + p.lastName).padEnd(28, " ") + "  " + (p.dob || "—")
        );
      case "map":
        setMapFocusId(null);
        setMapOpen(true);
        return [{ kind: "acc", text: "map :: opening" }];
      case "new":
        setNewOpen(true);
        return [{ kind: "acc", text: "new entry :: form opened" }];
      case "link":
      case "link-folder":
      case "linkfolder":
        pickDirectory();
        return [{ kind: "acc", text: "folder picker :: opened" }];
      case "whoami":
        return "root";
      case "date":
      case "time":
        return new Date().toISOString().replace("T", " ").slice(0, 19) + " UTC";
      case "version":
      case "ver":
        return "PERSONA_DB v0.1.1";
      case "classified": {
        const arg = (args || "").toLowerCase();
        if (arg !== "enable" && arg !== "disable" && arg !== "on" && arg !== "off") {
          return [{ kind: "err", text: "usage: classified <enable|disable>" }];
        }
        const next = (arg === "enable" || arg === "on");
        setClassifiedMode(next);
        return next
          ? [{ kind: "acc", text: "classified :: ENABLED — restricted records now visible" }]
          : [{ kind: "acc", text: "classified :: DISABLED — restricted records hidden" }];
      }
      case "echo":
        return args;
      case "exit":
      case "logout":
        return [{ kind: "dim", text: "nope — this shell is going nowhere." }];
      default:
        return [
          { kind: "err", text: "? unknown command :: " + head },
          { kind: "dim", text: "type 'help' for the command list" }
        ];
    }
  };

  const terminalBanner = useMemo(() => ([
    { kind: "acc", text: "persona_db shell — type 'help' for commands." }
  ]), []);

  const onSelect = (p) => setOpenProfile(p);
  const onNew = () => setNewOpen(true);

  const onImportDemo = () => {
    const data = window.__DEMO_PROFILES__;
    if (!Array.isArray(data)) { showToast("> demo :: data not available"); return; }
    const incoming = data.map(normalizeProfile);
    const existingIds = new Set(profiles.map((p) => p.id));
    const toAdd = incoming.filter((p) => !existingIds.has(p.id));
    const skipped = incoming.length - toAdd.length;
    setProfiles((arr) => [...arr, ...toAdd]);
    setQuery("");
    setField("all");
    const msg = skipped > 0
      ? `> demo imported :: ${toAdd.length} added, ${skipped} duplicate(s) skipped`
      : `> demo imported :: ${toAdd.length} profile(s) added`;
    showToast(msg);
  };

  const onSaveNew = (profile, isEdit) => {
    if (isEdit) {
      setProfiles((arr) => arr.map((x) => x.id === profile.id ? profile : x));
      // jump carousel onto the edited entry
      const i = profiles.findIndex((x) => x.id === profile.id);
      if (i >= 0) setIndex(i);
      setEditTarget(null);
      // re-open detail with the patched record
      setOpenProfile(profile);
      showToast(`> entry patched :: ${profile.id}`);
    } else {
      setProfiles((arr) => [...arr, profile]);
      setNewOpen(false);
      // ensure the new card is reachable — clear any active filter
      setQuery("");
      setField("all");
      setIndex(profiles.length); // new card lands at end
      showToast(`> entry committed :: ${profile.id}`);
    }
  };

  const onEdit = (profile) => {
    setOpenProfile(null);
    setEditTarget(profile);
  };

  const onToggleFlag = (profile, key) => {
    setProfiles((arr) => arr.map((x) => x.id === profile.id ? { ...x, [key]: !x[key] } : x));
    setOpenProfile((cur) => cur && cur.id === profile.id ? { ...cur, [key]: !cur[key] } : cur);
  };

  const onOpenRefId = (refId) => {
    if (!refId) return;
    const target = profiles.find((x) => (x.id || "").toLowerCase() === String(refId).toLowerCase());
    if (!target) {
      showToast(`> ref-id not found :: ${refId}`);
      return;
    }
    // open detail; carousel index will auto-adjust if needed
    setOpenProfile(target);
  };

  const onDelete = (profile) => {
    setProfiles((arr) => arr.filter((x) => x.id !== profile.id));
    setOpenProfile(null);
    setIndex(0);
    showToast(`> record purged :: ${profile.id}`);
  };

  const onPurgeConfirm = () => {
    const count = profiles.length;
    setProfiles([]);
    setOpenProfile(null);
    setIndex(0);
    setQuery("");
    setField("all");
    setPurgeOpen(false);
    showToast(`> purge complete :: ${count} record(s) deleted`);
  };

  // override resolve to also use embedded imageData when present
  const cardResolve = useCallback((imageRef) => {
    return resolve(imageRef);
  }, [resolve]);

  // wrap ProfileCard's image resolution to fallback to imageData attached to each profile
  // we'll pass a resolver that knows about the current profile via closure inside Carousel
  // Simpler: monkey-patch by passing a function that looks up the profile by image filename
  const byImageRef = useMemo(() => {
    const m = {};
    profiles.forEach((p) => { if (p.image) m[p.image.toLowerCase()] = p; });
    return m;
  }, [profiles]);

  const combinedResolve = useCallback((ref) => {
    if (!ref) return null;
    const real = resolve(ref);
    if (real) return real;
    const p = byImageRef[(ref || "").toLowerCase()];
    if (p && p.imageData) return p.imageData;
    return null;
  }, [resolve, byImageRef]);

  return (
    <div className="shell">
      <TopBar count={profiles.length} />

      <div className="main">
        <aside className="leftrail terminal-rail">
          <div className="panel-head">
            <span>// SHELL</span><span className="bar" />
            <span className="blink">_</span>
          </div>
          <Terminal fullrail runCommand={runCommand} banner={terminalBanner} chatMode={chatMode} />
        </aside>

        <section className="stage">
          <div className="stage-head">
            <div className="breadcrumbs">
              <span>/db/</span><b>profiles/</b><span>browse</span>
              <span className="dim"> &nbsp;//&nbsp; idx </span>
              <b>{String(Math.min(index + 1, filtered.length + 1)).padStart(2, "0")}</b>
              <span className="dim"> / {String(filtered.length + 1).padStart(2, "0")}</span>
              {query && <span className="dim"> &nbsp;//&nbsp; <span className="amber">filtered</span>: {filtered.length}/{profiles.length}</span>}
              {classifiedMode && <span className="dim"> &nbsp;//&nbsp; <span style={{color:"var(--red)"}}>CLEARANCE: HIGH</span></span>}
            </div>
            <div className="stage-controls">
              <button className="ctrl-btn" onClick={() => { setMapFocusId(null); setMapOpen(true); }}>
                [ MAP ]
              </button>
              <button className="ctrl-btn" onClick={() => setRelOpen(true)}>
                [ RELATIONSHIPS ]
              </button>
              <button className="ctrl-btn" onClick={pickDirectory}>
                {dirName ? "RE-LINK FOLDER" : "LINK IMG FOLDER"}
              </button>
              <button className="ctrl-btn" onClick={onImportDemo}>DEMO</button>
              <button className="ctrl-btn primary" onClick={onNew}>+ NEW</button>
              <button className="ctrl-btn danger" onClick={() => setPurgeOpen(true)}>⚠ PURGE</button>
            </div>
          </div>

          <div className="search-strip">
            <div className="input-wrap">
              <span className="pfx">grep&nbsp;-i</span>
              <input
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="filter cards by name, address, notes, contacts, relationships…"
              />
              {query && <span style={{ cursor: "pointer", color: "var(--grn-3)" }} onClick={() => setQuery("")}>✕</span>}
            </div>
            <div className="strip-chips">
              {FIELDS.map((f) => (
                <button
                  key={f.id}
                  className={"chip " + (field === f.id ? "on" : "")}
                  onClick={() => setField(f.id)}
                >{f.label}</button>
              ))}
            </div>
            <div className="match-pill">
              MATCHES <b>{filtered.length.toString().padStart(2, "0")}</b> / {profiles.length.toString().padStart(2, "0")}
              {(query || field !== "all") && (
                <span className="clr" onClick={() => { setQuery(""); setField("all"); }} title="clear filter">✕</span>
              )}
            </div>
          </div>

          <Carousel
            profiles={filtered}
            index={index}
            setIndex={setIndex}
            onSelect={onSelect}
            onNew={onNew}
            resolveImg={combinedResolve}
          />

          <div className="pager">
            {filtered.map((p, i) => (
              <span key={p.id}
                    className={"pip " + (i === index ? "on" : "")}
                    onClick={() => setIndex(i)} />
            ))}
            <span className={"pip " + (index === filtered.length ? "on" : "")}
                  onClick={() => setIndex(filtered.length)}
                  style={{ borderLeft: "1px dashed var(--line-2)", marginLeft: 4, paddingLeft: 6 }} />
          </div>
        </section>
      </div>

      <footer className="statusbar">
        <div className="seg">
          <span><span className="dot" /> ENC:AES-256</span>
          <span>STORE: <b>localStorage</b></span>
          <span>IMG: <b>{dirName || "—"}</b></span>
        </div>
        <div className="seg">
          <span>NAV: <span className="kbd">←</span><span className="kbd">→</span></span>
          <span>OPEN: <span className="kbd">ENTER</span></span>
          <span>SWIPE: <span className="kbd">touch</span></span>
        </div>
      </footer>

      {openProfile && (
        <DetailModal
          profile={openProfile}
          onClose={() => setOpenProfile(null)}
          onDelete={onDelete}
          resolveImg={combinedResolve}
          onOpenMap={(p) => { setOpenProfile(null); setMapOpen(true); setMapFocusId(p.id); }}
          onEdit={onEdit}
          onToggleFlag={onToggleFlag}
          onOpenRefId={onOpenRefId}
        />
      )}
      {newOpen && (
        <NewEntryModal onClose={() => setNewOpen(false)} onSave={onSaveNew} />
      )}
      {editTarget && (
        <NewEntryModal
          initial={editTarget}
          onClose={() => { setEditTarget(null); setOpenProfile(editTarget); }}
          onSave={onSaveNew}
        />
      )}
      {mapOpen && (
        <MapModal
          profiles={classifiedMode ? profiles : profiles.filter((p) => !p.classified)}
          focusId={mapFocusId}
          onClose={() => { setMapOpen(false); setMapFocusId(null); }}
          onSelect={(p) => { setMapOpen(false); setMapFocusId(null); setOpenProfile(p); }}
        />
      )}
      {purgeOpen && (
        <PurgeModal
          count={profiles.length}
          onConfirm={onPurgeConfirm}
          onClose={() => setPurgeOpen(false)}
        />
      )}
      {relOpen && (
        <RelationshipsModal
          profiles={classifiedMode ? profiles : profiles.filter((p) => !p.classified)}
          onClose={() => setRelOpen(false)}
          onSelect={(p) => { setRelOpen(false); setOpenProfile(p); }}
        />
      )}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
