<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>//PERSONA_DB</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=VT323&display=swap" />

<style>
  :root {
    --bg: #000000;
    --bg-1: #050a07;
    --bg-2: #081410;
    --line: #0e2a1a;
    --line-2: #133b25;
    --grn-0: #00ff66;
    --grn-1: #36ff8c;
    --grn-2: #00cc52;
    --grn-3: #008c38;
    --grn-4: #005a24;
    --grn-5: #003417;
    --amber: #ffcb1f;
    --red: #ff3355;
    --txt: #b6ffd0;
    --dim: #4a7a5c;
    --mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
    --crt: "VT323", "JetBrains Mono", monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--grn-0);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* --- CRT skin: scanlines + vignette + flicker --- */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(0,255,102,0.035) 0px,
        rgba(0,255,102,0.035) 1px,
        transparent 1px,
        transparent 3px
      );
    z-index: 9999;
    mix-blend-mode: screen;
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%),
      radial-gradient(ellipse 120% 90% at center, transparent 60%, rgba(0,30,15,0.35) 100%);
    z-index: 9998;
  }
  @keyframes flicker {
    0%,100% { opacity: 1; }
    7% { opacity: 0.96; }
    13% { opacity: 1; }
    24% { opacity: 0.98; }
  }
  #root { animation: flicker 6s infinite; }

  /* selection */
  ::selection { background: var(--grn-0); color: #000; }

  /* scrollbars */
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-track { background: var(--bg-1); }
  *::-webkit-scrollbar-thumb { background: var(--grn-4); border: 1px solid var(--grn-5); }
  *::-webkit-scrollbar-thumb:hover { background: var(--grn-3); }

  /* utility */
  .mono { font-family: var(--mono); }
  .dim { color: var(--dim); }
  .grn { color: var(--grn-0); }
  .amber { color: var(--amber); }
  .upper { text-transform: uppercase; letter-spacing: 0.12em; }

  /* layout */
  .shell {
    position: fixed; inset: 0;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr;
    color: var(--grn-0);
    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(0,80,30,0.25), transparent 60%),
      radial-gradient(900px 500px at 90% 110%, rgba(0,60,30,0.20), transparent 60%),
      var(--bg);
  }

  /* topbar */
  .topbar {
    border-bottom: 1px solid var(--line-2);
    background: linear-gradient(180deg, #020604 0%, #020604 100%);
    padding: 10px 16px 10px 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 24px;
    position: relative;
    z-index: 2;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  .brand .prompt {
    color: var(--grn-3);
    font-weight: 700;
  }
  .brand .blink { animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .title-wrap {
    text-align: left;
    font-family: var(--mono);
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.32em;
  }
  .glitch {
    position: relative;
    display: inline-block;
    color: var(--grn-0);
    text-shadow:
      0 0 1px rgba(0,255,102,0.7),
      0 0 6px rgba(0,255,102,0.45),
      0 0 22px rgba(0,255,102,0.2);
  }
  .glitch::before,
  .glitch::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .glitch::before {
    color: #ff2e88;
    transform: translate(0,0);
    mix-blend-mode: screen;
    animation: glitchA 2.7s infinite steps(1);
    clip-path: inset(0 0 0 0);
  }
  .glitch::after {
    color: #2effe0;
    transform: translate(0,0);
    mix-blend-mode: screen;
    animation: glitchB 3.1s infinite steps(1);
    clip-path: inset(0 0 0 0);
  }
  @keyframes glitchA {
    0%   { transform: translate(0,0); clip-path: inset(0 0 90% 0); }
    8%   { transform: translate(-2px, 1px); clip-path: inset(20% 0 60% 0); }
    16%  { transform: translate(2px, -1px); clip-path: inset(40% 0 35% 0); }
    24%  { transform: translate(-1px, 0); clip-path: inset(60% 0 15% 0); }
    32%  { transform: translate(0,0); clip-path: inset(0 0 100% 0); }
    100% { transform: translate(0,0); clip-path: inset(0 0 100% 0); }
  }
  @keyframes glitchB {
    0%   { transform: translate(0,0); clip-path: inset(0 0 100% 0); }
    10%  { transform: translate(2px, 0); clip-path: inset(70% 0 10% 0); }
    20%  { transform: translate(-2px, 1px); clip-path: inset(50% 0 35% 0); }
    30%  { transform: translate(1px, -1px); clip-path: inset(20% 0 65% 0); }
    40%  { transform: translate(0,0); clip-path: inset(0 0 100% 0); }
    100% { transform: translate(0,0); clip-path: inset(0 0 100% 0); }
  }

  .glitch-sm { font-size: 12px; letter-spacing: 0.28em; }

  .top-meta {
    display: flex;
    gap: 18px;
    align-items: center;
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--grn-0); box-shadow: 0 0 10px var(--grn-0); display: inline-block; vertical-align: middle; margin-right: 6px; animation: pulse 1.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* main grid */
  .main {
    display: grid;
    grid-template-columns: minmax(280px, 26%) 1fr;
    min-height: 0;
    border-top: 1px solid var(--line);
  }

  /* left rail */
  .leftrail {
    border-right: 1px dashed var(--line-2);
    padding: 18px 16px 16px 18px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background:
      linear-gradient(180deg, rgba(0,40,20,0.15), transparent 30%),
      var(--bg);
  }
  .panel-head {
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--grn-2);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-head .bar {
    flex: 1;
    border-top: 1px dashed var(--line-2);
    margin-left: 6px;
  }

  .search-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .input-wrap {
    display: flex;
    align-items: center;
    border: 1px solid var(--line-2);
    background: #03100a;
    padding: 7px 10px;
    color: var(--grn-0);
    gap: 8px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-wrap:focus-within {
    border-color: var(--grn-2);
    box-shadow: 0 0 0 1px var(--grn-4), 0 0 14px rgba(0,255,102,0.15);
  }
  .input-wrap .pfx {
    color: var(--grn-3);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .input-wrap input,
  .input-wrap select,
  .input-wrap textarea {
    background: transparent;
    border: 0;
    color: var(--grn-0);
    font-family: var(--mono);
    font-size: 12.5px;
    width: 100%;
    outline: none;
    padding: 0;
    caret-color: var(--grn-0);
  }
  .input-wrap input::placeholder,
  .input-wrap textarea::placeholder { color: #2f5b40; }

  .filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 14px;
  }
  .chip {
    border: 1px solid var(--line-2);
    background: transparent;
    color: var(--grn-2);
    padding: 4px 8px;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.12s;
  }
  .chip:hover { border-color: var(--grn-3); color: var(--grn-0); }
  .chip.on {
    background: var(--grn-0);
    color: #001408;
    border-color: var(--grn-0);
    box-shadow: 0 0 12px rgba(0,255,102,0.4);
  }

  .results-head {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--grn-3);
    font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
    border-top: 1px dashed var(--line-2);
    border-bottom: 1px dashed var(--line-2);
    padding: 6px 0;
    margin-top: 4px;
  }

  .results {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    margin-top: 4px;
  }
  .result-row {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 8px 6px;
    border-bottom: 1px dotted var(--line);
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
  }
  .result-row:hover {
    background: rgba(0,255,102,0.06);
  }
  .result-row.active {
    background: rgba(0,255,102,0.10);
    box-shadow: inset 2px 0 0 var(--grn-0);
  }
  .result-row .idx {
    font-size: 10px;
    color: var(--grn-4);
    text-align: right;
  }
  .result-row .nm { color: var(--grn-0); font-size: 12.5px; }
  .result-row .nm em { font-style: normal; background: var(--grn-0); color: #001408; padding: 0 2px; }
  .result-row .meta { color: var(--dim); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; }
  .result-row .avatar {
    width: 22px; height: 22px;
    border: 1px solid var(--line-2);
    background: #061a10;
    color: var(--grn-2);
    display: grid; place-items: center;
    font-size: 9.5px; font-weight: 700;
    letter-spacing: 0;
  }

  .empty-state {
    padding: 28px 12px;
    text-align: center;
    color: var(--dim);
    font-size: 11.5px;
  }
  .empty-state .ascii {
    color: var(--grn-4);
    white-space: pre;
    line-height: 1.15;
    margin-bottom: 10px;
    font-size: 11px;
  }

  /* right region */
  .stage {
    min-width: 0;
    min-height: 0;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    background:
      linear-gradient(180deg, rgba(0,40,20,0.15), transparent 30%),
      var(--bg);
  }
  .stage-head {
    display: grid;
    grid-template-columns: 1fr auto;
    padding: 7px 22px 4px 22px;
    align-items: end;
    gap: 18px;
  }
  .breadcrumbs {
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .breadcrumbs b { color: var(--grn-1); font-weight: 600; }
  .stage-title { text-align: center; }
  .stage-title h2 {
    margin: 0;
    font-size: 26px;
    letter-spacing: 0.4em;
    font-weight: 800;
  }
  .stage-controls {
    display: flex; justify-content: flex-end; gap: 8px;
    align-items: center;
  }
  .ctrl-btn {
    border: 1px solid var(--line-2);
    background: transparent;
    color: var(--grn-1);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 6px 10px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .ctrl-btn:hover { border-color: var(--grn-2); background: rgba(0,255,102,0.06); }
  .ctrl-btn.primary {
    background: var(--grn-0); color: #001408; border-color: var(--grn-0);
    box-shadow: 0 0 14px rgba(0,255,102,0.35);
  }
  .ctrl-btn.primary:hover { background: var(--grn-1); }
  .ctrl-btn.danger { color: var(--red); border-color: rgba(255,51,85,0.4); }
  .ctrl-btn.danger:hover { background: rgba(255,51,85,0.1); border-color: var(--red); }

  /* carousel */
  .carousel-wrap {
    position: relative;
    padding: 4px 70px 14px 70px;
    min-height: 0;
    overflow: hidden;
    display: grid;
    grid-template-rows: 1fr;
    align-items: center;
  }
  .carousel-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 46px; height: 84px;
    display: grid; place-items: center;
    background: transparent;
    border: 1px solid var(--line-2);
    color: var(--grn-1);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 26px;
    z-index: 4;
    transition: all 0.12s;
  }
  .carousel-arrow:hover {
    background: rgba(0,255,102,0.08);
    border-color: var(--grn-2);
    color: var(--grn-0);
    box-shadow: 0 0 18px rgba(0,255,102,0.18);
  }
  .carousel-arrow.left { left: 14px; }
  .carousel-arrow.right { right: 14px; }
  .arrow-label {
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .track {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
    transition: transform 0.36s cubic-bezier(.22,.61,.36,1), opacity 0.2s;
    will-change: transform;
    perspective: 1200px;
  }

  .card {
    flex: 0 0 auto;
    width: 260px;
    border: 1px solid var(--line-2);
    background:
      linear-gradient(180deg, rgba(0,30,15,0.4), transparent 30%),
      #030906;
    color: var(--grn-0);
    position: relative;
    cursor: pointer;
    transition: transform 0.35s cubic-bezier(.22,.61,.36,1), border-color 0.2s, box-shadow 0.25s, opacity 0.25s;
    transform: scale(0.82) translateZ(0);
    opacity: 0.55;
    filter: saturate(0.7);
    user-select: none;
  }
  .card.center {
    transform: scale(1.0) translateZ(0);
    opacity: 1;
    filter: none;
    border-color: var(--grn-2);
    box-shadow:
      0 0 0 1px rgba(0,255,102,0.2),
      0 0 30px rgba(0,255,102,0.18),
      inset 0 0 40px rgba(0,255,102,0.06);
  }
  .card.adj {
    transform: scale(0.9) translateZ(0);
    opacity: 0.85;
    filter: saturate(0.85);
  }
  .card:hover { border-color: var(--grn-3); }
  .card.center:hover { border-color: var(--grn-0); }

  .card-img {
    height: 240px;
    background: #050d09;
    border-bottom: 1px solid var(--line-2);
    position: relative;
    overflow: hidden;
    display: grid;
    place-items: center;
  }
  .card-img img {
    width: 100%; height: 100%; object-fit: cover;
    filter: hue-rotate(70deg) saturate(0.7) contrast(1.05) brightness(0.95);
    mix-blend-mode: screen;
    background: #0a1f12;
  }
  .card-img .ph {
    width: 100%; height: 100%;
    display: grid; place-items: center;
    color: var(--grn-3);
    background:
      repeating-linear-gradient(45deg, rgba(0,255,102,0.06) 0 8px, transparent 8px 16px),
      radial-gradient(circle at 50% 38%, rgba(0,255,102,0.16), transparent 60%),
      #040c08;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
    padding: 12px;
  }
  .card-img .ph .glyph {
    font-size: 38px; line-height: 1; margin-bottom: 6px;
    color: var(--grn-2);
    font-family: var(--crt);
    letter-spacing: 0.05em;
  }
  .card-img::after {
    content: "";
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.55));
    pointer-events: none;
  }
  .card-img .corner {
    position: absolute;
    top: 8px; left: 8px;
    background: #000;
    border: 1px solid var(--grn-3);
    color: var(--grn-0);
    padding: 1px 6px;
    font-size: 10px;
    letter-spacing: 0.15em;
    z-index: 2;
  }
  .card-img .corner.r { left: auto; right: 8px; color: var(--amber); border-color: rgba(255,203,31,0.5); }

  .card-body {
    padding: 12px 14px 14px 14px;
  }
  .card-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--grn-0);
    text-transform: uppercase;
    line-height: 1.15;
    margin-bottom: 4px;
    word-break: break-word;
  }
  .card-name .last { color: var(--grn-1); }
  .card-id {
    color: var(--grn-3);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    margin-bottom: 10px;
  }
  .card-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 10px;
    font-size: 11px;
  }
  .card-grid .k {
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-size: 9.5px;
    align-self: center;
  }
  .card-grid .v {
    color: var(--grn-0);
    text-align: right;
  }

  /* new entry card */
  .card.new {
    border: 1px dashed var(--grn-3);
    background:
      repeating-linear-gradient(45deg, rgba(0,255,102,0.03) 0 12px, transparent 12px 24px),
      #020604;
    display: grid;
    place-items: center;
    height: 432px;
  }
  .card.new.center { border-style: dashed; border-color: var(--grn-0); }
  .new-inner {
    text-align: center;
    color: var(--grn-1);
    padding: 24px;
  }
  .new-inner .plus {
    width: 64px; height: 64px;
    border: 1px solid var(--grn-2);
    margin: 0 auto 16px;
    display: grid; place-items: center;
    font-size: 30px;
    color: var(--grn-0);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card.new.center:hover .plus {
    transform: rotate(90deg);
    box-shadow: 0 0 22px rgba(0,255,102,0.3);
  }
  .new-inner .label {
    letter-spacing: 0.34em;
    text-transform: uppercase;
    font-size: 14px;
    color: var(--grn-0);
    margin-bottom: 6px;
  }
  .new-inner .sub {
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
  }

  /* carousel pagination */
  .pager {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 0 16px 8px 16px;
    flex-wrap: wrap;
  }
  .pager .pip {
    width: 10px; height: 4px;
    background: var(--line-2);
    transition: all 0.15s;
    cursor: pointer;
  }
  .pager .pip:hover { background: var(--grn-3); }
  .pager .pip.on { background: var(--grn-0); width: 24px; box-shadow: 0 0 8px var(--grn-0); }

  /* statusbar */
  .statusbar {
    border-top: 1px solid var(--line-2);
    background: #020604;
    color: var(--dim);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 6px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
  }
  .statusbar .seg { display: flex; gap: 16px; }
  .statusbar b { color: var(--grn-1); font-weight: 600; }

  /* --- Detail modal --- */
  .modal-veil {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at center, rgba(0,30,15,0.4), rgba(0,0,0,0.85) 70%),
      rgba(0,0,0,0.6);
    z-index: 50;
    display: grid;
    place-items: center;
    padding: 24px;
    animation: fadeIn 0.18s ease-out;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal {
    width: min(960px, 100%);
    max-height: 92vh;
    overflow: auto;
    background:
      linear-gradient(180deg, rgba(0,30,15,0.5), transparent 12%),
      #02080500;
    background-color: #020604;
    border: 1px solid var(--grn-3);
    box-shadow:
      0 0 0 1px rgba(0,255,102,0.15),
      0 0 80px rgba(0,255,102,0.22),
      inset 0 0 60px rgba(0,255,102,0.04);
    position: relative;
  }
  .modal::before {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(to bottom, rgba(0,255,102,0.025) 0 1px, transparent 1px 3px);
    pointer-events: none;
  }
  .modal-head {
    padding: 14px 18px;
    border-bottom: 1px dashed var(--line-2);
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 16px;
  }
  .modal-head .tag {
    border: 1px solid var(--grn-3);
    color: var(--grn-1);
    padding: 3px 8px;
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .modal-head h3 {
    margin: 0;
    font-size: 18px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
  }
  .modal-body {
    padding: 22px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
  }
  .modal-body .portrait {
    width: 100%;
    aspect-ratio: 3/4;
    border: 1px solid var(--grn-3);
    background: #050d09;
    position: relative;
    overflow: hidden;
  }
  .modal-body .portrait img {
    width: 100%; height: 100%; object-fit: cover;
    filter: hue-rotate(70deg) saturate(0.7) contrast(1.05) brightness(0.95);
    mix-blend-mode: screen;
    background: #0a1f12;
  }
  .modal-body .portrait .ph {
    width: 100%; height: 100%;
    display: grid; place-items: center;
    color: var(--grn-3);
    background:
      repeating-linear-gradient(45deg, rgba(0,255,102,0.06) 0 8px, transparent 8px 16px),
      radial-gradient(circle at 50% 38%, rgba(0,255,102,0.16), transparent 60%),
      #040c08;
    font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
    text-align: center; padding: 16px;
  }
  .portrait::after {
    content: "";
    position: absolute; left: 0; right: 0; top: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,255,102,0.6), transparent);
    animation: scan 2.2s linear infinite;
    pointer-events: none;
  }
  @keyframes scan { 0%{top: 0} 100%{top: 100%} }
  .portrait-meta {
    border: 1px solid var(--line-2);
    border-top: none;
    background: #02080500;
    padding: 10px 12px;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .portrait-meta b { color: var(--grn-1); font-weight: 600; }

  /* CLASSIFIED red stamp overlay */
  .classified-tape {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    background:
      repeating-linear-gradient(45deg, rgba(255,51,85,0.15) 0 14px, rgba(0,0,0,0) 14px 28px),
      rgba(0,0,0,0.55);
    z-index: 3;
    pointer-events: none;
  }
  .classified-tape .stamp {
    color: var(--red);
    font-family: var(--mono);
    font-weight: 800;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    border: 2px solid var(--red);
    padding: 6px 16px;
    transform: rotate(-7deg);
    background: rgba(20,0,5,0.55);
    text-shadow:
      0 0 8px rgba(255,51,85,0.7),
      0 0 22px rgba(255,51,85,0.3);
    box-shadow:
      0 0 14px rgba(255,51,85,0.25),
      inset 0 0 8px rgba(255,51,85,0.15);
  }
  /* size variants */
  .classified-tape .stamp { font-size: 24px; }
  .card .classified-tape .stamp { font-size: 16px; letter-spacing: 0.28em; padding: 4px 10px; }

  .refid-link {
    color: var(--grn-1);
    cursor: pointer;
    border-bottom: 1px dashed var(--grn-3);
    margin-left: 4px;
    transition: color 0.12s, border-color 0.12s;
  }
  .refid-link:hover {
    color: var(--amber);
    border-bottom-color: var(--amber);
    text-shadow: 0 0 6px rgba(255,203,31,0.45);
  }
  /* POI star tag on carousel card */
  .poi-tag {
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    background: var(--amber);
    color: #000;
    border: 1px solid var(--amber);
    padding: 1px 8px;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.22em;
    z-index: 2;
    box-shadow: 0 0 10px rgba(255,203,31,0.45);
  }
  /* HIDDEN small marker on card */
  .hidden-tag {
    position: absolute;
    bottom: 8px; left: 8px;
    background: #000;
    border: 1px solid var(--grn-3);
    color: var(--grn-1);
    padding: 1px 6px;
    font-size: 9.5px;
    letter-spacing: 0.18em;
    z-index: 2;
  }

  .field-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1px solid var(--line-2);
  }
  .field {
    padding: 10px 12px;
    border-right: 1px dashed var(--line);
    border-bottom: 1px dashed var(--line);
    min-width: 0;
  }
  .field:nth-child(2n) { border-right: none; }
  .field.full {
    grid-column: 1 / -1;
    border-right: none;
  }
  .field .k {
    display: block;
    color: var(--grn-3);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .field .v {
    color: var(--grn-0);
    font-size: 13.5px;
    word-break: break-word;
  }
  .field.full .v { font-size: 12.5px; line-height: 1.6; color: var(--txt); }

  .addr-link {
    cursor: pointer;
    color: var(--grn-0);
    border-bottom: 1px dashed var(--grn-3);
    padding-bottom: 1px;
    transition: color 0.15s, border-color 0.15s, text-shadow 0.15s;
    display: inline;
  }
  .addr-link:hover {
    color: var(--amber);
    border-bottom-color: var(--amber);
    text-shadow: 0 0 8px rgba(255,203,31,0.4);
  }
  .addr-tag {
    display: inline-block;
    margin-left: 10px;
    border: 1px solid var(--grn-3);
    color: var(--grn-1);
    padding: 0 5px;
    font-size: 9.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: all 0.15s;
    vertical-align: 2px;
  }
  .addr-link:hover .addr-tag {
    color: #000;
    background: var(--amber);
    border-color: var(--amber);
  }

  .modal-foot {
    padding: 14px 18px;
    border-top: 1px dashed var(--line-2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .foot-hint {
    color: var(--dim); font-size: 10.5px;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .foot-actions { display: flex; gap: 8px; }

  /* --- New entry form --- */
  .form-grid {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 24px;
    padding: 20px;
  }
  .form-grid .picshell {
    display: grid;
    gap: 8px;
  }
  .picshell .pic {
    aspect-ratio: 3/4;
    border: 1px dashed var(--grn-3);
    background:
      repeating-linear-gradient(45deg, rgba(0,255,102,0.04) 0 10px, transparent 10px 20px),
      #030906;
    display: grid; place-items: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .picshell .pic:hover {
    border-color: var(--grn-0);
    box-shadow: inset 0 0 30px rgba(0,255,102,0.08);
  }
  .picshell .pic img {
    width: 100%; height: 100%; object-fit: cover;
    filter: hue-rotate(70deg) saturate(0.7) contrast(1.05) brightness(0.95);
    mix-blend-mode: screen;
    background: #0a1f12;
  }
  .picshell .pic .ph-text {
    color: var(--grn-2);
    text-align: center;
    padding: 12px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .picshell .pic .ph-text .glyph {
    font-size: 32px; color: var(--grn-1); display: block; margin-bottom: 6px;
  }

  .form-rows {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 14px;
  }
  .form-rows .row {
    display: grid;
    gap: 4px;
  }
  .form-rows .row.full { grid-column: 1 / -1; }
  .form-rows label {
    color: var(--grn-3);
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .form-rows label .req { color: var(--amber); margin-left: 4px; }
  textarea.area {
    background: transparent; border: 0; color: var(--grn-0);
    font-family: var(--mono); font-size: 12.5px;
    width: 100%; outline: none; resize: vertical;
    min-height: 70px;
    caret-color: var(--grn-0);
  }
  .err {
    color: var(--red);
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* folder bar */
  .folderbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 14px;
    border: 1px solid var(--line-2);
    background: #02080500;
    margin: 0 22px 4px 22px;
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  /* Terminal occupying the left rail (vertical, tall) */
  .leftrail.terminal-rail {
    padding: 18px 16px 16px 18px;
    display: flex;
    flex-direction: column;
  }
  .terminal.fullrail {
    flex: 1;
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .terminal.fullrail .term-body {
    flex: 1;
    max-height: none;
    min-height: 0;
  }
  .terminal.fullrail .term-input-row { padding: 8px 12px; }

  /* Search strip above the carousel (horizontal compact form) */
  .search-strip {
    display: grid;
    grid-template-columns: minmax(220px, 1fr) auto auto;
    align-items: center;
    gap: 14px;
    padding: 3px 22px 5px 22px;
    border-bottom: 1px dashed var(--line);
    margin-bottom: 3px;
  }
  .search-strip .input-wrap { padding: 6px 10px; }
  .search-strip .strip-chips {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: flex-end;
    max-width: 100%;
  }
  .search-strip .chip { padding: 3px 7px; font-size: 10px; white-space: nowrap; }
  .search-strip .match-pill {
    border: 1px solid var(--grn-3);
    background: rgba(0,255,102,0.05);
    color: var(--grn-3);
    padding: 4px 10px;
    font-size: 10.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .search-strip .match-pill b { color: var(--grn-0); font-weight: 600; }
  .search-strip .match-pill .clr {
    margin-left: 8px;
    cursor: pointer;
    color: var(--dim);
  }
  .search-strip .match-pill .clr:hover { color: var(--amber); }

  @media (max-width: 980px) {
    .search-strip { grid-template-columns: 1fr; }
    .search-strip .strip-chips { justify-content: flex-start; }
  }
  .terminal {
    margin: 4px 22px 6px 22px;
    border: 1px solid var(--line-2);
    background:
      linear-gradient(180deg, rgba(0,255,102,0.02), transparent 40%),
      #020806;
    color: var(--grn-0);
    font-family: var(--mono);
    font-size: 12px;
    display: grid;
    grid-template-rows: auto auto;
    box-shadow: inset 0 0 16px rgba(0,255,102,0.04);
  }
  .term-body {
    max-height: 124px;
    overflow-y: auto;
    padding: 8px 12px 4px 12px;
    border-bottom: 1px dashed var(--line-2);
  }
  .term-entry { margin-bottom: 8px; }
  .term-entry:last-child { margin-bottom: 2px; }
  .term-cmd {
    color: var(--grn-1);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .term-cmd .term-pfx { color: var(--grn-3); margin-right: 6px; }
  .term-out {
    color: var(--txt);
    white-space: pre-wrap;
    word-break: break-word;
    padding-left: 4px;
    line-height: 1.5;
  }
  .term-out.err { color: var(--red); }
  .term-out.dim { color: var(--dim); }
  .term-out.acc { color: var(--amber); }
  .term-row {
    display: grid;
    grid-template-columns: 18ch 1fr;
    gap: 14px;
    align-items: baseline;
    padding-left: 4px;
    line-height: 1.5;
  }
  .term-row-cmd {
    color: var(--grn-0);
    font-weight: 700;
    text-shadow: 0 0 6px rgba(0,255,102,0.35);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .term-row-desc {
    color: var(--txt);
    min-width: 0;
    word-break: break-word;
  }
  .term-input-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px;
  }
  .term-input-row .term-pfx {
    color: var(--grn-3);
    font-weight: 700;
    user-select: none;
  }
  .term-input {
    flex: 1;
    background: transparent;
    border: 0;
    outline: none;
    color: var(--grn-0);
    font-family: var(--mono);
    font-size: 12.5px;
    caret-color: var(--grn-0);
    padding: 0;
  }
  .term-input::placeholder { color: #2f5b40; }
  .term-cursor {
    color: var(--grn-0);
    animation: blink 1s steps(1) infinite;
  }
  .terminal.collapsed .term-body { display: none; }

  /* SearchPanel — status block (replaces result list) */
  .filter-status {
    flex: 1;
    margin-top: 6px;
    padding: 10px 12px;
    border: 1px dashed var(--line-2);
    background:
      repeating-linear-gradient(45deg, rgba(0,255,102,0.025) 0 10px, transparent 10px 20px),
      transparent;
    color: var(--txt);
    font-size: 11.5px;
    line-height: 1.65;
    overflow-y: auto;
  }
  .filter-status .row {
    display: grid;
    grid-template-columns: 70px 1fr;
    gap: 6px;
    align-items: baseline;
  }
  .filter-status .k {
    color: var(--grn-3);
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .filter-status .v { color: var(--grn-0); }
  .filter-status .v.acc { color: var(--amber); }
  .filter-status .ascii-art {
    color: var(--grn-4);
    font-size: 10.5px;
    line-height: 1.1;
    white-space: pre;
    margin: 12px 0 10px 0;
  }
  .filter-status .hint {
    margin-top: 12px;
    color: var(--dim);
    font-size: 10.5px;
    letter-spacing: 0.06em;
  }
  .filter-status .hint b {
    color: var(--grn-1);
    background: rgba(0,255,102,0.08);
    padding: 1px 5px;
    border: 1px solid var(--line-2);
  }
  .folderbar .path {
    color: var(--grn-1);
    font-family: var(--mono);
    text-transform: none;
    letter-spacing: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .folderbar .path .ok { color: var(--grn-0); margin-right: 6px; }
  .folderbar .path .miss { color: var(--amber); }
  .ascii-rule {
    color: var(--grn-4);
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.4em;
    padding: 2px 0 8px 0;
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 36px; left: 50%; transform: translateX(-50%);
    background: #000;
    border: 1px solid var(--grn-0);
    color: var(--grn-0);
    padding: 8px 14px;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    box-shadow: 0 0 24px rgba(0,255,102,0.4);
    z-index: 200;
    animation: toastIn 0.18s ease-out;
  }
  @keyframes toastIn { from{opacity:0; transform: translate(-50%, 8px)} to{opacity:1; transform: translate(-50%, 0)} }

  /* keyboard hint chips */
  .kbd {
    border: 1px solid var(--line-2);
    padding: 1px 5px;
    color: var(--grn-1);
    font-size: 10px;
    letter-spacing: 0.1em;
    margin: 0 3px;
    background: #020604;
  }

  /* --- Contacts (form + detail) --- */
  .contacts-block {
    grid-column: 1 / -1;
    border: 1px dashed var(--line-2);
    padding: 12px;
    background:
      repeating-linear-gradient(45deg, rgba(0,255,102,0.02) 0 12px, transparent 12px 24px),
      transparent;
    display: grid;
    gap: 8px;
  }
  .contacts-block .head {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--grn-3);
    font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase;
  }
  .contact-row {
    display: grid;
    grid-template-columns: 130px 1fr 32px;
    gap: 8px;
    align-items: center;
  }
  .contact-row .input-wrap { padding: 6px 8px; }
  .rel-row {
    display: grid;
    grid-template-columns: 130px minmax(0, 1.4fr) minmax(0, 1fr) 32px;
    gap: 8px;
    align-items: center;
  }
  .rel-row .input-wrap { padding: 6px 8px; }

  /* status toggles */
  .status-toggles {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .status-toggle {
    border: 1px solid var(--line-2);
    background: transparent;
    color: var(--dim);
    padding: 5px 10px;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.12s;
  }
  .status-toggle:hover { color: var(--grn-1); border-color: var(--grn-3); }
  .status-toggle.on {
    color: var(--grn-0);
    border-color: var(--grn-0);
  }
  .status-toggle.on.poi {
    background: var(--amber);
    border-color: var(--amber);
    color: #000;
    box-shadow: 0 0 12px rgba(255,203,31,0.35);
  }
  .status-toggle.on.hidden {
    background: rgba(0,255,102,0.18);
    border-color: var(--grn-0);
    color: var(--grn-0);
  }
  .status-toggle.on.classified {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
    box-shadow: 0 0 14px rgba(255,51,85,0.4);
  }
  .icon-btn {
    width: 28px; height: 28px;
    border: 1px solid var(--line-2);
    background: transparent;
    color: var(--red);
    font-family: var(--mono);
    cursor: pointer;
    display: grid; place-items: center;
    transition: all 0.12s;
  }
  .icon-btn:hover { background: rgba(255,51,85,0.12); border-color: var(--red); }
  .contacts-empty {
    color: var(--dim);
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 6px 2px;
  }

  /* Contacts in detail view */
  .contacts-list {
    border: 1px solid var(--line-2);
    border-top: none;
    margin-top: 14px;
  }
  .contacts-list .head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px;
    color: var(--grn-3);
    font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase;
    border-top: 1px solid var(--line-2);
    background: #02080a;
  }
  .contact-item {
    display: grid;
    grid-template-columns: 28px 110px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 9px 12px;
    border-top: 1px dashed var(--line);
    color: var(--grn-0);
    font-size: 12.5px;
  }
  .contact-item .ic {
    width: 24px; height: 24px;
    border: 1px solid var(--line-2);
    color: var(--grn-1);
    display: grid; place-items: center;
    font-size: 12px;
  }
  .contact-item .tp {
    color: var(--grn-3);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .contact-item .vl {
    color: var(--grn-0);
    word-break: break-all;
  }
  .contact-item .vl a {
    color: var(--grn-0);
    text-decoration: none;
    border-bottom: 1px dotted var(--grn-3);
  }
  .contact-item .vl a:hover { color: var(--grn-1); border-bottom-color: var(--grn-1); }
  .contact-item .copy {
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--line-2);
    padding: 2px 6px;
  }
  .contact-item .copy:hover { color: var(--grn-0); border-color: var(--grn-3); }

  /* --- MAP --- */
  .map-modal {
    width: min(1280px, 96vw);
    height: 88vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }
  .map-stage {
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0,40,20,0.4), transparent 70%),
      #010504;
    cursor: grab;
    user-select: none;
  }
  .map-stage.grabbing { cursor: grabbing; }
  .map-stage svg { display: block; width: 100%; height: 100%; }
  .map-grid line { stroke: rgba(0,255,102,0.08); stroke-width: 1; }
  .map-grid line.major { stroke: rgba(0,255,102,0.16); }
  .map-grid text {
    fill: rgba(0,255,102,0.25);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
  }
  .map-continent {
    fill: rgba(0,160,72,0.07);
    stroke: rgba(0,255,102,0.30);
    stroke-width: 0.6;
    stroke-linejoin: round;
  }
  .map-country {
    fill: rgba(0,160,72,0.08);
    stroke: rgba(0,255,102,0.38);
    stroke-width: 0.7;
    stroke-linejoin: round;

    .carousel-arrow { width: 36px; height: 56px; }

    /* modals + forms wrap to single column */
    .modal-body { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-rows { grid-template-columns: 1fr; }

    .statusbar { flex-direction: column; align-items: flex-start; font-size: 9.5px; gap: 4px; padding: 8px 12px; }

    .map-overlay-tl { display: none; }
  }

  .list-toggle {

const LS_KEY = "personaDB::v3";
const LS_FOLDER_KEY = "personaDB::imageDirName";

function normalizeProfile(p) {
  return {
    ...p,
    contacts: Array.isArray(p.contacts) ? p.contacts : [],
    relationships: Array.isArray(p.relationships) ? p.relationships : [],
    poi: !!p.poi,
    hidden: !!p.hidden,
    classified: !!p.classified
  };
}
function loadProfiles() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) {
      localStorage.setItem(LS_KEY, JSON.stringify(SEED_PROFILES));
      return SEED_PROFILES.map(normalizeProfile);
    }
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return SEED_PROFILES.map(normalizeProfile);
    return parsed.map(normalizeProfile);
  } catch (e) {
    return SEED_PROFILES.map(normalizeProfile);
  }
}
function saveProfiles(list) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(list)); } catch (e) {}
}

// HELPERS
// ============================================================
function ageFrom(dob) {
  if (!dob) return "—";
  const d = new Date(dob);
  if (isNaN(d.getTime())) return "—";
  const today = new Date();
  let age = today.getFullYear() - d.getFullYear();
  const m = today.getMonth() - d.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < d.getDate())) age--;
  return age;
}
function fmtDate(dob) {
  if (!dob) return "—";
  const d = new Date(dob);
  if (isNaN(d.getTime())) return dob;
  return d.toISOString().slice(0, 10);
}
function initials(p) {
  return ((p.firstName || "?").charAt(0) + (p.lastName || "?").charAt(0)).toUpperCase();
}
function sexLong(s) {
  if (!s) return "—";
  const v = s.toUpperCase();
  if (v === "M") return "M / MALE";
  if (v === "F") return "F / FEMALE";
  if (v === "NB") return "NB / NON-BIN";
  return v;
}
function downloadJSON(obj, filename) {
  const blob = new Blob([JSON.stringify(obj, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ============================================================
// GEOCODE — Nominatim (OpenStreetMap) with localStorage cache + rate-limit queue
// ============================================================
const GEOCODE_LS_KEY = "personaDB::geocode::v1";
let _geocodeCache = (() => {
  try { return JSON.parse(localStorage.getItem(GEOCODE_LS_KEY) || "{}"); }
  catch (e) { return {}; }
})();
function _saveGeocodeCache() {
  try { localStorage.setItem(GEOCODE_LS_KEY, JSON.stringify(_geocodeCache)); } catch (e) {}
}
// Nominatim usage policy: max ~1 req/sec. Chain requests so they serialize.
let _nominatimChain = Promise.resolve();
function geocodeOSM(address) {
  if (!address) return Promise.resolve(null);
  const key = address.trim().toLowerCase();
  if (Object.prototype.hasOwnProperty.call(_geocodeCache, key)) {
    return Promise.resolve(_geocodeCache[key]);
  }
  const myTurn = _nominatimChain.then(async () => {
    // re-check cache in case a sibling call hydrated it
    if (Object.prototype.hasOwnProperty.call(_geocodeCache, key)) return _geocodeCache[key];
    await new Promise((r) => setTimeout(r, 1100)); // respect 1 req/sec limit
    try {
      const url = "https://nominatim.openstreetmap.org/search?format=json&limit=1&addressdetails=0&q=" + encodeURIComponent(address);
      const resp = await fetch(url, { headers: { "Accept": "application/json" } });
      if (!resp.ok) throw new Error("nominatim " + resp.status);
      const arr = await resp.json();
      const top = arr && arr[0];
      const result = top ? {
        lat: parseFloat(top.lat),
        lng: parseFloat(top.lon),
        display: top.display_name || address
      } : null;
      _geocodeCache[key] = result;
      _saveGeocodeCache();
      return result;
    } catch (e) {
      console.warn("[nominatim]", e);
      return null;
    }
  });
  _nominatimChain = myTurn.catch(() => {});
  return myTurn;
}
function geocodeCached(address) {
  if (!address) return null;
  const key = address.trim().toLowerCase();
  return Object.prototype.hasOwnProperty.call(_geocodeCache, key) ? _geocodeCache[key] : undefined;
}

// ============================================================
// IMAGE DIRECTORY MANAGER
// Holds a map: filename(lowercase) -> object URL
// User picks a folder via showDirectoryPicker (Chromium) or <input webkitdirectory>
// ============================================================
function useImageDir() {
  const [dirName, setDirName] = useState(() => localStorage.getItem(LS_FOLDER_KEY) || null);
  const [map, setMap] = useState({}); // { 'lowercase_name.jpg' : objectURL }
  const objectUrlsRef = useRef([]);

  const cleanup = () => {
    objectUrlsRef.current.forEach((u) => URL.revokeObjectURL(u));
    objectUrlsRef.current = [];
  };

  const ingestFiles = useCallback((files) => {
    cleanup();
    const m = {};
    Array.from(files).forEach((f) => {
      if (!f.type || !f.type.startsWith("image/")) return;
      const url = URL.createObjectURL(f);
      objectUrlsRef.current.push(url);
      const key = (f.name || "").toLowerCase();
      m[key] = url;
      // also key by stem (no extension)
      const stem = key.replace(/\.[^.]+$/, "");
      if (stem && !m[stem]) m[stem] = url;
    });
    setMap(m);
  }, []);

  const pickDirectory = useCallback(async () => {
    // Prefer File System Access API
    if (window.showDirectoryPicker) {
      try {
        const handle = await window.showDirectoryPicker();
        setDirName(handle.name);
        localStorage.setItem(LS_FOLDER_KEY, handle.name);
        const collected = [];
        // recursive walk one level deep — keep it predictable
        for await (const entry of handle.values()) {
          if (entry.kind === "file") {
            try { collected.push(await entry.getFile()); } catch (e) {}
          }
        }
        ingestFiles(collected);
        return true;
      } catch (e) {
        // user canceled or unsupported — fall through to input
        if (e && e.name === "AbortError") return false;
      }
    }
    // Fallback: hidden directory input
    return new Promise((resolve) => {
      const input = document.createElement("input");
      input.type = "file";
      input.multiple = true;
      input.webkitdirectory = true;
      input.directory = true;
      input.accept = "image/*";
      input.onchange = () => {
        if (input.files && input.files.length) {
          const first = input.files[0];
          // webkitRelativePath like "MyFolder/file.jpg"
          const folder = (first.webkitRelativePath || "").split("/")[0] || "Local Folder";
          setDirName(folder);
          localStorage.setItem(LS_FOLDER_KEY, folder);
          ingestFiles(input.files);
          resolve(true);
        } else {
          resolve(false);
        }
      };
      input.click();
    });
  }, [ingestFiles]);

  const resolve = useCallback((imageRef) => {
    if (!imageRef) return null;
    // data URL or absolute URL — return as is
    if (/^(data:|blob:|https?:)/i.test(imageRef)) return imageRef;
    const lower = imageRef.toLowerCase();
    if (map[lower]) return map[lower];
    // try without extension
    const stem = lower.replace(/\.[^.]+$/, "");
    if (map[stem]) return map[stem];
    return null;
  }, [map]);

  useEffect(() => () => cleanup(), []);

  return { dirName, pickDirectory, resolve, hasMap: Object.keys(map).length > 0 };
}

// HIGHLIGHTED TEXT (for search results)

function Highlight({ text, q }) {
  if (!q) return <>{text}</>;
  const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
  const parts = String(text).split(re);
  return (
    <>
      {parts.map((p, i) =>
        re.test(p) && p.toLowerCase() === q.toLowerCase()
          ? <em key={i}>{p}</em>
          : <React.Fragment key={i}>{p}</React.Fragment>
      )}
    </>
  );
}

// ============================================================
// CAROUSEL
// ============================================================
function Carousel({ profiles, index, setIndex, onSelect, onNew, resolveImg }) {
  const trackRef = useRef(null);
  const startX = useRef(null);
  const lastDx = useRef(0);
  const items = useMemo(() => {
    return [...profiles.map((p) => ({ kind: "profile", profile: p })), { kind: "new" }];
  }, [profiles]);
  const total = items.length;

  const go = useCallback((delta) => {
    setIndex((i) => {
      const next = i + delta;
      if (next < 0) return 0;
      if (next > total - 1) return total - 1;
      return next;
    });
  }, [setIndex, total]);

  // keyboard
  useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.isContentEditable)) return;
      if (e.key === "ArrowRight") { e.preventDefault(); go(1); }
      else if (e.key === "ArrowLeft") { e.preventDefault(); go(-1); }
      else if (e.key === "Enter") {
        const cur = items[index];
        if (!cur) return;
        if (cur.kind === "profile") onSelect(cur.profile);
        else onNew();
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [go, items, index, onSelect, onNew]);

  // swipe
  const onTouchStart = (e) => { startX.current = e.touches[0].clientX; lastDx.current = 0; };
  const onTouchMove = (e) => {
    if (startX.current == null) return;
    lastDx.current = e.touches[0].clientX - startX.current;
  };
  const onTouchEnd = () => {
    if (startX.current == null) return;
    const dx = lastDx.current;
    startX.current = null;
    if (Math.abs(dx) > 40) {
      if (dx < 0) go(1); else go(-1);
    }
  };

  // mouse drag (also useful on trackpad)
  const dragRef = useRef({ active: false, x: 0 });
  const onMouseDown = (e) => { dragRef.current = { active: true, x: e.clientX, dx: 0 }; };
  const onMouseMove = (e) => {
    if (!dragRef.current.active) return;
    dragRef.current.dx = e.clientX - dragRef.current.x;
  };
  const onMouseUp = () => {
    if (!dragRef.current.active) return;
    const dx = dragRef.current.dx || 0;
    dragRef.current.active = false;
    if (Math.abs(dx) > 60) { if (dx < 0) go(1); else go(-1); }
  };

  // visible: center +/- 2
  const visible = [];
  for (let off = -2; off <= 2; off++) {
    const i = index + off;
    if (i < 0 || i >= total) continue;
    visible.push({ i, off, item: items[i] });
  }

  return (
    <div
      className="carousel-wrap"
      onTouchStart={onTouchStart}
      onTouchMove={onTouchMove}
      onTouchEnd={onTouchEnd}
      onMouseDown={onMouseDown}
      onMouseMove={onMouseMove}
      onMouseUp={onMouseUp}
      onMouseLeave={onMouseUp}
    >
      <button className="carousel-arrow left" onClick={() => go(-1)} aria-label="Previous">
        ◀
        <span className="arrow-label">←</span>
      </button>

      <div className="track" ref={trackRef}>
        {visible.map(({ i, off, item }) => (
          <React.Fragment key={i}>
            {item.kind === "profile" ? (
              <ProfileCard
                profile={item.profile}
                position={off}
                isCenter={off === 0}
                onClick={() => {
                  if (off === 0) onSelect(item.profile);
                  else setIndex(i);
                }}
                resolveImg={resolveImg}
              />
            ) : (
              <NewEntryCard
                isCenter={off === 0}
                onClick={() => {
                  if (off === 0) onNew();
                  else setIndex(i);
                }}
              />
            )}
          </React.Fragment>
        ))}
      </div>

      <button className="carousel-arrow right" onClick={() => go(1)} aria-label="Next">
        ▶
        <span className="arrow-label">→</span>
      </button>
    </div>
  );
}

                title="Classified — hidden from carousel/search until shell unlocks it"
              >▮ CLASSIFIED</button>
            </div>
          </div>

          <div>
            <div className="field-grid">
              <div className="field">
                <span className="k">First Name</span>
                <div className="v">{profile.firstName}</div>
              </div>
              <div className="field">
                <span className="k">Last Name</span>
                <div className="v">{profile.lastName}</div>
              </div>
              <div className="field">
                <span className="k">Date of Birth</span>
                <div className="v">{fmtDate(profile.dob)} <span className="dim">/ AGE {ageFrom(profile.dob)}</span></div>
              </div>
              <div className="field">
                <span className="k">Sex</span>
                <div className="v">{sexLong(profile.sex)}</div>
              </div>
              <div className="field">
                <span className="k">Ethnicity</span>
                <div className="v">{profile.ethnicity || "—"}</div>
              </div>
              <div className="field">
                <span className="k">Reference ID</span>
                <div className="v">{profile.id}</div>
              </div>
              <div className="field full">
                <span className="k">Address</span>
                <div className="v">
                  {profile.address ? (
                    <span
                      className="addr-link"
                      onClick={() => onOpenMap && onOpenMap(profile)}
                      title="open on map"
                    >
                      {profile.address}
                      <span className="addr-tag">→ MAP</span>
                    </span>
                  ) : "—"}
                </div>
              </div>
              <div className="field full">
                <span className="k">Description</span>
                <div className="v">{profile.description || "—"}</div>
              </div>
            </div>

            <div className="contacts-list">
              <div className="head">
                <span>// CONTACT_METHODS</span>
                <span className="dim">{(profile.contacts || []).length} record(s)</span>
              </div>
              {(profile.contacts || []).length === 0 ? (
                <div className="contact-item" style={{ gridTemplateColumns: "1fr", color: "var(--dim)" }}>
                  [ no contact methods on file ]
                </div>
              ) : (
                (profile.contacts || []).map((c, i) => {
                  const meta = contactMeta(c.type);
                  const href = meta.href ? meta.href(c.value) : null;
                  return (
                    <div className="contact-item" key={i}>
                      <div className="ic">{meta.glyph}</div>
                      <div className="tp">{meta.label}</div>
                      <div className="vl">
                        {href ? <a href={href} target="_blank" rel="noopener noreferrer">{c.value}</a> : c.value}
                      </div>
                      <div className="copy" onClick={() => { try { navigator.clipboard.writeText(c.value); } catch (e) {} }}>copy</div>
                    </div>
                  );
                })
              )}
            </div>

            <div className="contacts-list">
              <div className="head">
                <span>// RELATIONSHIPS</span>
                <span className="dim">{(profile.relationships || []).length} record(s)</span>
              </div>
              {(profile.relationships || []).length === 0 ? (
                <div className="contact-item" style={{ gridTemplateColumns: "1fr", color: "var(--dim)" }}>
                  [ no relationships on file ]
                </div>
              ) : (
                (profile.relationships || []).map((r, i) => (
                  <div className="contact-item" key={i}>
                    <div className="ic">~</div>
                    <div className="tp">{r.type || "—"}</div>
                    <div className="vl">
                      {r.name || "—"}
                      {r.refId && (
                        <span
                          className="refid-link"
                          onClick={() => onOpenRefId && onOpenRefId(r.refId)}
                          title="open referenced profile"
                        > [{r.refId}]</span>
                      )}
                    </div>
                    <div className="copy" onClick={() => { try { navigator.clipboard.writeText((r.name || "") + (r.refId ? " " + r.refId : "")); } catch (e) {} }}>copy</div>
                  </div>
                ))
              )}
            </div>
          </div>
        </div>

        <div className="modal-foot">
          <div className="foot-hint">
            <span className="kbd">ESC</span> close &nbsp;·&nbsp; <span className="kbd">←</span><span className="kbd">→</span> navigate &nbsp;·&nbsp; record is read-only
          </div>
          <div className="foot-actions">
            {onDelete && (
              <button className="ctrl-btn danger" onClick={() => {
                if (window.confirm("Delete this record? This cannot be undone.")) onDelete(profile);
              }}>✕ DELETE</button>
            )}
            {onEdit && (
              <button className="ctrl-btn" onClick={() => onEdit(profile)}>✎ EDIT</button>
            )}
            <button className="ctrl-btn primary" onClick={handleDownload}>
              ⬇ DOWNLOAD .json
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// NEW ENTRY MODAL
// ============================================================
function NewEntryModal({ onClose, onSave, initial }) {
  const editing = !!initial;
  const [form, setForm] = useState({
    firstName: initial ? initial.firstName || "" : "",
    lastName: initial ? initial.lastName || "" : "",
    dob: initial ? initial.dob || "" : "",
    ethnicity: initial ? initial.ethnicity || "" : "",
    sex: initial ? initial.sex || "" : "",
    address: initial ? initial.address || "" : "",
    description: initial ? initial.description || "" : "",
    image: initial ? initial.image || "" : "" // filename
  });
  const [imgPreview, setImgPreview] = useState(initial && initial.imageData ? initial.imageData : null); // data URL
  const [errors, setErrors] = useState({});
  const [contacts, setContacts] = useState(initial && Array.isArray(initial.contacts) ? initial.contacts.map((c) => ({ ...c })) : []);
  const [relationships, setRelationships] = useState(initial && Array.isArray(initial.relationships) ? initial.relationships.map((r) => ({ ...r })) : []);
  const [flags, setFlags] = useState({
    poi: initial ? !!initial.poi : false,
    hidden: initial ? !!initial.hidden : false,
    classified: initial ? !!initial.classified : false
  });
  const [importErr, setImportErr] = useState(null);
  const importRef = useRef(null);
  const toggleFlag = (k) => setFlags((f) => ({ ...f, [k]: !f[k] }));

  const handleImport = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        setForm({
          firstName: data.firstName || "",
          lastName: data.lastName || "",
          dob: data.dob || "",
          ethnicity: data.ethnicity || "",
          sex: data.sex || "",
          address: data.address || "",
          description: data.description || "",
          image: data.image || ""
        });
        if (data.imageData) setImgPreview(data.imageData);
        if (Array.isArray(data.contacts)) setContacts(data.contacts.map((c) => ({ ...c })));
        if (Array.isArray(data.relationships)) setRelationships(data.relationships.map((r) => ({ ...r })));
        setFlags({ poi: !!data.poi, hidden: !!data.hidden, classified: !!data.classified });
        setErrors({});
        setImportErr(null);
      } catch (_) {
        setImportErr("invalid json");
      }
      e.target.value = "";
    };
    reader.readAsText(file);
  };

  const addContact = () => setContacts((c) => [...c, { type: "email", value: "" }]);
  const updateContact = (i, patch) => setContacts((c) => c.map((row, k) => k === i ? { ...row, ...patch } : row));
  const removeContact = (i) => setContacts((c) => c.filter((_, k) => k !== i));

  const addRelationship = () => setRelationships((r) => [...r, { type: "friend", name: "", refId: "" }]);
  const updateRelationship = (i, patch) => setRelationships((r) => r.map((row, k) => k === i ? { ...row, ...patch } : row));
  const removeRelationship = (i) => setRelationships((r) => r.filter((_, k) => k !== i));

  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  const handlePic = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      setImgPreview(reader.result);
      // store filename so user understands the system; image content goes in 'imageData' too
      set("image", f.name);
    };
    reader.readAsDataURL(f);
  };

  const submit = () => {
    const errs = {};
    if (!form.firstName.trim()) errs.firstName = "required";
    if (!form.lastName.trim()) errs.lastName = "required";
    if (!form.dob) errs.dob = "required";
    if (!form.sex) errs.sex = "required";
    setErrors(errs);
    if (Object.keys(errs).length) return;

    const newId = editing ? initial.id : ("P-0x" + (Math.floor(Math.random() * 0xfff)).toString(16).toUpperCase().padStart(3, "0"));
    const cleanContacts = contacts
      .map((c) => ({ type: c.type, value: (c.value || "").trim() }))
      .filter((c) => c.value);
    const cleanRelationships = relationships
      .map((r) => ({
        type: r.type || "other",
        name: (r.name || "").trim(),
        refId: (r.refId || "").trim()
      }))
      .filter((r) => r.name || r.refId);
    const profile = {
      id: newId,
      firstName: form.firstName.trim(),
      lastName: form.lastName.trim(),
      dob: form.dob,
      ethnicity: form.ethnicity.trim(),
      sex: form.sex,
      address: form.address.trim(),
      description: form.description.trim(),
      image: form.image || "",
      contacts: cleanContacts,
      relationships: cleanRelationships,
      poi: !!flags.poi,
      hidden: !!flags.hidden,
      classified: !!flags.classified
    };
    if (imgPreview) profile.imageData = imgPreview; // embed for portability when no folder is linked
    onSave(profile, editing);
  };

  return (
    <div className="modal-veil" onMouseDown={(e) => { if (e.target.classList.contains("modal-veil")) onClose(); }}>
      <div className="modal" style={{ width: "min(920px, 100%)" }}>
        <div className="modal-head">
          <div className="tag">{editing ? "EDIT" : "CREATE"}</div>
          <h3>&gt; <Glitch className="glitch-sm">{editing ? `PATCH_ENTRY :: ${initial.id}` : "NEW_ENTRY.appendix()"}</Glitch></h3>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            {importErr && <span style={{ color: "var(--red)", fontSize: 10.5, letterSpacing: "0.16em", textTransform: "uppercase" }}>[ {importErr} ]</span>}
            <input ref={importRef} type="file" accept=".json,application/json" onChange={handleImport} style={{ display: "none" }} />
            <button className="ctrl-btn" onClick={() => importRef.current && importRef.current.click()} title="populate fields from a .json file">⇪ IMPORT</button>
            <button className="ctrl-btn" onClick={onClose}>✕ ESC</button>
          </div>
        </div>

        <div className="form-grid">
          <div className="picshell">
            <label style={{ color: "var(--grn-3)", fontSize: 10.5, letterSpacing: "0.22em", textTransform: "uppercase" }}>Profile Picture</label>
            <label className="pic">
              <input type="file" accept="image/*" onChange={handlePic} style={{ display: "none" }} />
              {imgPreview ? (
                <img src={imgPreview} alt="" />
              ) : (
                <div className="ph-text">
                  <span className="glyph">⊕</span>
                  click to upload
                  <div style={{ color: "var(--dim)", marginTop: 6, fontSize: 10 }}>jpg / png</div>
                </div>
              )}
            </label>
            <div style={{ color: "var(--dim)", fontSize: 10.5, letterSpacing: "0.14em", textTransform: "uppercase" }}>
              filename → <span style={{ color: "var(--grn-1)", textTransform: "none", letterSpacing: 0 }}>{form.image || "—"}</span>
            </div>
          </div>

          <div className="form-rows">
            <div className="row">
              <label>First Name <span className="req">*</span></label>
              <div className="input-wrap"><span className="pfx">&gt;</span>
                <input value={form.firstName} onChange={(e) => set("firstName", e.target.value)} autoFocus />
              </div>
              {errors.firstName && <div className="err">[ {errors.firstName} ]</div>}
            </div>
            <div className="row">
              <label>Last Name <span className="req">*</span></label>
              <div className="input-wrap"><span className="pfx">&gt;</span>
                <input value={form.lastName} onChange={(e) => set("lastName", e.target.value)} />
              </div>
              {errors.lastName && <div className="err">[ {errors.lastName} ]</div>}
            </div>
            <div className="row">
              <label>Date of Birth <span className="req">*</span></label>
              <div className="input-wrap"><span className="pfx">&gt;</span>
                <input type="date" value={form.dob} onChange={(e) => set("dob", e.target.value)} />
              </div>
              {errors.dob && <div className="err">[ {errors.dob} ]</div>}
            </div>
            <div className="row">
              <label>Sex <span className="req">*</span></label>
              <div className="input-wrap"><span className="pfx">&gt;</span>
                <select value={form.sex} onChange={(e) => set("sex", e.target.value)}>
                  <option value="">[ select ]</option>
                  <option value="M">M / Male</option>
                  <option value="F">F / Female</option>
                  <option value="NB">NB / Non-binary</option>
                  <option value="X">X / Unspecified</option>
                </select>
              </div>
              {errors.sex && <div className="err">[ {errors.sex} ]</div>}
            </div>
            <div className="row full">
              <label>Ethnicity</label>
              <div className="input-wrap"><span className="pfx">&gt;</span>
                <input value={form.ethnicity} onChange={(e) => set("ethnicity", e.target.value)} placeholder="e.g. South Asian, Mixed, Latina" />
              </div>
            </div>
            <div className="row full">
              <label>Address</label>
              <div className="input-wrap"><span className="pfx">&gt;</span>
                <input value={form.address} onChange={(e) => set("address", e.target.value)} placeholder="last known location" />
              </div>
            </div>
            <div className="row full">
              <label>Description</label>
              <div className="input-wrap" style={{ alignItems: "flex-start" }}>
                <span className="pfx">&gt;</span>
                <textarea className="area" value={form.description} onChange={(e) => set("description", e.target.value)} placeholder="notes, affiliations, known patterns…" />
              </div>
            </div>

            <div className="contacts-block">
              <div className="head">
                <span>// CONTACT_METHODS</span>
                <span className="dim">{contacts.length} pending</span>
              </div>
              {contacts.length === 0 ? (
                <div className="contacts-empty">— none yet · click "+ add contact method" below —</div>
              ) : (
                contacts.map((c, i) => (
                  <div className="contact-row" key={i}>
                    <div className="input-wrap">
                      <span className="pfx">@</span>
                      <select value={c.type} onChange={(e) => updateContact(i, { type: e.target.value })}>
                        {CONTACT_TYPES.map((t) => (
                          <option key={t.id} value={t.id}>{t.label}</option>

                    </div>
                    <div className="input-wrap">
                      <span className="pfx">&gt;</span>
                      <input
                        value={c.value}

                          : c.type === "website" ? "https://…"
                          : c.type === "x" || c.type === "telegram" || c.type === "instagram" ? "@handle"
                          : c.type === "discord" ? "handle#0000"
                          : "value"
                        }
                      />
                    </div>
                    <button type="button" className="icon-btn" title="remove" onClick={() => removeContact(i)}>✕</button>
                  </div>
                ))

              <div>
                <button type="button" className="ctrl-btn" onClick={addContact}>+ ADD CONTACT METHOD</button>
              </div>
            </div>

            <div className="contacts-block">
              <div className="head">
                <span>// RELATIONSHIPS</span>
                <span className="dim">{relationships.length} pending</span>
              </div>
              {relationships.length === 0 ? (
                <div className="contacts-empty">— none yet · click "+ add relationship" below —</div>
              ) : (
                relationships.map((r, i) => (
                  <div className="rel-row" key={i}>
                    <div className="input-wrap">
                      <span className="pfx">~</span>
                      <select value={r.type} onChange={(e) => updateRelationship(i, { type: e.target.value })}>
                        {RELATIONSHIP_TYPES.map((t) => (
                          <option key={t} value={t}>{t}</option>
                        ))}
                      </select>
                    </div>
                    <div className="input-wrap">
                      <span className="pfx">&gt;</span>
                      <input
                        value={r.name}
                        onChange={(e) => updateRelationship(i, { name: e.target.value })}

                    </div>
                    <div className="input-wrap">
                      <span className="pfx">#</span>
                      <input
                        value={r.refId}
                        onChange={(e) => updateRelationship(i, { refId: e.target.value })}

                      />
                    </div>
                    <button type="button" className="icon-btn" title="remove" onClick={() => removeRelationship(i)}>✕</button>
                  </div>
                ))
              )}
              <div>
                <button type="button" className="ctrl-btn" onClick={addRelationship}>+ ADD RELATIONSHIP</button>
              </div>
            </div>

            <div className="contacts-block">
              <div className="head">
                <span>// FLAGS</span>
                <span className="dim">{Object.values(flags).filter(Boolean).length} active</span>
              </div>
              <div className="status-toggles" style={{ paddingTop: 4 }}>
                <button
                  type="button"
                  className={"status-toggle poi " + (flags.poi ? "on" : "")}
                  onClick={() => toggleFlag("poi")}
                  title="Point of Interest — pinned to top of carousel"

                <button
                  type="button"
                  className={"status-toggle hidden " + (flags.hidden ? "on" : "")}
                  onClick={() => toggleFlag("hidden")}
                  title="Hidden — never sent to the geocoder, won't appear on the map"
                >◌ HIDDEN</button>
                <button
                  type="button"
                  className={"status-toggle classified " + (flags.classified ? "on" : "")}
                  onClick={() => toggleFlag("classified")}
                  title="Classified — removed from carousel and search until shell unlocks it"
                >▮ CLASSIFIED</button>
              </div>
            </div>
          </div>
        </div>

        <div className="modal-foot">
          <div className="foot-hint">
            <span className="kbd">⌘</span> required fields marked with <span className="amber">*</span>
          </div>
          <div className="foot-actions">
            <button className="ctrl-btn" onClick={onClose}>cancel</button>
            <button className="ctrl-btn primary" onClick={submit}>&gt; {editing ? "patch_entry()" : "commit_entry()"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}
